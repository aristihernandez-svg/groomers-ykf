<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1A3A5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Groomers YKF">
<title>Groomers YKF</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1A3A5C;--gold:#C8A000;--white:#fff;
  --lgray:#F7F7F7;--mgray:#CCCCCC;--dkgray:#555;
  --green:#1A6600;--red:#8B0000;
  --lgreen:#E8F8EE;--lred:#FFF0F0;--done:#E8E8E8;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;background:#F0F2F5}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;
        align-items:center;justify-content:center;z-index:999;transition:opacity 0.5s}
#splash.out{opacity:0;pointer-events:none}
.sp-plane{font-size:72px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-10px) rotate(5deg)}}
.sp-title{color:#fff;font-size:26px;font-weight:700;letter-spacing:2px;margin-top:16px}
.sp-sub{color:#A8C4E0;font-size:13px;margin-top:6px}
.sp-bar{width:180px;height:3px;background:rgba(255,255,255,0.15);border-radius:2px;margin-top:36px;overflow:hidden}
.sp-fill{height:100%;background:#fff;border-radius:2px;animation:prog 2s ease forwards}
@keyframes prog{to{width:100%}}

/* APP SHELL */
#app{display:flex;flex-direction:column;height:100%;opacity:0;transition:opacity 0.3s}
#app.show{opacity:1}

/* TOP BAR */
.bar{background:var(--navy);color:#fff;display:flex;align-items:center;gap:10px;
     padding:calc(var(--safe-top) + 10px) 16px 10px;flex-shrink:0;
     box-shadow:0 2px 8px rgba(0,0,0,0.25);position:relative;z-index:20}
.bar-title{font-size:17px;font-weight:700;flex:1}
.bar-pill{background:rgba(255,255,255,0.12);padding:3px 10px;border-radius:20px;
          font-size:12px;color:#A8C4E0}
.bar-btn{background:none;border:none;color:#A8C4E0;font-size:20px;padding:4px 6px;cursor:pointer}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
         padding-bottom:calc(60px + var(--safe-bottom))}

/* BOTTOM NAV */
.nav{background:#fff;border-top:1px solid var(--mgray);display:flex;overflow-x:auto;
     scrollbar-width:none;flex-shrink:0;
     padding-bottom:var(--safe-bottom)}
.nav::-webkit-scrollbar{display:none}
.nav-btn{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;
         padding:8px 16px 6px;cursor:pointer;border-top:2.5px solid transparent;
         transition:all 0.15s;min-width:64px}
.nav-btn.on{border-top-color:var(--navy)}
.nav-btn.on .ni{color:var(--navy)}
.nav-btn.on .nl{color:var(--navy);font-weight:700}
.ni{font-size:21px;color:#999;margin-bottom:2px}
.nl{font-size:10px;color:#999;white-space:nowrap}

/* SPINNER */
.spin-wrap{display:flex;flex-direction:column;align-items:center;
           justify-content:center;min-height:200px;gap:12px}
.spinner{width:30px;height:30px;border:3px solid var(--mgray);
         border-top-color:var(--navy);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-label{font-size:13px;color:var(--dkgray)}

/* PROGRESS BAR */
.prog-wrap{background:#fff;border-bottom:1px solid var(--mgray);
           padding:10px 16px;position:sticky;top:0;z-index:10}
.prog-row{display:flex;justify-content:space-between;font-size:12px;
          color:var(--dkgray);margin-bottom:5px}
.prog-bar{height:5px;background:var(--mgray);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--navy);border-radius:3px;transition:width 0.4s}

/* SECTION HEADER */
.sec{padding:7px 16px;font-size:11px;font-weight:700;letter-spacing:0.6px;
     text-transform:uppercase;color:#fff;margin-top:1px}

/* TASK ROW */
.trow{display:flex;align-items:center;gap:12px;padding:13px 16px;
      background:#fff;border-bottom:1px solid #F0F0F0;cursor:pointer;
      transition:background 0.1s;min-height:52px;position:relative}
.trow:active{background:#F5F5F5}
.trow.done{background:var(--done)}
.trow.done .ttxt{text-decoration:line-through;color:#999}
.trow.done .tfreq{color:#bbb}
.trow.closure{background:#FFF8F8}
.trow.closure.done{background:#F0E8E8}
.tcb{width:26px;height:26px;border-radius:50%;border:2px solid var(--mgray);
     display:flex;align-items:center;justify-content:center;flex-shrink:0;
     font-size:13px;color:#fff;transition:all 0.15s}
.tcb.on{background:var(--navy);border-color:var(--navy)}
.tinfo{flex:1;min-width:0}
.ttxt{font-size:14px;color:#111;line-height:1.3}
.tfreq{font-size:11px;color:#888;margin-top:2px}
.tdel{padding:6px 10px;color:#ccc;font-size:18px;cursor:pointer}
.tdel:active{color:var(--red)}

/* ADD TASK BTN */
.add-row{display:flex;align-items:center;gap:10px;padding:11px 16px;
         background:#fff;border-bottom:1px solid #F0F0F0;cursor:pointer}
.add-row span{font-size:13px;color:#999}
.add-circle{width:26px;height:26px;border-radius:50%;border:2px dashed var(--mgray);
            display:flex;align-items:center;justify-content:center;color:#bbb;font-size:16px}

/* NOTES SECTION */
.notes-wrap{margin:10px 12px 0;background:#fff;border-radius:10px;
            border:1px solid var(--mgray);overflow:hidden}
.notes-hdr{background:#555;color:#fff;padding:9px 14px;font-size:12px;font-weight:700;
           display:flex;align-items:center;justify-content:space-between}
.notes-hdr button{background:rgba(255,255,255,0.15);border:none;color:#fff;
                  border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer}
.nrow{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;
      border-bottom:1px solid #F5F5F5;cursor:pointer}
.nrow:last-child{border-bottom:none}
.nrow.done .ntxt{text-decoration:line-through;color:#999}
.ncb{width:22px;height:22px;border-radius:4px;border:1.5px solid var(--mgray);
     display:flex;align-items:center;justify-content:center;flex-shrink:0;
     font-size:11px;color:#fff;transition:all 0.15s;margin-top:1px}
.ncb.on{background:#555;border-color:#555}
.ninfo{flex:1}
.ntxt{font-size:13px;color:#111;line-height:1.4}
.nmeta{font-size:11px;color:#888;margin-top:2px}
.ndel{color:#ccc;font-size:16px;padding:2px 6px;cursor:pointer}
.ndel:active{color:var(--red)}

/* SHOPPING */
.shop-bar{background:#fff;border-bottom:1px solid var(--mgray);
          padding:9px 12px;display:flex;gap:7px;overflow-x:auto;
          scrollbar-width:none;position:sticky;top:0;z-index:10}
.shop-bar::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:5px 13px;border-radius:20px;font-size:12px;
      font-weight:600;cursor:pointer;border:none;transition:opacity 0.15s}
.chip:active{opacity:0.7}
.srow{display:flex;align-items:center;gap:12px;padding:13px 16px;
      background:#fff;border-bottom:1px solid #F0F0F0;cursor:pointer}
.srow:active{background:#F5F5F5}
.srow.tobuy{background:var(--lred)}
.srow.tobuy .sname{color:var(--red);font-weight:600}
.scb{width:26px;height:26px;border-radius:6px;border:2px solid var(--mgray);
     display:flex;align-items:center;justify-content:center;flex-shrink:0;
     font-size:13px;color:#fff;transition:all 0.15s}
.scb.on{background:var(--red);border-color:var(--red)}
.sinfo{flex:1;min-width:0}
.sname{font-size:14px;color:#111}
.smeta{font-size:11px;color:#888;margin-top:2px;display:flex;gap:8px}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle}
.empty-state{display:flex;flex-direction:column;align-items:center;
             justify-content:center;padding:40px 20px;gap:10px}
.empty-state .ei{font-size:40px}
.empty-state p{font-size:13px;color:#999;text-align:center}

/* PROCEDURES */
.proc-list{padding:12px;display:flex;flex-direction:column;gap:10px}
.pcard{background:#fff;border-radius:10px;border:1px solid var(--mgray);overflow:hidden}
.pcard-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;
           border-bottom:1px solid transparent;transition:border-color 0.15s}
.pcard.open .pcard-hdr{border-color:#F0F0F0}
.picon{font-size:22px}
.ptitle{font-size:14px;font-weight:600;color:#111;flex:1}
.psub{font-size:12px;color:#888;margin-top:2px}
.parr{color:#ccc;font-size:20px;transition:transform 0.2s}
.pcard.open .parr{transform:rotate(90deg)}
.pbody{display:none;padding:0 16px 12px}
.pcard.open .pbody{display:block}
.pwarn{background:#FFF0F0;border-left:3px solid var(--red);border-radius:0 6px 6px 0;
       padding:10px 12px;margin:10px 0 6px;font-size:12px;color:var(--red);
       font-weight:600;line-height:1.5}
.pstep{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #F8F8F8;cursor:pointer}
.pstep:last-child{border:none}
.pstep.done .stxt{text-decoration:line-through;color:#999}
.pstep.done .snote{color:#bbb}
.snum{width:26px;height:26px;border-radius:50%;background:var(--lgray);
      display:flex;align-items:center;justify-content:center;
      font-size:11px;font-weight:700;color:var(--navy);flex-shrink:0;transition:all 0.15s}
.pstep.done .snum{background:var(--navy);color:#fff}
.sinfo{flex:1}
.stxt{font-size:13px;color:#111;line-height:1.5}
.snote{font-size:11px;color:#888;margin-top:2px}
.green-step .stxt{color:var(--green);font-weight:600}

/* CONTACTS */
.con-list{padding:12px;display:flex;flex-direction:column;gap:8px}
.ccard{background:#fff;border-radius:10px;border:1px solid var(--mgray);overflow:hidden}
.crow{padding:14px 16px}
.cname{font-size:14px;font-weight:600;color:#111}
.caddr{font-size:12px;color:#555;margin-top:4px;line-height:1.4}
.cnote{font-size:12px;color:var(--navy);margin-top:4px;font-style:italic}

/* BORED BOARD */
.bored-list{padding:12px;display:flex;flex-direction:column;gap:8px}
.bitem{display:flex;align-items:center;gap:12px;background:#fff;
       border-radius:10px;border:1px solid var(--mgray);padding:14px 16px;cursor:pointer}
.bitem:active{background:#F5F5F5}
.bitem.done{background:var(--done)}
.bitem.done .btxt{text-decoration:line-through;color:#999}
.bcb{width:26px;height:26px;border-radius:6px;border:2px solid var(--mgray);
     display:flex;align-items:center;justify-content:center;flex-shrink:0;
     font-size:13px;color:#fff;transition:all 0.15s}
.bcb.on{background:#555;border-color:#555}
.btxt{font-size:14px;color:#111;line-height:1.4;flex:1}
.bdel{color:#ccc;font-size:18px;padding:2px 8px;cursor:pointer}
.bdel:active{color:var(--red)}

/* WEEK */
.week-list{padding:12px;display:flex;flex-direction:column;gap:8px}
.wcard{background:#fff;border-radius:10px;border:1px solid var(--mgray);
       display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.wcard:active{background:#F5F5F5}
.wcard.today{border-color:var(--navy);box-shadow:0 2px 8px rgba(26,58,92,0.12)}
.wday-emoji{font-size:24px}
.winfo{flex:1}
.wday-name{font-size:14px;font-weight:600;color:#111}
.wday-count{font-size:12px;color:#888;margin-top:2px}
.warr{color:#ccc;font-size:20px}

/* DAY DETAIL HEADER */
.day-detail-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;
                color:#fff;position:sticky;top:0;z-index:15}
.back-btn{background:none;border:none;color:#fff;font-size:22px;
          cursor:pointer;padding:0 4px;line-height:1}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);
         display:none;align-items:flex-end;z-index:200}
.overlay.open{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;
       padding-bottom:calc(20px + var(--safe-bottom))}
.modal h3{font-size:16px;font-weight:600;margin-bottom:14px;color:#111}
.modal input,.modal select,.modal textarea{
  width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--mgray);
  font-size:14px;font-family:inherit;margin-bottom:10px;background:#F9F9F9;color:#111}
.modal textarea{height:75px;resize:none}
.mbtn-row{display:flex;gap:8px;margin-top:4px}
.mbtn{flex:1;padding:13px;border-radius:10px;font-size:14px;font-weight:600;
      cursor:pointer;border:none}
.mbtn.cancel{background:var(--lgray);color:var(--dkgray)}
.mbtn.save{background:var(--navy);color:#fff}
.mbtn.danger{background:var(--lred);color:var(--red)}

/* FAB */
.fab{position:fixed;right:16px;bottom:calc(68px + var(--safe-bottom));
     width:52px;height:52px;border-radius:50%;background:var(--navy);
     color:#fff;border:none;font-size:24px;box-shadow:0 4px 14px rgba(0,0,0,0.25);
     cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:50}
.fab:active{transform:scale(0.93)}
.fab.red{background:#8B0000}


/* SEARCH BAR */
.search-wrap{padding:8px 12px;background:#fff;border-bottom:1px solid var(--mgray);
             position:sticky;top:44px;z-index:9}
.search-input{width:100%;padding:9px 14px 9px 36px;border-radius:20px;
              border:1px solid var(--mgray);background:#F7F7F7;
              font-size:14px;font-family:inherit;color:#111;outline:none}
.search-input:focus{border-color:var(--navy);background:#fff}
.search-wrap-inner{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
             font-size:14px;color:#aaa;pointer-events:none}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);
              font-size:16px;color:#aaa;cursor:pointer;display:none}

/* RESET BAR */
.reset-bar{padding:12px 14px;background:#fff;border-top:1px solid var(--mgray)}
.reset-btn{width:100%;padding:13px;border-radius:10px;background:var(--lgreen);
           color:var(--green);border:1.5px solid var(--green);font-size:14px;
           font-weight:600;cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:calc(72px + var(--safe-bottom));left:50%;
       transform:translateX(-50%) translateY(10px);background:#222;color:#fff;
       padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;
       transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:400}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* EOD BTN */
.eod-fab{position:fixed;left:16px;bottom:calc(68px + var(--safe-bottom));
         width:52px;height:52px;border-radius:50%;background:#2E7D32;
         color:#fff;border:none;font-size:22px;
         box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;
         display:none;align-items:center;justify-content:center;z-index:50}
.eod-fab.show{display:flex}
</style>
</head>
<body>

<div id="splash">
  <div class="sp-plane">✈</div>
  <div class="sp-title">Groomers YKF</div>
  <div class="sp-sub">Aviation Grooming Team</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

<div id="app">
  <div class="bar">
    <span style="font-size:20px">✈</span>
    <span class="bar-title" id="barTitle">Groomers YKF</span>
    <span class="bar-pill" id="barDay"></span>
    <button class="bar-btn" onclick="syncAll()" title="Sync">↻</button>
  </div>
  <div class="content" id="content"></div>
  <div class="nav" id="nav"></div>
</div>

<!-- Modals -->
<div class="overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <h3 id="modalTitle">Add</h3>
    <div id="modalFields"></div>
    <div class="mbtn-row">
      <button class="mbtn cancel" onclick="closeModal()">Cancel</button>
      <button class="mbtn save" id="modalSave" onclick="modalSubmit()">Save</button>
    </div>
  </div>
</div>

<button class="fab" id="fab" onclick="fabAction()" style="display:none">+</button>
<button class="eod-fab" id="eodFab" onclick="showEOD()">📋</button>
<div class="toast" id="toast"></div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const SHEET_ID    = '12vTTI_2UBH-yKDAdYL7k937EP1hCdJXFv8ml3nmsobQ';
const BACKEND_URL = 'BACKEND_URL_HERE'; // paste your Apps Script URL here

const DAYS = ['☀ Sunday','1️⃣ Monday','2️⃣ Tuesday','3️⃣ Wednesday',
              '4️⃣ Thursday','5️⃣ Friday','🗓 Saturday'];
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DAY_EMOJIS = ['☀','1️⃣','2️⃣','3️⃣','4️⃣','5️⃣','🗓'];
const DAY_COLORS = ['#E65C00','#1A3A5C','#005DAA','#006400','#7B2D8B','#C0181E','#D4860A'];
const TODAY = new Date().getDay();

const AREA_COLORS = {
  'AIRCRAFT':"#1A4A5C", "CR GROOMERS' CORNER":"#1A3A5C",
  'CR OFFICE':"#5C3A1A", 'MX HANGAR':"#2E5C1A",
  'MISC':"#4A4A4A", 'CHARTER':"#5C1A4A", 'CLOSURE':"#8B0000",
};
const STORE_COLORS = {
  'Zehrs':'#C0392B','Costco':'#005DAA','A1 Cash & Carry':'#D4860A',
  'Home Depot':'#E8500A','Canadian Tire':'#C0181E',
  'Monarch Oil':'#1A6B8A','Crew House':'#2E7D32','Supplier':'#444',
};

// ── STATE ────────────────────────────────────────────────────────
const S = {
  tab: 'today',
  dayView: TODAY,      // which day is showing in week/day detail
  inDayDetail: false,
  tasks: {},           // { tabName: [{task,freq,area,done}] }
  notes: {},           // { tabName: [{text,area,date,done}] }
  shopping: [],
  contacts: [],
  bored: [],
  procedures: {},
  shopFilter: 'all',
  shopSearch: '',
  modalCtx: null,
};

const NAV = [
  {id:'today',    icon:'📅', label:'Today'},
  {id:'week',     icon:'🗓', label:'Week'},
  {id:'shopping', icon:'🛒', label:'Shopping'},
  {id:'procedures',icon:'📋',label:'Procs'},
  {id:'contacts', icon:'📞', label:'Contacts'},
  {id:'bored',    icon:'💡', label:'Bored'},
];

// ── BOOT ─────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  document.getElementById('barDay').textContent = DAY_NAMES[TODAY];
  buildNav();
  loadNotes();
  loadProcs();
  setTimeout(async () => {
    document.getElementById('splash').classList.add('out');
    document.getElementById('app').classList.add('show');
    await Promise.all([
      fetchDay(DAYS[TODAY]),
      fetchShopping(),
      fetchContacts(),
      fetchBored(),
    ]);
    render();
  }, 1800);
});

// ── NAV ──────────────────────────────────────────────────────────
function buildNav() {
  document.getElementById('nav').innerHTML = NAV.map(n => `
    <div class="nav-btn ${n.id==='today'?'on':''}" id="nb-${n.id}" onclick="goTab('${n.id}')">
      <div class="ni">${n.icon}</div>
      <div class="nl">${n.label}</div>
    </div>`).join('');
}

function goTab(id) {
  S.tab = id; S.inDayDetail = false;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  document.getElementById(`nb-${id}`)?.classList.add('on');
  document.getElementById('barTitle').textContent = 'Groomers YKF';
  document.getElementById('eodFab').classList.toggle('show', id==='today');
  render();
}

function render() {
  const el = document.getElementById('content');
  document.getElementById('fab').style.display = 'none';
  switch(S.tab) {
    case 'today':      renderToday(el); break;
    case 'week':       S.inDayDetail ? renderDayDetail(el) : renderWeek(el); break;
    case 'shopping':   renderShopping(el); break;
    case 'procedures': renderProcs(el); break;
    case 'contacts':   renderContacts(el); break;
    case 'bored':      renderBored(el); break;
  }
}

// ── FETCH ─────────────────────────────────────────────────────────
async function fetchDay(tabName) {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table?.rows || [];
    const cols = json.table?.cols || [];

    const tasks = [];
    let area = '';

    rows.forEach(row => {
      const vals = cols.map((_, i) => {
        const c = row.c?.[i];
        return c ? String(c.v ?? c.f ?? '').trim() : '';
      });

      const taskVal = vals[1] || '';
      const freqVal = vals[2] || '';
      if (!taskVal) return;

      const upper = taskVal.toUpperCase();
      if (upper.includes('SPECIAL NOTES') || upper.includes('📝') ||
          upper.includes('NOTE / TASK')) return;

      // Section header — all caps, no checkbox
      const isHdr = taskVal === upper && taskVal.length > 3 &&
                    !vals[3] && Object.keys(AREA_COLORS).some(k => upper.includes(k.replace("'",'').substring(0,4)));
      if (isHdr) { area = upper; return; }

      if (taskVal && !['#','TASK','FREQUENCY'].includes(upper)) {
        tasks.push({ task: taskVal, freq: freqVal, area, done: false });
      }
    });

    S.tasks[tabName] = tasks;
  } catch(e) {
    S.tasks[tabName] = S.tasks[tabName] || fallbackTasks();
  }
}

async function fetchShopping() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('🛒 Shopping Audit')}`;
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table?.rows || [];
    const cols = json.table?.cols || [];

    S.shopping = rows.map(row => {
      const v = cols.map((_,i) => { const c=row.c?.[i]; return c?String(c.v??c.f??'').trim():''; });
      return { item:v[0], cabinet:v[1], store:v[2], status:v[3], notes:v[4]||'',
               checked: v[3]==='To Buy' };
    }).filter(r => r.item && r.item!=='Item' && !r.item.includes('Filter') &&
                   !r.item.startsWith('💡') && !r.item.startsWith('TO SHOP'));
  } catch(e) { S.shopping = S.shopping || []; }
}

async function fetchContacts() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('📞 Contacts & Info')}`;
    const res  = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table?.rows || [];
    const cols = json.table?.cols || [];
    S.contacts = rows.map(row => {
      const v = cols.map((_,i)=>{ const c=row.c?.[i]; return c?String(c.v??c.f??'').trim():''; });
      return { name:v[0], address:v[1], notes:v[2] };
    }).filter(r => r.name && r.name!=='Name / Store' && r.name.length>1);
  } catch(e) { S.contacts = []; }

async function fetchBored() {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('💡 Bored Board')}`;
    const res  = await fetch(url);

    const json = JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows = json.table?.rows || [];
    const cols = json.table?.cols || [];
    S.bored = rows.map((row,i) => {

// ── BACKEND CALL ─────────────────────────────────────────────────
async function api(data) {
  if (!BACKEND_URL || BACKEND_URL === 'BACKEND_URL_HERE') {
    toast('⚠ Backend not set up yet');
    return { error: 'no backend' };
  }
  try {
    const res = await fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data),
    });
    return await res.json();
  } catch(e) {
    toast('❌ Sync error');
    return { error: e.toString() };
  }
}

      i.item.toLowerCase().includes(q) ||
      (i.store||'').toLowerCase().includes(q) ||
      (i.cabinet||'').toLowerCase().includes(q) ||

  }
  html += '<div style="height:80px"></div>';
  el.innerHTML = html;

  rb.innerHTML = `<button class="reset-btn" onclick="resetShop()">✅ Reset all to In Stock</button>`;

// ── TOGGLE ACTIONS ────────────────────────────────────────────────
function toggleTask(tabName, idx) {
  S.tasks[tabName][idx].done = !S.tasks[tabName][idx].done;
  const t = S.tasks[tabName][idx];
  api({ action:'toggleTask', tabName, task:t.task });
  renderToday(document.getElementById('content'));
  toast(t.done ? '✓ Done' : 'Unchecked');
}

function toggleTaskDay(tabName, idx) {
  S.tasks[tabName][idx].done = !S.tasks[tabName][idx].done;
  const t = S.tasks[tabName][idx];
  api({ action:'toggleTask', tabName, task:t.task });
  renderDayDetail(document.getElementById('content'));
  toast(t.done ? '✓ Done' : 'Unchecked');
}

function toggleNote(tabName, idx) {
  S.notes[tabName][idx].done = !S.notes[tabName][idx].done;
  saveNotes();
  render();
}

function deleteNote(tabName, idx) {
  if (!confirm('Delete this note?')) return;
  S.notes[tabName].splice(idx,1);
  saveNotes();
  render();
}

function toggleShop(idx) {
  S.shopping[idx].checked = !S.shopping[idx].checked;
  S.shopping[idx].status  = S.shopping[idx].checked ? 'To Buy' : 'In Stock';
  api({ action:'toggleShop', item:S.shopping[idx].item });
  renderShopping(document.getElementById('content'));
  toast(S.shopping[idx].checked ? '🔴 To Buy' : '✅ In Stock');
}

function resetShop() {
  const n = S.shopping.filter(i=>i.checked).length;
  if (!n) { toast('Already all In Stock ✅'); return; }
  if (!confirm(`Reset ${n} items to In Stock?`)) return;
  S.shopping.forEach(i=>{ i.checked=false; i.status='In Stock'; });
  api({ action:'resetShop' });
  renderShopping(document.getElementById('content'));
  toast(`✅ ${n} items reset`);
}

function setShopFilter(f) { S.shopFilter=f; renderShopping(document.getElementById('content')); }
function setShopSearch(q) {
  S.shopSearch = q;
  renderShopping(document.getElementById('content'));
  // Keep focus on search input after re-render
  const inp = document.getElementById('shopSearch');
  if (inp) { inp.focus(); inp.value = q; inp.setSelectionRange(q.length,q.length); }
}

function toggleBored(idx) {
  S.bored[idx].done = !S.bored[idx].done;
  api({ action:'toggleBored', task:S.bored[idx].task });
  renderBored(document.getElementById('content'));
  toast(S.bored[idx].done ? '✓ Done!' : 'Unchecked');
}

function deleteBored(idx) {
  if (!confirm('Remove from Bored Board?')) return;
  S.bored.splice(idx,1);
  renderBored(document.getElementById('content'));
}

function toggleProc(key) {
  S.procedures[key].open = !S.procedures[key].open;
  renderProcs(document.getElementById('content'));
}

function toggleStep(key, idx) {
  const done = S.procedures[key].done;
  const i = done.indexOf(idx);
  i>-1 ? done.splice(i,1) : done.push(idx);
  renderProcs(document.getElementById('content'));
  toast(done.includes(idx) ? '✓ Step done' : 'Step unchecked');
}

function resetProc(key) {
  S.procedures[key].done = [];
  renderProcs(document.getElementById('content'));
  toast('Steps reset');
}

// ── MODALS ────────────────────────────────────────────────────────
function openModal(title, fields, submitFn) {
  document.getElementById('modalTitle').textContent = title;

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');

}

function openAddTask(tabName, area='') {
  openModal('Add Task',
    `<input id="mTask" placeholder="Task description..." value="">
     <input id="mFreq" placeholder="Frequency (e.g. Daily, Weekly...)">
     <select id="mArea">
       ${Object.keys(AREA_COLORS).map(a=>`<option value="${a}" ${a===area?'selected':''}>${a}</option>`).join('')}

    async () => {
      const task = document.getElementById('mTask').value.trim();

      const areaVal = document.getElementById('mArea').value;

      if (!S.tasks[tabName]) S.tasks[tabName] = [];
      S.tasks[tabName].push({ task, freq, area:areaVal, done:false });
      const r = await api({ action:'addTask', tabName, task, freq, area:areaVal });
      closeModal();
      render();
      toast('Task added ✓');
    }
  );
}

function confirmDeleteTask(tabName, idx) {
  if (!confirm('Delete this task?')) return;
  const task = S.tasks[tabName][idx].task;
  S.tasks[tabName].splice(idx,1);
  api({ action:'deleteTask', tabName, task });
  render();
  toast('Task deleted');
}

// ── END OF DAY ────────────────────────────────────────────────────
function showEOD() {
  const tabName = DAYS[TODAY];
  const tasks   = S.tasks[tabName] || [];
  const done    = tasks.filter(t=>t.done);
  const missed  = tasks.filter(t=>!t.done && t.area!=='CLOSURE');
  const closure = tasks.filter(t=>t.area==='CLOSURE');
  const clDone  = closure.filter(t=>t.done);
  const pct     = tasks.length ? Math.round(done.length/tasks.length*100) : 0;
  const now     = new Date();
  const dateStr = now.toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'});
  const timeStr = now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});

  let msg = `✈ *GROOMING TEAM — END OF DAY*\n`;
  msg += `📅 ${dateStr} · ${timeStr}\n`;
  msg += `${'─'.repeat(28)}\n\n`;
  msg += `📊 *${done.length}/${tasks.length} tasks (${pct}%)*\n\n`;
  if (missed.length) {
    msg += `⚠️ *Incomplete:*\n${missed.map(t=>`  • ${t.task}`).join('\n')}\n\n`;
  } else {
    msg += `✅ All tasks done!\n\n`;
  }
  if (clDone.length === closure.length && closure.length) {
    msg += `🔐 *Closure: ✅ Complete*\n\n`;
  } else if (closure.length) {
    msg += `🔐 *Closure — pending:*\n${closure.filter(t=>!t.done).map(t=>`  ❌ ${t.task}`).join('\n')}\n\n`;
  }
  msg += `${'─'.repeat(28)}\n_Sent from ✈ Groomers YKF_`;

  openModal('📋 End of Day Summary',
    `<textarea id="eodMsg" readonly style="height:220px;font-size:12px;line-height:1.5;
      background:#F9F9F9">${msg}</textarea>`,
    () => {
      const ta = document.getElementById('eodMsg');
      ta.select();
      document.execCommand('copy');
      toast('✅ Copied — paste into WhatsApp');
      closeModal();
    }
  );
  document.getElementById('modalSave').textContent = '📋 Copy & Close';
}

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._to);
  t._to = setTimeout(() => t.classList.remove('show'), 2200);
}
