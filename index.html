<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1A3A5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Groomers YKF">
<title>Groomers YKF</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="cars/skycare-icon-192.png">
<link rel="apple-touch-icon" sizes="192x192" href="cars/skycare-icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="cars/skycare-icon-512.png">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ══════════════════════════════════════════════
   BASE TOKENS — Premium Dark Night (default)
══════════════════════════════════════════════ */
:root{
  --bg:         #0B1120;
  --bg2:        #0F1830;
  --bg3:        #141F3A;
  --bg4:        #1A2848;
  --gold:       #C8A84B;
  --gold2:      #E8C86A;
  --gold-dim:   rgba(200,168,75,0.18);
  --gold-glow:  rgba(200,168,75,0.08);
  --glass:      rgba(255,255,255,0.05);
  --glass2:     rgba(255,255,255,0.08);
  --glass3:     rgba(255,255,255,0.12);
  --border:     rgba(255,255,255,0.07);
  --border2:    rgba(255,255,255,0.12);
  --border-gold:rgba(200,168,75,0.30);
  /* Text — clear contrast ladder */
  --t1:         #F0F4FF;   /* primary — headings, task names */
  --t2:         #A8B8CC;   /* secondary — metadata, frequencies */
  --t3:         #607080;   /* tertiary — hints, timestamps */
  --t4:         #3A4A5A;   /* disabled / done */
  /* Status */
  --green:      #2ECC8A;
  --green-dim:  rgba(46,204,138,0.12);
  --red:        #E84040;
  --red-dim:    rgba(232,64,64,0.12);
  /* Done state */
  --done-bg:    rgba(255,255,255,0.02);
  --done-text:  #3A4A5A;
  /* Misc */
  --safe-b:     env(safe-area-inset-bottom,0px);
  --safe-t:     env(safe-area-inset-top,0px);
  --radius:     12px;
  --radius-sm:  8px;
  --accent:     var(--gold);
  --accent2:    var(--gold2);
  --accent-dim: var(--gold-dim);
  --accent-border: var(--border-gold);
}

/* ══════════════════════════════════════════════
   THEME: Premium Dark — Day
══════════════════════════════════════════════ */
[data-theme="premium-day"]{
  --bg:         #E8EDF8;
  --bg2:        #F2F5FC;
  --bg3:        #FFFFFF;
  --bg4:        #DDE3F0;
  --gold:       #9A7A28;
  --gold2:      #B89030;
  --gold-dim:   rgba(154,122,40,0.12);
  --gold-glow:  rgba(154,122,40,0.06);
  --glass:      rgba(255,255,255,0.60);
  --glass2:     rgba(255,255,255,0.80);
  --glass3:     rgba(255,255,255,0.95);
  --border:     rgba(0,20,60,0.08);
  --border2:    rgba(0,20,60,0.14);
  --border-gold:rgba(154,122,40,0.30);
  --t1:         #0A1428;
  --t2:         #3A5070;
  --t3:         #7A90A8;
  --t4:         #AAB8C8;
  --green:      #1A7A50;
  --green-dim:  rgba(26,122,80,0.10);
  --red:        #C03030;
  --red-dim:    rgba(192,48,48,0.10);
  --done-bg:    rgba(0,20,60,0.04);
  --done-text:  #AAB8C8;
  --accent:     var(--gold);
  --accent2:    var(--gold2);
  --accent-dim: var(--gold-dim);
  --accent-border: var(--border-gold);
}

/* ══════════════════════════════════════════════
   THEME: Standard — Night
══════════════════════════════════════════════ */
[data-theme="standard-night"]{
  --bg:         #111111;
  --bg2:        #1A1A1A;
  --bg3:        #222222;
  --bg4:        #2A2A2A;
  --gold:       #FFFFFF;
  --gold2:      #DDDDDD;
  --gold-dim:   rgba(255,255,255,0.08);
  --gold-glow:  rgba(255,255,255,0.04);
  --glass:      rgba(255,255,255,0.04);
  --glass2:     rgba(255,255,255,0.07);
  --glass3:     rgba(255,255,255,0.10);
  --border:     rgba(255,255,255,0.08);
  --border2:    rgba(255,255,255,0.14);
  --border-gold:rgba(255,255,255,0.20);
  --t1:         #FFFFFF;
  --t2:         #AAAAAA;
  --t3:         #666666;
  --t4:         #3A3A3A;
  --green:      #44CC77;
  --green-dim:  rgba(68,204,119,0.12);
  --red:        #EE4444;
  --red-dim:    rgba(238,68,68,0.12);
  --done-bg:    rgba(255,255,255,0.02);
  --done-text:  #3A3A3A;
  --radius:     8px;
  --radius-sm:  5px;
  --accent:     #FFFFFF;
  --accent2:    #DDDDDD;
  --accent-dim: rgba(255,255,255,0.08);
  --accent-border: rgba(255,255,255,0.20);
}

/* ══════════════════════════════════════════════
   THEME: Standard — Day
══════════════════════════════════════════════ */
[data-theme="standard-day"]{
  --bg:         #F5F5F5;
  --bg2:        #FFFFFF;
  --bg3:        #F0F0F0;
  --bg4:        #E8E8E8;
  --gold:       #111111;
  --gold2:      #333333;
  --gold-dim:   rgba(0,0,0,0.06);
  --gold-glow:  rgba(0,0,0,0.03);
  --glass:      rgba(0,0,0,0.02);
  --glass2:     rgba(0,0,0,0.04);
  --glass3:     rgba(0,0,0,0.06);
  --border:     rgba(0,0,0,0.08);
  --border2:    rgba(0,0,0,0.14);
  --border-gold:rgba(0,0,0,0.20);
  --t1:         #111111;
  --t2:         #444444;
  --t3:         #888888;
  --t4:         #BBBBBB;
  --green:      #1A7A40;
  --green-dim:  rgba(26,122,64,0.10);
  --red:        #CC2222;
  --red-dim:    rgba(204,34,34,0.10);
  --done-bg:    rgba(0,0,0,0.03);
  --done-text:  #BBBBBB;
  --radius:     8px;
  --radius-sm:  5px;
  --accent:     #111111;
  --accent2:    #333333;
  --accent-dim: rgba(0,0,0,0.06);
  --accent-border: rgba(0,0,0,0.20);
}

/* ══════════════════════════════════════════════
   GLOBAL STYLES — use token vars everywhere
══════════════════════════════════════════════ */
html,body{
  height:100vh;height:100dvh;overflow:hidden;
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);color:var(--t1);
}

/* Background mesh — premium only */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%,rgba(200,168,75,0.05) 0%,transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 100%,rgba(26,40,72,0.6) 0%,transparent 70%);
  transition:opacity 0.4s;
}
[data-theme="premium-day"] body::before{
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%,rgba(154,122,40,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 100%,rgba(180,196,220,0.4) 0%,transparent 70%);
}
[data-theme="standard-night"] body::before,
[data-theme="standard-day"] body::before{background:none}

/* SPLASH */
#splash{
  position:fixed;inset:0;z-index:999;transition:opacity 0.6s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%,#1A2848 0%,#0B1120 60%,#060C18 100%);
}
#splash.out{opacity:0;pointer-events:none}
.splash-ring{
  width:120px;height:120px;border-radius:50%;
  border:1px solid rgba(200,168,75,0.35);
  display:flex;align-items:center;justify-content:center;
  position:relative;margin-bottom:24px;
  box-shadow:0 0 40px rgba(200,168,75,0.08),inset 0 0 40px rgba(200,168,75,0.04);
}
.splash-ring::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid rgba(200,168,75,0.10);
}
.sp-plane{
  display:flex;align-items:center;justify-content:center;
  filter:drop-shadow(0 4px 16px rgba(200,168,75,0.35));
  animation:bob 2.5s ease-in-out infinite;
}
@keyframes bob{
  0%,100%{transform:translateY(0) rotate(-3deg)}
  50%{transform:translateY(-10px) rotate(3deg)}
}
/* Continuous climb-out: the plane fades in low-left, climbs steadily to
   high-right with the nose banking up in the direction of travel, then
   fades out before resetting — the reset happens only while invisible,
   so the loop reads as one unbroken takeoff rather than a snap-back. */
@keyframes takeoff{
  0%   {transform:translate(-70px,12px)  rotate(-2deg);  opacity:0}
  10%  {transform:translate(-48px,7px)   rotate(-5deg);  opacity:1}
  35%  {transform:translate(-12px,-6px)  rotate(-12deg); opacity:1}
  60%  {transform:translate(28px,-26px)  rotate(-18deg); opacity:1}
  85%  {transform:translate(62px,-48px)  rotate(-20deg); opacity:0.35}
  100% {transform:translate(82px,-60px)  rotate(-20deg); opacity:0}
}
.sp-title{color:#E8C86A;font-size:26px;font-weight:700;letter-spacing:4px;text-transform:uppercase}
.sp-sub{color:#7890A8;font-size:12px;letter-spacing:3px;margin-top:6px;font-weight:300}
.sp-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,#C8A84B,transparent);margin:18px auto;opacity:0.5}
.sp-bar{width:160px;height:1px;background:rgba(255,255,255,0.08);border-radius:1px;margin-top:8px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,#C8A84B,#E8C86A);animation:prog 2s ease forwards;box-shadow:0 0 8px #C8A84B}
@keyframes prog{to{width:100%}}

/* ── Harry Potter living portrait ── */
.hp-portrait-wrap{display:inline-flex;flex-direction:column;align-items:center;margin-bottom:16px}
.hp-portrait{
  position:relative;width:160px;height:187px;border-radius:6px;overflow:hidden;
  box-shadow:0 0 0 3px #6B4D0E,0 0 0 6px #C8A84B,0 0 0 9px #6B4D0E,0 0 0 13px #3A2C06,0 10px 40px rgba(0,0,0,0.7);
  animation:hpBreath 5s ease-in-out infinite;
}
.hp-portrait img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center top;
  opacity:0;filter:sepia(8%) contrast(1.05) brightness(0.99);
}
.hp-nameplate{
  background:linear-gradient(90deg,#4A3508,#C8A84B,#C8A84B,#4A3508);
  color:#0B1120;font-size:11px;font-weight:800;letter-spacing:2.5px;
  text-transform:uppercase;text-align:center;
  padding:5px 28px 4px;border-radius:0 0 4px 4px;
  box-shadow:0 2px 8px rgba(0,0,0,0.5);
}
@keyframes hpBreath{
  0%,100%{transform:scale(1) rotate(0deg)}
  35%{transform:scale(1.008) rotate(0.3deg)}
  70%{transform:scale(1.008) rotate(-0.3deg)}
}
/* 10s cycle — burst of 6 frames in ~2s, long rest on warm smile
   f1=0464 warm smile (resting)  f2=0457 slight smile
   f3=0460 talking/mouth open    f4=0461 shocked
   f5=0462 laughing hard         f6=0463 big grin
   f7=0456 neutral/serious       */
.hp-f1{animation:hpF1 10s linear infinite}
.hp-f2{animation:hpF2 10s linear infinite}
.hp-f3{animation:hpF3 10s linear infinite}
.hp-f4{animation:hpF4 10s linear infinite}
.hp-f5{animation:hpF5 10s linear infinite}
.hp-f6{animation:hpF6 10s linear infinite}
.hp-f7{animation:hpF7 10s linear infinite}
/* resting 0-55%, burst 55-75%, back to smile 75-85%, neutral 85-95%, return 95-100% */
@keyframes hpF1{0%{opacity:1}54%{opacity:1}55%{opacity:0}74%{opacity:0}75%{opacity:1}84%{opacity:1}85%{opacity:0}95%{opacity:0}96%{opacity:1}100%{opacity:1}}
@keyframes hpF2{0%{opacity:0}54%{opacity:0}55%{opacity:1}58%{opacity:1}59%{opacity:0}100%{opacity:0}}
@keyframes hpF3{0%{opacity:0}58%{opacity:0}59%{opacity:1}62%{opacity:1}63%{opacity:0}100%{opacity:0}}
@keyframes hpF4{0%{opacity:0}62%{opacity:0}63%{opacity:1}66%{opacity:1}67%{opacity:0}100%{opacity:0}}
@keyframes hpF5{0%{opacity:0}66%{opacity:0}67%{opacity:1}70%{opacity:1}71%{opacity:0}100%{opacity:0}}
@keyframes hpF6{0%{opacity:0}70%{opacity:0}71%{opacity:1}74%{opacity:1}75%{opacity:0}100%{opacity:0}}
@keyframes hpF7{0%{opacity:0}84%{opacity:0}85%{opacity:1}95%{opacity:1}96%{opacity:0}100%{opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes notePopIn{from{transform:scale(0.88) translateY(-6px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-18px);opacity:0}to{transform:translateX(0);opacity:1}}
.slide-in-left{animation:slideInLeft 0.18s ease both}
@keyframes oilFlash{0%,100%{opacity:1}50%{opacity:0.08}}
.oil-flash-icon{animation:oilFlash 0.75s infinite}
@keyframes bob2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* APP */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;opacity:0;transition:opacity 0.3s;position:relative;z-index:1}
#app.show{opacity:1}

/* TOPBAR */
.bar{
  background:rgba(11,17,32,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  padding:calc(var(--safe-t) + 12px) 16px 12px;
  flex-shrink:0;position:relative;z-index:20;
}
[data-theme="premium-day"] .bar{background:rgba(232,237,248,0.92)}
[data-theme="standard-night"] .bar{background:#111111}
[data-theme="standard-day"] .bar{background:#FFFFFF;border-bottom:1px solid rgba(0,0,0,0.10)}
.bar-title{font-size:17px;font-weight:600;color:var(--t1);flex:1;letter-spacing:0.3px;cursor:pointer}
.bar-pill{
  background:var(--accent-dim);border:1px solid var(--accent-border);
  padding:4px 12px;border-radius:20px;font-size:11px;
  color:var(--accent);font-weight:500;letter-spacing:0.5px;
}
.bar-btn{background:none;border:none;color:var(--t3);font-size:18px;padding:4px 6px;cursor:pointer}

/* PULL TO REFRESH */
.ptr{height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:height 0.2s;flex-shrink:0}
.ptr.active{height:44px}
.ptr-spin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(88px + var(--safe-b));background:var(--bg)}

/* NAV */
.nav{
  background:rgba(11,17,32,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;
  flex-shrink:0;padding-bottom:var(--safe-b);
}
[data-theme="premium-day"] .nav{background:rgba(232,237,248,0.95)}
[data-theme="standard-night"] .nav{background:#111111;border-top:1px solid rgba(255,255,255,0.08)}
[data-theme="standard-day"] .nav{background:#FFFFFF;border-top:1px solid rgba(0,0,0,0.08)}
.nav::-webkit-scrollbar{display:none}
.nb{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;padding:8px 14px 6px;cursor:pointer;border-top:2px solid transparent;transition:all 0.2s;min-width:60px}
.nb.on{border-top-color:#1A3A5C}
.nb.on .ni{color:#1A3A5C}
.nb.on .nl{color:#1A3A5C;font-weight:700}
.ni{font-size:21px;color:#607080;margin-bottom:2px;transition:color 0.2s;display:flex;align-items:center;justify-content:center;height:25px}
.nl{font-size:10px;color:#607080;white-space:nowrap;font-weight:500;letter-spacing:0.3px;transition:color 0.2s}

/* SPINNER */
.spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
.spin-lbl{font-size:13px;color:var(--t2)}

/* PROGRESS */
.prog-wrap{
  background:rgba(11,17,32,0.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);padding:12px 16px;
  position:sticky;top:0;z-index:10;
}
[data-theme="premium-day"] .prog-wrap{background:rgba(232,237,248,0.90)}
[data-theme="standard-night"] .prog-wrap{background:#1A1A1A}
[data-theme="standard-day"] .prog-wrap{background:#FFFFFF;border-bottom:1px solid rgba(0,0,0,0.08)}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:7px;font-weight:500}
.prog-bar{height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.4s;box-shadow:0 0 6px var(--accent-dim)}

/* SECTION HEADER */
.sec{
  padding:8px 16px;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);
  background:linear-gradient(90deg,var(--accent-dim),transparent);
  border-bottom:1px solid var(--border);
  border-left:2px solid var(--accent);
  margin-top:2px;
}
[data-theme="standard-night"] .sec{
  background:var(--bg3);color:var(--t1);border-left-color:var(--t4);
}
[data-theme="standard-day"] .sec{
  background:var(--bg3);color:var(--t1);border-left-color:var(--t4);
}

/* TASK ROWS */
.trow-wrap{position:relative;overflow:hidden}
.trow-del-bg{
  position:absolute;right:0;top:0;bottom:0;width:80px;
  background:var(--red-dim);display:flex;align-items:center;
  justify-content:center;color:var(--red);font-size:12px;font-weight:600;
  cursor:pointer;border-left:1px solid rgba(232,64,64,0.2);
}
.trow{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:var(--glass);border-bottom:1px solid var(--border);
  cursor:pointer;min-height:54px;position:relative;
  transition:background 0.15s,transform 0.2s ease;
}
[data-theme="standard-night"] .trow{background:var(--bg2)}
[data-theme="standard-day"] .trow{background:var(--bg2)}
.trow:active{background:var(--glass2)}
.trow.done{background:var(--done-bg)}
.trow.done .ttxt{text-decoration:line-through;color:var(--done-text)}
.trow.closure{background:rgba(232,64,64,0.04);border-left:2px solid rgba(232,64,64,0.2)}
.trow.closure.done{background:var(--done-bg)}

/* CHECKBOX */
.tcb{
  width:26px;height:26px;border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:12px;color:var(--bg);
  transition:all 0.2s;
}
.tcb.on{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-color:var(--accent);
  box-shadow:0 0 10px var(--accent-dim);
}
.tinfo{flex:1;min-width:0}
.ttxt{font-size:14px;color:var(--t1);line-height:1.3;font-weight:600}
.tfreq{font-size:11px;color:var(--t3);margin-top:2px}
.trow.done .tfreq{color:var(--t4)}

/* ADD ROW */
.add-row{display:flex;align-items:center;gap:10px;padding:10px 16px;background:transparent;border-bottom:1px solid var(--border);cursor:pointer;opacity:0.4;transition:opacity 0.15s}
.add-row:active{opacity:0.7}
.add-circ{width:24px;height:24px;border-radius:50%;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:14px;flex-shrink:0}
.add-row span{font-size:12px;color:var(--t3)}

/* GLASS CARDS */
.notes-wrap{
  margin:12px;background:var(--glass);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;
}
[data-theme="standard-night"] .notes-wrap,[data-theme="standard-day"] .notes-wrap{background:var(--bg2);backdrop-filter:none}
.notes-hdr{
  background:var(--glass2);border-bottom:1px solid var(--border);
  padding:10px 14px;font-size:12px;font-weight:600;color:var(--t2);
  display:flex;align-items:center;justify-content:space-between;
}
[data-theme="standard-night"] .notes-hdr,[data-theme="standard-day"] .notes-hdr{background:var(--bg3)}
.notes-hdr button{
  background:var(--accent-dim);border:1px solid var(--accent-border);
  color:var(--accent);border-radius:20px;padding:4px 12px;
  font-size:11px;cursor:pointer;font-weight:500;
}
.nrow{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.nrow:last-child{border-bottom:none}
.nrow.done .ntxt{text-decoration:line-through;color:var(--done-text)}
.ncb{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--bg);transition:all 0.15s;margin-top:1px}
.ncb.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent)}
.ninfo{flex:1}
.ntxt{font-size:13px;color:var(--t1);line-height:1.4}
.nmeta{font-size:11px;color:var(--t3);margin-top:2px}
.nphoto{width:100%;border-radius:var(--radius-sm);margin-top:8px;max-height:160px;object-fit:cover;border:1px solid var(--border)}
.ndel{color:var(--t4);font-size:15px;padding:2px 6px;cursor:pointer}

/* RESET DAY */
.reset-day-bar{padding:10px 12px;background:transparent;border-bottom:1px solid var(--border)}
.reset-day-btn{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid var(--border);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}

/* SHOPPING */
.shop-filters{background:rgba(11,17,32,0.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
[data-theme="premium-day"] .shop-filters{background:rgba(232,237,248,0.92)}
[data-theme="standard-night"] .shop-filters{background:#111111}
[data-theme="standard-day"] .shop-filters{background:#FFFFFF}
.shop-bar{padding:10px 12px 0;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.shop-bar::-webkit-scrollbar{display:none}
.shop-bar2{padding:6px 12px 10px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border)}
.shop-bar2::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--glass);color:var(--t2);transition:all 0.15s}
.chip:active{opacity:0.7}
.chip-label{font-size:10px;color:var(--t3);padding:2px 12px 0;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.search-wrap{padding:8px 12px;border-bottom:1px solid var(--border)}
.search-inner{position:relative}
.search-inp{width:100%;padding:13px 40px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--glass2);font-size:16px;font-family:inherit;color:var(--t1);outline:none}
.search-inp:focus{border-color:var(--accent-border)}
.search-inp::placeholder{color:var(--t3)}
.s-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t3);pointer-events:none}
.s-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--t3);cursor:pointer}

/* SHOP ROWS */
.srow{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--glass);border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
[data-theme="standard-night"] .srow,[data-theme="standard-day"] .srow{background:var(--bg2)}
.srow:active{background:var(--glass2)}
.srow.tobuy{background:var(--red-dim);border-left:2px solid rgba(232,64,64,0.4)}
.srow.tobuy .sname{color:var(--red);font-weight:600}
.scb{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:var(--bg);transition:all 0.15s}
.scb.on{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 0 8px rgba(232,64,64,0.25)}
.sinfo{flex:1;min-width:0}
.sname{font-size:14px;color:var(--t1);font-weight:600}
/* Store + cabinet meta — clearly readable */
.smeta{font-size:12px;color:var(--t2);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle;flex-shrink:0}
.smeta-store{font-weight:600;color:var(--t1)}
.smeta-cab{color:var(--t2)}

.cart-store-hdr{padding:9px 16px 6px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:8px}
.cart-count{background:rgba(255,255,255,0.15);border-radius:20px;padding:1px 8px;font-size:10px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:12px}
.empty-icon{font-size:40px;opacity:0.5}
.empty p{font-size:13px;color:var(--t3);text-align:center}
.empty button{margin-top:8px;padding:8px 20px;border-radius:20px;border:1px solid var(--border2);background:var(--glass);font-size:13px;cursor:pointer;color:var(--t2)}

.reset-bar{padding:12px 14px;background:rgba(11,17,32,0.8);border-top:1px solid var(--border)}
[data-theme="premium-day"] .reset-bar{background:rgba(232,237,248,0.9)}
[data-theme="standard-night"] .reset-bar{background:#111111}
[data-theme="standard-day"] .reset-bar{background:#FFFFFF}
.reset-btn{width:100%;padding:13px;border-radius:var(--radius-sm);background:var(--green-dim);color:var(--green);border:1px solid rgba(46,204,138,0.2);font-size:14px;font-weight:600;cursor:pointer}

/* PROCEDURES */
.proc-list{padding:0;display:flex;flex-direction:column;gap:0}
.pcard{background:var(--glass);border-radius:0;border:none;border-bottom:1px solid var(--border);overflow:hidden;transition:border-color 0.2s;margin-bottom:0}
[data-theme="standard-night"] .pcard,[data-theme="standard-day"] .pcard{background:var(--bg2)}
.pcard.open{border-color:var(--accent-border)}
.pcard-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;background:var(--glass);border-bottom:1px solid var(--border)}
[data-theme="standard-night"] .pcard-hdr,[data-theme="standard-day"] .pcard-hdr{background:var(--bg2)}
.picon{font-size:24px}
.ptitle{font-size:15px;font-weight:700;color:var(--t1);flex:1}
.psub{font-size:12px;color:var(--t3);margin-top:2px}
.parr{color:var(--border2);font-size:20px;transition:transform 0.2s,color 0.2s}
.pcard.open .parr{transform:rotate(90deg);color:var(--accent)}
.pbody{display:none;padding:8px 16px 16px;border-top:1px solid var(--border);background:var(--glass)}
.pcard.open .pbody{display:block}
.pwarn{background:var(--red-dim);border-left:3px solid var(--red);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin:12px 0 8px;font-size:12px;color:var(--red);font-weight:500;line-height:1.6}
.pstep{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer}
.pstep:last-child{border-bottom:none}
.pstep.done .stxt{text-decoration:line-through;color:var(--done-text)}
.pstep.done .snote{color:var(--t4)}
.snum{width:28px;height:28px;border-radius:50%;background:var(--glass2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--t2);flex-shrink:0;transition:all 0.2s}
.pstep.done .snum{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);border-color:var(--accent)}
.sinfo{flex:1}
.stxt{font-size:13px;color:var(--t1);line-height:1.5}
.snote{font-size:11px;color:var(--t3);margin-top:2px}
.green-step .stxt{color:var(--green);font-weight:500}
.proc-actions{display:flex;gap:8px;margin-top:12px}
.proc-act-btn{flex:1;padding:10px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--glass2);color:var(--t2)}
.video-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(64,144,255,0.06);border:1px solid rgba(64,144,255,0.15);border-radius:var(--radius-sm);margin:10px 0;cursor:pointer;text-decoration:none}
.video-btn span{font-size:13px;color:#6EB0FF;font-weight:500}
.vicon{font-size:20px}
.dmg-section{margin-top:12px;background:var(--red-dim);border-radius:var(--radius-sm);border:1px solid rgba(232,64,64,0.15);overflow:hidden}
.dmg-hdr{background:rgba(232,64,64,0.08);color:var(--red);padding:8px 14px;font-size:11px;font-weight:600;letter-spacing:0.5px}
.dmg-body{padding:10px 14px}
.dmg-btn{width:100%;padding:10px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid rgba(232,64,64,0.15);font-size:12px;font-weight:500;color:var(--red);cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.dmg-chip{transition:background 0.15s,color 0.15s,border-color 0.15s}
.dmg-chip-on{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important}
.dmg-photo{width:100%;border-radius:var(--radius-sm);margin-top:6px;max-height:200px;object-fit:cover}
.dmg-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.dmg-item{background:var(--glass);border-radius:var(--radius-sm);padding:8px 10px;border:1px solid var(--border);font-size:12px;color:var(--t2)}
.dmg-item-photo{width:100%;border-radius:6px;margin-top:4px;max-height:120px;object-fit:cover}

/* CONTACTS */
.con-list{padding:0;display:flex;flex-direction:column;gap:0}
.ccard{background:var(--glass);border-radius:0;border:none;border-bottom:1px solid var(--border);overflow:hidden}
[data-theme="standard-night"] .ccard,[data-theme="standard-day"] .ccard{background:var(--bg2)}
.crow{padding:14px 16px}
.cname{font-size:14px;font-weight:700;color:var(--t1)}
.caddr{font-size:12px;color:var(--t2);margin-top:5px;line-height:1.5;cursor:pointer;display:flex;align-items:flex-start;gap:6px}
.caddr-text{flex:1;color:#6EB0FF;text-decoration:underline;font-weight:500}
.cnote{font-size:12px;color:var(--t2);margin-top:5px;line-height:1.5}
.maps-btn{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:7px 14px;border-radius:20px;background:rgba(64,144,255,0.10);color:#6EB0FF;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(64,144,255,0.20);text-decoration:none}

/* BORED */
.bored-list{padding:0;display:flex;flex-direction:column;gap:0}
.bitem{display:flex;align-items:center;gap:12px;background:var(--glass);border-radius:0;border:none;border-bottom:1px solid var(--border);padding:14px 16px;cursor:pointer;transition:background 0.15s}
[data-theme="standard-night"] .bitem,[data-theme="standard-day"] .bitem{background:var(--bg2)}
.bitem:active{background:var(--glass2)}
.bitem.done{background:var(--done-bg);border-color:var(--border)}
.bitem.done .btxt{text-decoration:line-through;color:var(--done-text)}
.bcb{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:var(--bg);transition:all 0.2s}
.bcb.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent);box-shadow:0 0 8px var(--accent-dim)}
.btxt{font-size:14px;color:var(--t1);line-height:1.4;flex:1;font-weight:600}
.bdel{color:var(--t4);font-size:16px;padding:2px 8px;cursor:pointer}

/* WEEK */
.week-list{padding:0;display:flex;flex-direction:column;gap:0}

/* DAY DETAIL */
.dbar{display:flex;align-items:center;gap:10px;padding:12px 16px;color:#fff;position:sticky;top:0;z-index:15;backdrop-filter:blur(10px)}
.back-btn{background:none;border:none;color:var(--accent);font-size:24px;cursor:pointer;padding:0 4px;line-height:1}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:200;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border2);border-radius:20px;padding:24px 20px;width:100%;max-width:420px;padding-bottom:calc(24px + var(--safe-b));max-height:85vh;overflow-y:auto}
.modal::before{content:'';display:block;width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--t1)}
.modal input,.modal select,.modal textarea{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--glass2);font-size:14px;font-family:inherit;color:var(--t1);outline:none;margin-bottom:10px}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent-border)}
.modal input::placeholder,.modal textarea::placeholder{color:var(--t3)}
.modal textarea{height:80px;resize:none}
.modal label{font-size:12px;color:var(--t3);display:block;margin-bottom:4px;margin-top:4px;font-weight:500}
.mbtn-row{display:flex;gap:8px;margin-top:6px}
.mbtn{flex:1;padding:14px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none}
.mbtn.cancel{background:var(--glass2);color:var(--t2);border:1px solid var(--border)}
.mbtn.save{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg)}
[data-theme="standard-day"] .mbtn.save{color:#fff}

/* FAB */
.fab{position:fixed;right:16px;bottom:calc(72px + var(--safe-b));width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);border:none;font-size:24px;font-weight:700;box-shadow:0 4px 20px var(--accent-dim);cursor:pointer;display:none;align-items:center;justify-content:center;z-index:50}
.fab:active{transform:scale(0.93)}
[data-theme="standard-day"] .fab{color:#fff}

/* EOD FAB */
.eod-fab{position:fixed;left:16px;bottom:calc(72px + var(--safe-b));width:52px;height:52px;border-radius:50%;background:var(--green-dim);color:var(--green);border:1px solid rgba(46,204,138,0.2);font-size:20px;box-shadow:0 4px 16px rgba(46,204,138,0.1);cursor:pointer;display:none;align-items:center;justify-content:center;z-index:50}
.eod-fab.show{display:flex}

/* TOAST */
.toast{position:fixed;bottom:calc(76px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);color:var(--t1);border:1px solid var(--border2);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:400;box-shadow:0 8px 24px rgba(0,0,0,0.3);font-weight:500;display:flex;align-items:center;gap:10px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.toast-undo-btn{padding:8px 18px;border-radius:20px;border:2px solid rgba(255,255,255,0.8);background:rgba(255,255,255,0.15);color:#fff;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:0.5px;min-height:44px;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

/* ── SWIPE ACTIONS ── */
.swipe-wrap{position:relative;overflow:hidden;touch-action:pan-y}
.swipe-action-left{
  position:absolute;left:0;top:0;bottom:0;width:90px;
  background:linear-gradient(135deg,#1A6B3C,#22A855);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:700;
  transform:translateX(-100%);
  transition:transform 0.25s ease;
  cursor:pointer;z-index:2;
}
.swipe-action-right{
  position:absolute;right:0;top:0;bottom:0;width:90px;
  background:linear-gradient(135deg,#8B1A1A,#CC2222);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:700;
  transform:translateX(100%);
  transition:transform 0.25s ease;
  cursor:pointer;z-index:2;
}
.swipe-wrap.open-right .swipe-action-right{
  transform:translateX(0);
}
.swipe-wrap .srow,
.swipe-wrap .bitem,
.swipe-wrap .trow{
  position:relative;z-index:1;
  transition:transform 0.2s ease;
  background:var(--glass);
}
.swipe-wrap.open-left .srow,
.swipe-wrap.open-left .bitem,
.swipe-wrap.open-left .trow{transform:translateX(90px)}
.swipe-wrap.open-left .swipe-action-left{transform:translateX(0)}
.swipe-wrap.open-right .srow,
.swipe-wrap.open-right .bitem,
.swipe-wrap.open-right .trow{transform:translateX(-90px)}
.swipe-wrap.open-right .swipe-action-right{transform:translateX(0)}

/* ── DRAGGABLE NAV ── */
.nb{cursor:grab}
.nb.dragging{opacity:0.5;cursor:grabbing}
.nb.drag-over{background:var(--accent-dim)}

/* ── CART STORE HEADER (bigger, not red) ── */
.cart-store-hdr{
  padding:12px 16px 8px;
  font-size:13px;font-weight:700;
  letter-spacing:0.5px;
  color:#fff;
  display:flex;align-items:center;gap:10px;
  margin-top:4px;
}
.cart-count{
  background:rgba(255,255,255,0.2);
  border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;
}
.cart-store-divider{
  height:3px;margin:0 0 2px;border-radius:2px;
}

/* ── QR CODE ── */
.qr-wrap{
  margin:12px 16px;
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;text-align:center;
}
.qr-title{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.qr-canvas{border-radius:8px;background:#fff;padding:8px}
.qr-url{font-size:11px;color:var(--t3);margin-top:8px;font-family:monospace}

/* PHOTO PREVIEW */
.photo-preview{width:100%;border-radius:var(--radius-sm);margin:8px 0;max-height:200px;object-fit:cover;display:none;border:1px solid var(--border)}

/* ── CREW CARS ── */
.car-list-item{display:flex;align-items:center;gap:14px;padding:15px 16px;background:var(--glass);border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
[data-theme="standard-night"] .car-list-item,[data-theme="standard-day"] .car-list-item{background:var(--bg2)}
.car-list-item:active{background:var(--glass2)}
.proc-nav-card{display:flex;align-items:center;gap:14px;padding:13px 16px;background:var(--glass);border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
.proc-nav-card:active{background:var(--glass2)}
.proc-nav-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.proc-nav-body{flex:1;min-width:0}
.proc-nav-title{font-size:14px;font-weight:700;color:var(--t1)}
.proc-nav-sub{font-size:12px;color:var(--t3);margin-top:2px}
.proc-nav-arr{color:var(--border2);font-size:20px;flex-shrink:0}
.car-icon{width:44px;height:44px;border-radius:50%;background:var(--accent-dim);border:1.5px solid var(--accent-border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.car-status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.car-detail-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:15}
.log-entry{display:flex;align-items:flex-start;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border)}
.log-dot{width:10px;height:10px;border-radius:50%;margin-top:4px;flex-shrink:0}
.log-type{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:0.5px}
.log-val{font-size:14px;color:var(--t1);font-weight:600;margin-top:2px}
.log-date{font-size:11px;color:var(--t3);margin-top:1px}
.stat-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center;flex:1}
.stat-label{font-size:10px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.stat-val{font-size:15px;font-weight:700;color:var(--t1)}
.stat-date{font-size:10px;color:var(--t3);margin-top:3px}
/* audit */

// ── SWIPE BACK (left-edge → right) ────────────────────────────────
function slideBack(fn) {
  const el = document.getElementById('content');
  fn();
  el.classList.remove('slide-in-left');
  void el.offsetWidth; // force reflow so animation restarts
  el.classList.add('slide-in-left');
  setTimeout(() => el.classList.remove('slide-in-left'), 200);
}

function handleSwipeBack() {
  if(S.pastAuditView !== null) { slideBack(()=>{ S.pastAuditView=null; S.crewCarsView='list'; render(); }); return true; }
  if(S.crewCarsView && S.crewCarsView !== 'list') { slideBack(backToCarList); return true; }
  if(S.crewCarsView === 'list') { slideBack(backToProcs); return true; }
  if(S.auditsView) { slideBack(()=>{ S.auditsView=false; render(); }); return true; }
  if(S.procView !== null) { slideBack(()=>{ S.procView=null; render(); }); return true; }
  if(S.inDay) { slideBack(backWeek); return true; }
  if(S.shopView === 'cart') { slideBack(()=>{ S.shopView='list'; renderShopping(document.getElementById('content')); }); return true; }
  return false;
}

function setupSwipeBack() {
  // Invisible 40px-wide hit zone pinned to the left edge, sits above all content
  const zone = document.createElement('div');
  zone.style.cssText = 'position:fixed;top:0;left:0;width:40px;height:100%;z-index:9999;touch-action:pan-y';
  document.body.appendChild(zone);

  let startX=0, startY=0;
  zone.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, {passive:true});
  zone.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - startX;
    const dy = Math.abs(e.changedTouches[0].clientY - startY);
    if(dx > 60 && dy < dx * 0.9) { haptic('light'); handleSwipeBack(); }
  }, {passive:true});
}

// ── PULL TO REFRESH ────────────────────────────────────────────────
function setupPullToRefresh() {
  const content=document.getElementById('content');
  const ptr=document.getElementById('ptr');
  let startY=0, pulling=false;
  content.addEventListener('touchstart',e=>{
    if(content.scrollTop===0) startY=e.touches[0].clientY;
  },{passive:true});
  content.addEventListener('touchmove',e=>{
    if(!startY) return;
    const dy=e.touches[0].clientY-startY;
    if(dy>40&&content.scrollTop===0){pulling=true;ptr.classList.add('active');}
  },{passive:true});
  content.addEventListener('touchend',async()=>{
    if(pulling){
      pulling=false; startY=0;
      await syncAll();
      ptr.classList.remove('active');
    } else { startY=0; }
  });
}

function setupSwipe(el, onDelete) {
  let startX=0, currentX=0, swiping=false;
  const inner=el.querySelector('.trow');
  const bg=el.querySelector('.trow-del-bg');
  if(!inner||!bg) return;
  inner.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;swiping=true;},{passive:true});
  inner.addEventListener('touchmove',e=>{
    if(!swiping) return;
    currentX=e.touches[0].clientX-startX;
    if(currentX<0) inner.style.transform=`translateX(${Math.max(currentX,-80)}px)`;
  },{passive:true});
  inner.addEventListener('touchend',()=>{
    swiping=false;
    if(currentX<-50){
      inner.style.transform='translateX(-80px)';
      bg.style.display='flex';
    } else {
      inner.style.transform='';
      bg.style.display='none';
    }
    currentX=0;
  });
  bg.addEventListener('click',()=>{
    inner.style.transform=''; bg.style.display='none';
    onDelete();
  });
}

const TAB_GIDS = {
  '☀ Sunday':'988129596','1️⃣ Monday':'870064718','2️⃣ Tuesday':'967437930',
  '3️⃣ Wednesday':'2051648255','4️⃣ Thursday':'966380382','5️⃣ Friday':'126145842',

async function fetchDay(tabName) {
  // Preserve current done states so the re-render after fetch doesn't flash unchecked
  const prevDone = {};
  (S.tasks[tabName]||[]).forEach(t => { prevDone[fsKey(t.task)] = t.done; });

  // ── Firestore path ───────────────────────────────────────────────
  if(S.tasksSource === 'firestore' && db) {
    try {
      const snap = await db.collection('tasks').doc(tabName).get();
      if(snap.exists && snap.data().migrated === true) {
        S.tasks[tabName] = (snap.data().tasks || []).map(t => ({...t, done: false}));
        // Re-apply done states
        S.tasks[tabName].forEach(t => { if(fsKey(t.task) in prevDone) t.done = prevDone[fsKey(t.task)]; });
        // Apply any cached taskState that arrived before content loaded
        if(_cachedTaskState) {
          const today = new Date().toDateString();
          if(!_cachedTaskState._date || _cachedTaskState._date === today) {
            S.tasks[tabName].forEach(t => { const v=_cachedTaskState[fsKey(t.task)]; if(v!==undefined) t.done=v; });
          }
        }
        _cacheTasksLocal(tabName);
        return;
      }
    } catch(e) { console.log('fetchDay Firestore error:', e); }
    // Fall through to Sheets if doc missing or not migrated
  }

  // ── Sheets path (default) ────────────────────────────────────────
  try {
    const gid = TAB_GIDS[tabName];
    const url = gid
      ? `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`
      : `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
    const text=(await (await fetch(url)).text());
    const json=JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table?.rows||[];
    const cols=json.table?.cols||[];
    const tasks=[]; let area='';
    rows.forEach(row=>{
      const v=cols.map((_,i)=>{const c=row.c?.[i];return c?String(c.v??c.f??'').trim():'';});
      const colA=v[0]||'', colB=v[1]||'', colC=v[2]||'', colD=v[3]||'';
      if(!colA && !colB) return;
      const isNum = !isNaN(parseInt(colA)) && parseInt(colA)>0;
      if(!isNum && !colB && colA && colA!==colA.toLowerCase() && colA.length>2 && !colA.includes('SPECIAL')) {
        area=colA.toUpperCase(); return;
      }
      if(!isNum && colB && colB!==colB.toLowerCase() && colB.length>2 && !colB.includes('SPECIAL') && !colB.includes('📝') && !colB.includes('Note')) {
        area=colB.toUpperCase(); return;
      }
      if(colB.toUpperCase().includes('SPECIAL NOTES')||colB.includes('📝')) return;
      if(colB==='Task'||colA==='#') return;
      if(isNum && colB && !colB.toLowerCase().includes('clean aircraft')) tasks.push({task:colB,freq:colC,area,done:false});
    });
    S.tasks[tabName] = tasks;
    S.tasks[tabName].forEach(t => { if(fsKey(t.task) in prevDone) t.done = prevDone[fsKey(t.task)]; });
  } catch(e){ S.tasks[tabName]=S.tasks[tabName]||fallback(); }
  _cacheTasksLocal(tabName);
}

function _cacheTasksLocal(tabName) {
  try {
    const cached = JSON.parse(localStorage.getItem('gykf_tasks')||'{}');
    cached[tabName] = S.tasks[tabName];
    cached._date = new Date().toDateString();
    localStorage.setItem('gykf_tasks', JSON.stringify(cached));
  } catch(e) {}
}

async function fetchShopping() {
  try {
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=441663137`;
    const text=(await (await fetch(url)).text());
    const json=JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table?.rows||[], cols=json.table?.cols||[];
    // Normalize cabinet names at fetch time
    const normCabinet = (s) => {
      if(!s) return '';
      s = s.trim();
      // Standardize MX Hangar variations
      if(/mx\s*han[gh]?[ae]r/i.test(s)) return 'MX Hangar';
      if(/mx\s*office/i.test(s)) return 'MX Office';
      if(/crew\s*house/i.test(s)) return 'Crew House';
      if(/jet/i.test(s)) return "Jet's Cabinet"; // normalize all Jet variations
      if(/cr\s*(groomer|corner)/i.test(s)) return "CR Groomers' Corner";
      if(/cr\s*office/i.test(s)) return 'CR Office';
      if(/metro/i.test(s)) return 'Metro Cabinet';
      return s;
    };
    S.shopping=rows.map(row=>{
      const v=cols.map((_,i)=>{const c=row.c?.[i];return c?String(c.v??c.f??'').trim():'';});
      return {item:v[0],cabinet:normCabinet(v[1]),store:v[2],status:v[3],notes:v[4]||'',checked:v[3]==='To Buy'};
    }).filter(r=>r.item&&r.item!=='Item'&&!r.item.startsWith('💡')&&!r.item.startsWith('TO SHOP')&&r.item.length>1);
  } catch(e){S.shopping=S.shopping||[];}
  restoreShoppingState(); // overlay local checked state
}

// Pulls the current Shopping and Contacts sheet rows and upserts them into
// Firestore. Use after a bulk-edit session in Sheets (pasting many rows is
// easier there than typing them into the app one at a time). Safe to run
// repeatedly — matching items/contacts are updated, not duplicated.
async function importFromSheets() {
  if(!db) { toast('Firestore not available — check your connection'); return; }
  if(!confirm('Import current Shopping + Contacts sheet rows into the live app?\n\nThis adds new items and updates existing ones with matching names — it won\'t remove anything.')) return;
  toast('Importing from Sheets...');
  try {
    await fetchShopping();
    const shopBatch = db.batch();
    S.shopping.forEach(item=>{
      const id = fsDocId(item.item+'__'+item.store);
      shopBatch.set(db.collection('shoppingCatalog').doc(id), {item:item.item, cabinet:item.cabinet, store:item.store, notes:item.notes||''}, {merge:true});
    });
    await shopBatch.commit();

    await fetchContacts();
    const conBatch = db.batch();
    S.contacts.forEach(c=>{
      const id = fsDocId(c.name);
      conBatch.set(db.collection('contacts').doc(id), {name:c.name, address:c.address||'', notes:c.notes||'', phone:c.phone||'', role:c.role||'', code:c.code||''}, {merge:true});
    });
    await conBatch.commit();

    toast('✅ Imported from Sheets — live everywhere now');
  } catch(e) {
    console.error('importFromSheets failed:', e);
    toast('❌ Import failed — check console');
  }
}

// ── FLIGHT LOG ────────────────────────────────────────────────────
function flightLogKey(tabName) { return 'fl_'+tabName; }

function loadFlightLog(tabName) {
  if(S.flightLog[tabName]) return;
  try {
    const cached=JSON.parse(localStorage.getItem(flightLogKey(tabName))||'null');
    const today=new Date().toDateString();
    if(cached && cached.date===today) {
      // Guarantee all three arrays exist even if cached before grm was added
      cached.arr=cached.arr||[]; cached.dep=cached.dep||[]; cached.grm=cached.grm||[];
      S.flightLog[tabName]=cached; return;
    }
  } catch(e){}
  S.flightLog[tabName]={arr:[],dep:[],grm:[],date:new Date().toDateString()};
}

function saveFlightLog(tabName) {
  const log=S.flightLog[tabName]; if(!log) return;
  log.date=new Date().toDateString();
  try { localStorage.setItem(flightLogKey(tabName),JSON.stringify(log)); } catch(e){}
  if(!db) return;
  db.collection('taskState').doc(tabName).set(
    {_arr:log.arr, _dep:log.dep, _grm:log.grm||[], _flDate:log.date}, {merge:true}
  ).catch(e=>console.log('saveFlightLog failed:',e));
}

function flightLogFromFirestore(tabName, data) {
  const today=new Date().toDateString();
  if(data._flDate && data._flDate!==today) return;
  if(!S.flightLog[tabName]) S.flightLog[tabName]={arr:[],dep:[],date:today};
  if(data._arr) S.flightLog[tabName].arr=[...new Set(data._arr)];
  if(data._dep) S.flightLog[tabName].dep=[...new Set(data._dep)];
  if(data._grm) S.flightLog[tabName].grm=[...new Set(data._grm)];
}

function addTail(tabName, type, tail) {
  tail=(tail||'').trim().toUpperCase(); if(!tail) return;
  loadFlightLog(tabName);
  const log=S.flightLog[tabName];
  if(!log[type]) log[type]=[];
  if(!log[type].includes(tail)) log[type]=[...log[type],tail];
  saveFlightLog(tabName);
  reRenderDayView();
}

function removeTail(tabName, type, tail) {
  loadFlightLog(tabName);
  S.flightLog[tabName][type]=S.flightLog[tabName][type].filter(t=>t!==tail);
  saveFlightLog(tabName);
  reRenderDayView();
}

function reRenderDayView() {
  const el=document.getElementById('content');
  if(S.tab==='today') renderToday(el);
  else renderDayDetail(el);
}

function toggleFlightDropdown(tabName, type) {
  if(S.flightDropdown && S.flightDropdown.tabName===tabName && S.flightDropdown.type===type)
    S.flightDropdown=null;
  else S.flightDropdown={tabName,type};
  reRenderDayView();
}

function fuelTankSvg(value, size=38) {
  const LEVELS = {'Empty':0,'1/4':0.25,'1/2':0.5,'3/4':0.75,'Full':1};
  const pct = LEVELS[value] ?? -1;
  const W=44, H=36, bx=4, by=11, bw=30, bh=22, rx=4;
  const fillH = pct>=0 ? Math.round(bh*pct) : 0;
  const fillY = by + bh - fillH;
  const col = pct<0?'var(--t3)':pct>=0.5?'#27ae60':pct>=0.25?'#f1c40f':'#c0392b';
  return `<svg viewBox="0 0 ${W} ${H}" width="${size}" height="${Math.round(size*H/W)}" style="display:block;flex-shrink:0">
    <rect x="${bx}" y="${by}" width="${bw}" height="${bh}" rx="${rx}" fill="var(--border2)" opacity="0.5"/>
    ${pct>0?`<rect x="${bx}" y="${fillY}" width="${bw}" height="${fillH}" rx="${rx}" fill="${col}" opacity="0.9"/>`:''}
    <rect x="${bx+5}" y="${by-5}" width="${bw-10}" height="6" rx="2" fill="var(--t3)" opacity="0.5"/>
    <rect x="${bx+bw}" y="${by+4}" width="8" height="4" rx="2" fill="var(--t3)" opacity="0.5"/>
    <rect x="${bx+bw+6}" y="${by}" width="4" height="8" rx="2" fill="var(--t3)" opacity="0.4"/>
  </svg>`;
}

function regExpiredColor(iso) {
  if(!iso) return 'var(--t3)';
  const diff = Math.floor((new Date(iso) - new Date()) / 86400000);
  return diff < 0 ? 'var(--red)' : diff < 30 ? '#E8A000' : 'var(--green)';
}

// Status dot colour: green = logged recently, amber = >2 weeks, red = >4 weeks or never
function carStatusColor(dateStr) {
  if(!dateStr) return 'var(--red)';
  const days = Math.floor((Date.now()-new Date(dateStr).getTime())/86400000);
  if(days<=14) return 'var(--green)';
  if(days<=28) return '#E8A000';
  return 'var(--red)';
}
function daysSince(dateStr) {
  if(!dateStr) return null;
  return Math.floor((Date.now()-new Date(dateStr).getTime())/86400000);
}
function fmtDate(dateStr) {
  if(!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('en-CA',{month:'short',day:'numeric',year:'numeric'});
}

  if(S.crewCarsFromAudits) { S.auditsView=true; S.crewCarsFromAudits=false; }
  render();
}

// ── RENDER: CREW CARS LIST ────────────────────────────────────
function carSquareIcon(car, size=48, radius=10) {
  const fallback=`background:linear-gradient(145deg,${car.color},${car.color2});display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.42)}px`;
  return `<div style="width:${size}px;height:${size}px;border-radius:${radius}px;overflow:hidden;flex-shrink:0;box-shadow:0 2px 8px ${car.color}55;background:linear-gradient(145deg,${car.color},${car.color2})">
    <img src="${car.img}" alt="${car.name}" style="width:100%;height:100%;object-fit:contain;padding:4px"
      onerror="this.parentNode.innerHTML='<div style=\\'width:100%;height:100%;${fallback}\\'>${car.fuel==='diesel'?'🚜':'🚗'}</div>'">
  </div>`;
}

  let html=`
    <div class="car-detail-bar" style="background:var(--bg2);cursor:pointer" onclick="backToProcs()">

      <span style="font-size:15px;font-weight:600;color:var(--t1);flex:1">Crew Cars</span>
      <button onclick="event.stopPropagation();openQrWindow('https://aristihernandez-svg.github.io/groomers-ykf/crew-access.html','Crew Car Update','Scan to update fuel level and KM after using a crew car.')"
        style="background:var(--glass2);border:1px solid var(--border2);border-radius:8px;padding:6px 10px;color:var(--t1);font-size:12px;font-weight:600;cursor:pointer">🔗 QR</button>
    </div>`;

  const alreadyArchived=S.pastAudits.some(a=>a.month===month);
  const pct=Math.round(auditDone/CREW_CARS.length*100);
  html+=`
    <div style="padding:12px 14px;background:var(--glass2);border-bottom:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-size:12px;font-weight:600;color:var(--t2)">📋 ${month} Audit</span>
        <span style="font-size:12px;font-weight:700;color:${allDone?'var(--green)':'var(--t1)'}">${auditDone}/${CREW_CARS.length} done</span>
      </div>
      <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:${allDone&&!alreadyArchived?'10px':'0'}">

    </div>`;

    const ckA=parseInt(da.currentKm)||0, nsA=parseInt(da.nextServiceKm)||0;
    const ckB=parseInt(db2.currentKm)||0, nsB=parseInt(db2.nextServiceKm)||0;
    const oilA=ckA>0&&nsA>0&&(nsA-ckA)<=500;

// ── LOG ENTRY MODALS ──────────────────────────────────────────
let _fuelGaugeKey = null;
let _fuelGaugeValue = null;

const FUEL_STOPS = [
  {label:'E',  value:'Empty', pct:0},
  {label:'¼',  value:'1/4',  pct:0.25},
  {label:'½',  value:'1/2',  pct:0.5},
  {label:'¾',  value:'3/4',  pct:0.75},
  {label:'F',  value:'Full', pct:1},
];

function openFuelGauge(key) {
  _fuelGaugeKey = key;
  const d = carData(key);
  const lastFuel = d.log.filter(l=>l.type==='fuel').slice(-1)[0];
  const initStop = FUEL_STOPS.find(s=>s.value===lastFuel?.value) || FUEL_STOPS[2];
  _fuelGaugeValue = initStop.value;

  const W=300, H=170, cx=W/2, cy=H-14, R=110;
  // pct 0→1 maps to angle -180°→0° on the unit circle (left to right semicircle)
  function pctToXY(pct, r){ const a = Math.PI - pct*Math.PI; return [cx + r*Math.cos(a), cy - r*Math.sin(a)]; }
  function pctToAngleDeg(pct){ return -180 + pct*180; } // for needle rotation relative to pointing up

  // Track arc (full semicircle)
  const [tx0,ty0]=pctToXY(0,R), [tx1,ty1]=pctToXY(1,R);

  // Fill arc up to initStop.pct
  function fillArc(pct){
    if(pct<=0) return '';
    const [fx,fy]=pctToXY(pct,R);
    return `<path id="fuelFill" d="M${tx0},${ty0} A${R},${R} 0 0,1 ${fx},${fy}" stroke="url(#fuelGrad)" stroke-width="16" fill="none" stroke-linecap="round"/>`;
  }

  // Label positions
  const labelHTML = FUEL_STOPS.map(s=>{
    const [lx,ly]=pctToXY(s.pct, R+22);
    return `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="var(--t3)">${s.label}</text>`;
  }).join('');

  // Tick marks
  const tickHTML = FUEL_STOPS.map(s=>{
    const [ix,iy]=pctToXY(s.pct,R-10);
    const [ox,oy]=pctToXY(s.pct,R+10);
    return `<line x1="${ix}" y1="${iy}" x2="${ox}" y2="${oy}" stroke="var(--border2)" stroke-width="2"/>`;
  }).join('');

  // Needle pivot at cx,cy; points upward then rotates
  // At pct=0 (E) needle points left (-90° from up = rotate(-90deg))
  // At pct=1 (F) needle points right (+90°)
  // So rotation = (pct - 0.5)*180 degrees
  const initRot = (initStop.pct - 0.5)*180;
  const [ndx,ndy]=pctToXY(initStop.pct,R);

  const gaugeHTML=`
  <div style="background:var(--bg3);border-radius:16px;padding:16px 8px 8px;user-select:none">
    <svg id="fuelGaugeSvg" viewBox="0 0 ${W} ${H}" width="100%" style="display:block;touch-action:none;overflow:visible">
      <defs>
        <linearGradient id="fuelGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#c0392b"/>
          <stop offset="40%" stop-color="#f1c40f"/>
          <stop offset="100%" stop-color="#27ae60"/>
        </linearGradient>
      </defs>
      <!-- Track -->
      <path d="M${tx0},${ty0} A${R},${R} 0 1,1 ${tx1},${ty1}" stroke="var(--border)" stroke-width="16" fill="none" stroke-linecap="round"/>
      <!-- Fill -->
      ${fillArc(initStop.pct)}
      ${tickHTML}
      ${labelHTML}
      <!-- Needle -->
      <g id="fuelNeedle" style="transform-origin:${cx}px ${cy}px;transform:rotate(${initRot}deg);transition:transform 0.15s ease">
        <line x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy-R+14}" stroke="var(--gold)" stroke-width="3.5" stroke-linecap="round"/>
      </g>
      <circle cx="${cx}" cy="${cy}" r="8" fill="var(--gold)"/>
      <circle id="fuelDot" cx="${ndx}" cy="${ndy}" r="9" fill="var(--gold)" stroke="var(--bg3)" stroke-width="2"/>
      <!-- Invisible drag surface covering full semicircle area -->
      <rect x="0" y="0" width="${W}" height="${H}" fill="transparent"
        id="fuelDragZone"
        onmousedown="_fuelDragStart(event)" ontouchstart="_fuelDragStart(event)"/>
    </svg>
    <div id="fuelReadout" style="text-align:center;font-size:26px;font-weight:800;color:var(--gold);margin-top:2px;letter-spacing:1px">${initStop.value}</div>
    <div style="text-align:center;font-size:11px;color:var(--t3);margin-top:2px">Drag the needle · tap outside to save</div>
  </div>`;

  document.getElementById('mTitle').textContent='⛽ Fuel Level';
  document.getElementById('mFields').innerHTML=gaugeHTML;
  document.getElementById('mSave').style.display='none';
  S.mCtx=null;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('overlay').onclick=(e)=>{
    if(!document.getElementById('modal').contains(e.target)) _saveFuelAndClose();
  };
  // Attach drag listeners after render
  setTimeout(()=>_fuelAttachDrag(cx,cy,R,W,H),50);
}

function _fuelAttachDrag(cx,cy,R,W,H){
  const svg=document.getElementById('fuelGaugeSvg');
  if(!svg) return;
  let dragging=false;

  function pctFromEvent(e){
    const rect=svg.getBoundingClientRect();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    const scaleX=W/rect.width;
    const sx=(clientX-rect.left)*scaleX;
    const sy=(clientY-rect.top)*(H/rect.height);
    // Angle from cx,cy — atan2 gives angle in radians; map to pct
    const dx=sx-cx, dy=cy-sy; // dy inverted (SVG y-down)
    let angle=Math.atan2(dy,dx); // -π to π; 0=right, π=left
    // Clamp to top semicircle: angle between 0 and π
    angle=Math.max(0,Math.min(Math.PI,angle));
    return 1 - angle/Math.PI; // pct: angle=π→0(E), angle=0→1(F)
  }

  function applyPct(pct){
    pct=Math.max(0,Math.min(1,pct));
    // Snap to nearest stop
    const stop=FUEL_STOPS.reduce((a,b)=>Math.abs(b.pct-pct)<Math.abs(a.pct-pct)?b:a);
    if(stop.value===_fuelGaugeValue) return;
    _fuelGaugeValue=stop.value;
    // Update needle
    const rot=(stop.pct-0.5)*180;
    const needle=document.getElementById('fuelNeedle');
    if(needle) needle.style.transform=`rotate(${rot}deg)`;
    // Update dot
    const a=Math.PI - stop.pct*Math.PI;
    const dx=cx+R*Math.cos(a), dy=cy-R*Math.sin(a);
    const dot=document.getElementById('fuelDot');
    if(dot){dot.setAttribute('cx',dx);dot.setAttribute('cy',dy);}
    // Update fill arc
    const [tx0,ty0]=[cx+R*Math.cos(Math.PI), cy];
    const [fx,fy]=[dx,dy];
    const fillEl=document.getElementById('fuelFill');
    if(fillEl){
      if(stop.pct<=0){fillEl.setAttribute('d','');}
      else{fillEl.setAttribute('d',`M${tx0},${ty0} A${R},${R} 0 0,1 ${fx},${fy}`);}
    }
    // Update readout
    const r=document.getElementById('fuelReadout');
    if(r) r.textContent=stop.value;
    haptic('light');
  }

  svg.addEventListener('touchstart',e=>{dragging=true;applyPct(pctFromEvent(e));e.preventDefault();},{passive:false});
  svg.addEventListener('touchmove',e=>{if(dragging){applyPct(pctFromEvent(e));e.preventDefault();}},{passive:false});
  svg.addEventListener('touchend',()=>{dragging=false;},{passive:true});
  svg.addEventListener('mousedown',e=>{dragging=true;applyPct(pctFromEvent(e));});
  window.addEventListener('mousemove',e=>{if(dragging)applyPct(pctFromEvent(e));});
  window.addEventListener('mouseup',()=>{dragging=false;});
}

function _saveFuelAndClose(){
  document.getElementById('overlay').onclick=(e)=>{
    if(!document.getElementById('modal').contains(e.target)) closeModal();
  };
  if(!_fuelGaugeKey||!_fuelGaugeValue){closeModal();return;}
  const key=_fuelGaugeKey, value=_fuelGaugeValue;
  _fuelGaugeKey=null; _fuelGaugeValue=null;
  const today=localDateISO();
  const logged=new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
  const d=carData(key);
  d.log.push({type:'fuel',value,date:today,logged});
  d.fuel=value;

  closeModal();
  renderCarDetail(document.getElementById('content'),key);
  toast(`⛽ Fuel logged — ${value}`);
}

function openCarCalendar(key, type){
  const label=type==='oil'?'🛢 Oil Change':type==='wash'?'🧹 Washed':type==='reg'?'📄 Registration Expiry':type==='insurance'?'🛡 Insurance Expiry':'Calendar';
  const today=localDateISO();
  // Build a full month calendar
  const now=new Date();
  let _calYear=now.getFullYear(), _calMonth=now.getMonth();

  function buildCal(yr,mo){
    const first=new Date(yr,mo,1).getDay();
    const days=new Date(yr,mo+1,0).getDate();
    const monthName=new Date(yr,mo,1).toLocaleString('en-CA',{month:'long',year:'numeric'});
    let g=`<div style="background:var(--bg3);border-radius:16px;padding:14px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <button onclick="_calNav(-1,'${key}','${type}')" style="background:none;border:none;color:var(--accent);font-size:22px;cursor:pointer;padding:4px 10px">‹</button>
        <span style="font-size:14px;font-weight:700;color:var(--t1)">${monthName}</span>
        <button onclick="_calNav(1,'${key}','${type}')" style="background:none;border:none;color:var(--accent);font-size:22px;cursor:pointer;padding:4px 10px">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">
        ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div style="font-size:10px;font-weight:600;color:var(--t3);padding:4px 0">${d}</div>`).join('')}
        ${Array(first).fill('<div></div>').join('')}
        ${Array.from({length:days},(_,i)=>{
          const dd=i+1;
          const iso=`${yr}-${String(mo+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
          const isToday=iso===today;
          return `<div onclick="_calPick('${key}','${type}','${iso}')" style="padding:7px 2px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;${isToday?'background:var(--accent);color:var(--bg)':'color:var(--t1)'}">${dd}</div>`;
        }).join('')}
      </div>
    </div>`;
    return g;
  }

  window._calState={key,type,yr:_calYear,mo:_calMonth};
  openModal(label, buildCal(_calYear,_calMonth));
  document.getElementById('mSave').style.display='none';
}

window._calNav=function(dir,key,type){
  const s=window._calState;
  s.mo+=dir;
  if(s.mo>11){s.mo=0;s.yr++;}
  if(s.mo<0){s.mo=11;s.yr--;}
  // Rebuild calendar in place
  const today=localDateISO();
  const first=new Date(s.yr,s.mo,1).getDay();
  const days=new Date(s.yr,s.mo+1,0).getDate();
  const monthName=new Date(s.yr,s.mo,1).toLocaleString('en-CA',{month:'long',year:'numeric'});
  const label=type==='oil'?'🛢 Oil Change':'🧹 Washed';
  let g=`<div style="background:var(--bg3);border-radius:16px;padding:14px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button onclick="_calNav(-1,'${key}','${type}')" style="background:none;border:none;color:var(--accent);font-size:22px;cursor:pointer;padding:4px 10px">‹</button>
      <span style="font-size:14px;font-weight:700;color:var(--t1)">${monthName}</span>
      <button onclick="_calNav(1,'${key}','${type}')" style="background:none;border:none;color:var(--accent);font-size:22px;cursor:pointer;padding:4px 10px">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">
      ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div style="font-size:10px;font-weight:600;color:var(--t3);padding:4px 0">${d}</div>`).join('')}
      ${Array(first).fill('<div></div>').join('')}
      ${Array.from({length:days},(_,i)=>{
        const dd=i+1;
        const iso=`${s.yr}-${String(s.mo+1).padStart(2,'0')}-${String(dd).padStart(2,'0')}`;
        const isToday=iso===today;
        return `<div onclick="_calPick('${key}','${type}','${iso}')" style="padding:7px 2px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;${isToday?'background:var(--accent);color:var(--bg)':'color:var(--t1)'}">${dd}</div>`;
      }).join('')}
    </div>
  </div>`;
  document.getElementById('mTitle').textContent=label;
  document.getElementById('mFields').innerHTML=g;
};

window._calPick=function(key,type,iso){
  const logged=new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
  const d=carData(key);
  if(type==='reg'){
    d.regExpiry=iso; saveCrewCarData(); closeModal();
    renderCarDetail(document.getElementById('content'),key);
    toast(`📄 Registration expiry set — ${iso}`); return;
  }
  if(type==='insurance'){
    d.insuranceExpiry=iso; saveCrewCarData(); closeModal();
    renderCarDetail(document.getElementById('content'),key);
    toast(`🛡 Insurance expiry set — ${iso}`); return;
  }
  const value=type==='oil'?'Oil changed':'Washed';
  d.log.push({type,value,date:iso,logged});
  if(type==='oil') d.oilChange=iso;
  if(type==='wash') d.washed=iso;
  saveCrewCarData();
  closeModal();
  renderCarDetail(document.getElementById('content'),key);
  toast(type==='oil'?`🛢 Oil change logged — ${iso}`:`🧹 Wash logged — ${iso}`);
};

function deleteAuditMonth(month) {
  if(!checkAdminPin('delete the entire '+month+' audit')) return;
  if(!confirm(`Delete the complete ${month} audit? This removes all cars and photos permanently.`)) return;
  if(!db){toast('No connection');return;}
  const batch=db.batch();
  batch.delete(db.collection('auditArchive').doc(month));
  CREW_CARS.forEach(c=>batch.delete(db.collection('auditCars').doc(month+'-'+c.key)));
  batch.commit()
    .then(()=>{
      S.pastAudits=S.pastAudits.filter(a=>a.month!==month);
      CREW_CARS.forEach(c=>{ delete S.carAudits[month+'-'+c.key]; });
      try { localStorage.setItem('gykf_caudits',JSON.stringify(S.carAudits)); } catch(e){}
      S.crewCarsView='list'; S.pastAuditView=null;
      render(); toast('🗑 Audit deleted');
    })
    .catch(e=>{ console.log('deleteAuditMonth failed:',e); toast('Delete failed'); });
}

function deleteCarAudit(month, carKey) {
  const car=CREW_CARS.find(c=>c.key===carKey);
  if(!checkAdminPin('delete '+car?.name+' from the '+month+' audit')) return;
  if(!confirm(`Delete ${car?.name}'s audit for ${month}?`)) return;
  if(!db){toast('No connection');return;}
  db.collection('auditCars').doc(month+'-'+carKey).delete()
    .then(()=>{
      delete S.carAudits[month+'-'+carKey];
      try { localStorage.setItem('gykf_caudits',JSON.stringify(S.carAudits)); } catch(e){}
      render(); toast('🗑 '+car?.name+' audit deleted');
    })
    .catch(e=>{ console.log('deleteCarAudit failed:',e); toast('Delete failed'); });
}

function renderContactsList(q) {
  // Categorize contacts
  // Fixed categories — don't rely on heuristics
  const STORE_NAMES  = ['zehrs','costco','a1 cash','home depot','canadian tire',
                        'monarch','aviation supplier','jsa','aircraft spruce',
                        'crew house','laundry'];
  const CODE_NAMES   = ['code mx','code cr','code lock','code medic','ramp hanger','gate'];
  const PERSON_NAMES = ['wes','josh','keddy'];

  let stores  = [];
  let codes   = [];
  let persons = [];

  S.contacts.forEach(c => {
    const n = c.name.toLowerCase();
    if (PERSON_NAMES.some(p => n.includes(p)) || c.phone || c.role) {
      persons.push(c);
    } else if (CODE_NAMES.some(k => n.includes(k)) || /code/i.test(c.name)) {
      codes.push(c);
    } else {
      stores.push(c);
    }
  });

  // Apply search filter
  const filterFn = c => !q ||
    c.name.toLowerCase().includes(q) ||
    (c.address||'').toLowerCase().includes(q) ||
    (c.notes||'').toLowerCase().includes(q);

  stores  = stores.filter(filterFn);
  codes   = codes.filter(filterFn);
  persons = persons.filter(filterFn);

  let html = '';

function renderBored(el) {
  setBarLogo();
  showFab(openAddBored);
  if(!S.bored.length) {
    el.innerHTML=`<div class="empty"><div class="empty-icon">💡</div>
      <p>No tasks yet. Tap + to add.</p></div>`; return;
  }

  const noteColors = [
    {bg:'#FFF59D',fold:'rgba(0,0,0,0.13)'},
    {bg:'#B3E5FC',fold:'rgba(0,0,0,0.12)'},
    {bg:'#C8E6C9',fold:'rgba(0,0,0,0.12)'},
    {bg:'#FFCCBC',fold:'rgba(0,0,0,0.13)'},
    {bg:'#E1BEE7',fold:'rgba(0,0,0,0.12)'},
    {bg:'#F8BBD0',fold:'rgba(0,0,0,0.12)'},
  ];
  const FOLD = 24; // px

  let html = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px 12px 90px">`;

  S.bored.forEach((b, i) => {
    const {bg, fold} = noteColors[i % noteColors.length];
    const rot = (i%2===0 ? -1 : 1) * (0.4 + (i%4)*0.25);
    html += `
    <div data-id="${b.id}" onclick="toggleBoredById('${b.id}')"
      style="
        position:relative;
        background-color:${bg};
        background-image:linear-gradient(225deg,${fold} ${FOLD}px,transparent ${FOLD}px);
        border-radius:4px 4px 0 4px;
        padding:13px 11px ${FOLD+6}px 13px;
        min-height:96px;
        transform:rotate(${rot}deg);
        box-shadow:3px 4px 14px rgba(0,0,0,0.26);
        cursor:pointer;
        transition:transform 0.15s,box-shadow 0.15s;
        ${b.done?'opacity:0.42':''}
      ">
      <div style="font-size:13px;font-weight:600;color:#1c1c1c;line-height:1.45;
                  ${b.done?'text-decoration:line-through;color:#555':''}">
        ${b.task}
      </div>
      <div style="position:absolute;bottom:7px;right:9px;display:flex;gap:6px">
        <span onclick="event.stopPropagation();editBoredItem('${b.id}')"
              style="font-size:14px;opacity:0.35;cursor:pointer">✏️</span>
        <span onclick="event.stopPropagation();deleteBoredItem('${b.id}')"
              style="font-size:14px;opacity:0.35;cursor:pointer">🗑</span>
      </div>
    </div>`;
  });

  html += `</div>`;
  el.innerHTML = html;
}

function toggleBoredById(id) {
  const idx = S.bored.findIndex(b=>String(b.id)===String(id));
  if(idx<0) return;
  S.bored[idx].done=!S.bored[idx].done;
  haptic(); api({action:'toggleBored',task:S.bored[idx].task});
  fsSetBoredDone(S.bored[idx].task, S.bored[idx].done);
  localStorage.setItem('gykf_bored',JSON.stringify(S.bored));
  renderBored(document.getElementById('content'));
  toast(S.bored[idx].done?'✓ Done!':'Unchecked');
}

function _doToggleShop(idx) {
  const item = S.shopping[idx];
  item.checked = !item.checked;
  item.status = item.checked ? 'To Buy' : 'In Stock';
  haptic('medium');
  saveShoppingState();
  _lastShopWrite = Date.now();
  fsSetShopState(item.item, item.checked, item.status);
  renderShopping(document.getElementById('content'));
  if(item.checked) {
    broadcastNotif('🛒 Shopping', `${item.item} needs restocking`, 'shopping');
    toast(S.buyerOut ? '🔔 Added to list — buyer is out and will see this!' : '🔴 Needs restocking');
  } else {
    toast('✅ Marked as In Stock');
  }

function changeQty(idx, delta) {
  const item = S.shopping[idx];
  if(!item) return;
  item.qty = Math.max(1, (item.qty||1) + delta);
  saveShoppingState();
  fsSetShopState(item.item, item.checked, item.status, item.qty);
  renderShopping(document.getElementById('content'));
}

function setBuyerOut(active) {
  S.buyerOut = active;
  if(db) {
    if(active) {
      db.collection('shopSession').doc('active').set({active:true, ts:firebase.firestore.FieldValue.serverTimestamp()})
        .catch(e=>console.log('setBuyerOut failed:', e));
      toast('🚗 Marked as out shopping — others will be notified when adding items');
    } else {
      db.collection('shopSession').doc('active').delete()
        .catch(e=>console.log('setBuyerOut clear failed:', e));
      toast('✅ Back from shopping');
    }
  } else {
    renderShopping(document.getElementById('content'));
  }
}
function resetShop() {
  const n=S.shopping.filter(i=>i.checked).length;
  if(!n){toast('Already all In Stock ✅');return;}
  if(!confirm(`Reset ${n} items to In Stock?`)) return;
  S.shopping.forEach(i=>{i.checked=false;i.status='In Stock';});
  saveShoppingState();
  // api({action:'resetShop'}) removed — Firestore handles sync
  // Sync to Firestore so all phones see the reset instantly
  if(db) {
    const clearState = {};
    S.shopping.forEach(i=>{ clearState[fsKey(i.item)]={checked:false,status:'In Stock'}; });
    _lastShopWrite = Date.now();
    db.collection('shopState').doc('state').set(clearState)
      .catch(e=>console.log('resetShop Firestore sync failed:', e));
  }
  renderShopping(document.getElementById('content'));
  toast(`✅ ${n} items reset to In Stock`);
}

function fsSaveTaskContent(tabName) {
  if(!db) return;
  const content = (S.tasks[tabName]||[]).map(({task,freq,area})=>({task,freq:freq||'',area,done:false}));
  db.collection('tasks').doc(tabName).set({tasks:content,migrated:true},{merge:true})

function hideTaskToday(tabName,idx) {
  const t=S.tasks[tabName]?.[idx]; if(!t) return;
  t.hidden=true;
  // Persist hidden state into taskState (same doc that tracks done/undone — resets at midnight)
  if(db) {
    const today=new Date().toDateString();
    const patch={_date:today}; patch[fsKey(t.task)+'_hidden']=true;
    db.collection('taskState').doc(tabName).set(patch,{merge:true}).catch(()=>{});
  }
  try {
    const ls=JSON.parse(localStorage.getItem('gykf_taskstate')||'{}');
    ls[tabName]=ls[tabName]||{};
    ls[tabName][fsKey(t.task)+'_hidden']=true;
    ls[tabName]._date=new Date().toDateString();
    localStorage.setItem('gykf_taskstate',JSON.stringify(ls));
  } catch(_) {}
  render(); toast('Hidden for today');
}

const FREQ_OPTIONS = ['Daily','3x/week','2x/week','Weekly','Every Monday','Every Tuesday','Every Wednesday','Every Thursday','Every Friday','Every Saturday','Every Sunday','Monthly','As needed','When aircraft on ground'];

function locationSelect(selected='') {
  const blank = `<option value="" ${!selected?'selected':''}>— Select location —</option>`;
  return blank + Object.keys(AREA_COLORS).map(a=>`<option value="${a}" ${a===selected?'selected':''}>${a}</option>`).join('');
}
function freqSelect(selected='') {
  const opts = FREQ_OPTIONS.map(f=>`<option value="${f}" ${f===selected?'selected':''}>${f}</option>`).join('');
  return `<option value="">— Select frequency —</option>${opts}`;
}

function openEditTask(tabName,idx) {
  const t=S.tasks[tabName]?.[idx]; if(!t) return;
  openModal('✏️ Edit Task',
    `<label>Task description</label>
     <input id="eTTask" value="${t.task.replace(/"/g,'&quot;')}">
     <label>Location</label>
     <select id="eTArea">${locationSelect(t.area||'')}</select>
     <label>Frequency</label>
     <select id="eTFreq">${freqSelect(t.freq||'')}</select>
     <label style="display:flex;align-items:center;gap:8px;font-weight:500;margin-top:4px">
       <input type="checkbox" id="eTAllDays" style="width:18px;height:18px;accent-color:var(--blue)">
       Apply to all days
     </label>`,
    async()=>{
      const task=document.getElementById('eTTask').value.trim();
      const freq=document.getElementById('eTFreq').value;
      const area=document.getElementById('eTArea').value;
      const allDays=document.getElementById('eTAllDays').checked;
      if(!task) return;
      const oldKey=fsKey(t.task), newKey=fsKey(task);
      const nameChanged=oldKey!==newKey;
      const daysToUpdate=allDays?DAYS:[tabName];
      for(const day of daysToUpdate) {
        if(!S.tasks[day]) continue;
        const mi=S.tasks[day].findIndex(x=>fsKey(x.task)===oldKey);
        if(mi<0) continue;
        const wasHidden=S.tasks[day][mi].hidden;
        S.tasks[day][mi]={...S.tasks[day][mi],task,freq,area,hidden:wasHidden};
        fsSaveTaskContent(day);
        // If name changed and task was hidden, migrate hidden key in taskState
        if(nameChanged && wasHidden && db) {
          const patch={_date:new Date().toDateString()};
          patch[oldKey+'_hidden']=firebase.firestore.FieldValue.delete();
          patch[newKey+'_hidden']=true;
          db.collection('taskState').doc(day).set(patch,{merge:true}).catch(()=>{});
        }
      }
      if(db) db.collection('taskEdits').add({
        day:allDays?'ALL':tabName, action:'edit', task, freq, area, at:firebase.firestore.FieldValue.serverTimestamp()
      }).catch(()=>{});
      closeModal(); render();
      toast(allDays?'Updated across all days ✓':'Task updated ✓');
    });
}
function resetDay() {
  const tabName=DAYS[getToday()];
  if(!confirm('Reset all of today\'s tasks?')) return;
  S.tasks[tabName]?.forEach(t=>t.done=false);
  // Sync reset to Firestore so every phone sees it immediately
  if(db) {
    const clearState = {_date: new Date().toDateString()};

// Camera photos can be several MB as base64, which blows through
// localStorage's ~5-10MB quota after just a few reports. Downscale +
// re-compress every photo before it's ever stored.
function compressImage(dataUrl, maxDim=1280, quality=0.6) {
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      let {width:w,height:h}=img;
      if(w>maxDim||h>maxDim){ const s=maxDim/Math.max(w,h); w=Math.round(w*s); h=Math.round(h*s); }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>resolve(dataUrl); // fall back to original if it won't decode
    img.src=dataUrl;
  });
}
