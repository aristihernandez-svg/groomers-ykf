function fuzzyDistance(a, b) {
  const normalize = s => s.toLowerCase().replace(/[^a-z0-9 ]/g,'').split(' ').filter(Boolean).sort().join(' ');
  a = normalize(a); b = normalize(b);
  if(a === b) return 0;
  const m = a.length, n = b.length;
  const dp = Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i||j));
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function findSimilarTasks(input, tabName) {
  if(input.length < 3) return null;
  const allTasks = Object.values(S.tasks||{}).flat().map(t=>t.task).filter(Boolean);
  const unique = [...new Set(allTasks)];
  let best = null, bestScore = Infinity;
  for(const t of unique) {
    const dist = fuzzyDistance(input, t);
    const maxLen = Math.max(input.length, t.length);
    const similarity = 1 - dist/maxLen;
    if(similarity >= 0.75 && dist < bestScore) { best = t; bestScore = dist; }
  }
  return best;
}

function findAllSimilarTasks(input) {
  if(input.length < 3) return [];
  const normalize = s => s.toLowerCase().replace(/[^a-z0-9 ]/g,'').split(' ').filter(Boolean).sort().join(' ');
  const normInput = normalize(input);
  const allTasks = Object.values(S.tasks||{}).flat().map(t=>t.task).filter(Boolean);
  const unique = [...new Set(allTasks)];
  const results = [];
  for(const t of unique) {
    if(t.toLowerCase() === input.toLowerCase()) continue;
    const dist = fuzzyDistance(input, t);
    const maxLen = Math.max(input.length, t.length);
    const similarity = 1 - dist/maxLen;
    if(similarity >= 0.75) results.push({task:t, similarity});
  }
  return results.sort((a,b)=>b.similarity-a.similarity).slice(0,4);
}

// Deterministic Firestore doc id from arbitrary text — lets repeated
// add/import calls upsert the same item instead of creating duplicates.
function fsDocId(text) { return fsKey(text).slice(0,400) || ('id'+Date.now()); }

function nameFromUrlSlug(url) {
  try {
    const path = new URL(url).pathname;
    const parts = path.split('/').filter(Boolean);
    // find the most descriptive segment (longest, contains letters and hyphens)
    const slug = parts.slice().reverse().find(p => p.length > 4 && /[a-z]/.test(p) && !p.match(/^\d+[pP]?$/)) || parts[parts.length-1] || '';
    // strip product codes at end (e.g. "8008398888P"), strip file extensions
    const clean = slug.replace(/\.[^.]+$/, '').replace(/-?\d{6,}[a-z]?$/i, '').replace(/-/g, ' ').trim();
    return clean ? clean.replace(/\b\w/g, c => c.toUpperCase()) : '';
  } catch(_) { return ''; }
}

async function autoFetchTitle(urlInputId, nameInputId) {
  const urlEl = document.getElementById(urlInputId);
  const nameEl = document.getElementById(nameInputId);
  if (!urlEl || !nameEl) return;
  const url = urlEl.value.trim();
  if (!url.startsWith('http') || nameEl.value.trim()) return;
  // First: instant fallback from URL slug
  const slugName = nameFromUrlSlug(url);
  if (slugName) nameEl.value = slugName;
  // Then: try Worker for better og:title (overwrites slug if successful)
  try {
    const res = await fetch(`https://skycare-worker.skycare.workers.dev?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    const blocked = ['access denied','403','forbidden','robot','blocked'].some(w => (data.name||'').toLowerCase().includes(w));
    if (data.name && !blocked) nameEl.value = data.name;
  } catch(_) {}
}

// ── PROCEDURE EDITOR ──────────────────────────────────────────────
// Steps are entered one per line as "Step text | optional note" — simple
// to type on mobile, no add/remove-row UI needed.
function parseStepsText(text) {
  return text.split('\n').map(l=>l.trim()).filter(Boolean).map(line=>{
    const [t,n] = line.split('|');
    return {t:(t||'').trim(), n:(n||'').trim()};
  });
}
function stepsToText(steps) {
  return (steps||[]).map(s=>s.n ? `${s.t} | ${s.n}` : s.t).join('\n');
}

// Lightweight deterrent against accidental/casual edits by regular crew —
// not real security (the PIN lives in the client source), just a speed bump.
const ADMIN_PIN = '0000';
function checkAdminPin(actionLabel) {
  const pin = prompt(`Enter admin PIN to ${actionLabel}:`);
  if(pin === null) return false; // cancelled
  if(pin !== ADMIN_PIN) { toast('❌ Incorrect PIN'); return false; }
  return true;
}

function editProcedure(key) {
  if(!checkAdminPin('edit this procedure')) return;
  const p = S.procs[key];
  if(!p) return;
  openModal('✏️ Edit Procedure',
    `<label>Icon (emoji)</label><input id="pIcon" value="${p.icon}">
     <label>Title</label><input id="pTitle" value="${p.title}">
     <label>Warning (optional)</label><input id="pWarn" value="${p.warn||''}">
     <label>Video URL (optional)</label><input id="pVideo" value="${p.video||''}">
     <label>Steps — one per line, optionally "Step text | note"</label>
     <textarea id="pSteps" style="height:140px">${stepsToText(p.steps)}</textarea>`,
    ()=>{
      const title=document.getElementById('pTitle').value.trim();
      if(!title){toast('Add a title first');return;}
      const icon=document.getElementById('pIcon').value.trim()||'✈';
      const warn=document.getElementById('pWarn').value.trim();
      const video=document.getElementById('pVideo').value.trim();
      const steps=parseStepsText(document.getElementById('pSteps').value);
      S.procs[key]={...p,title,icon,warn,video,steps};
      closeModal(); render(); toast('Procedure updated ✓');
      if(db) {
        db.collection('procedures').doc(key).set({title,icon,warn,video,steps})
          .catch(e => console.log('Edit procedure Firestore write failed:', e));
      }
    });
}

function deleteProcedure(key) {
  if(!checkAdminPin('delete this procedure')) return;
  const p = S.procs[key];
  if(!p) return;
  if(!confirm(`Delete the "${p.title}" procedure? This can't be undone.`)) return;
  delete S.procs[key];
  S.procView=null;
  render();
  toast('Procedure deleted');
  if(db) db.collection('procedures').doc(key).delete().catch(e => console.log('Delete procedure Firestore write failed:', e));
}

// Raw Sheets fetch for a single day — returns task array without touching S.tasks
async function fetchDayRaw(tabName) {
  const gid = TAB_GIDS[tabName];
  const url = gid
    ? `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`
    : `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
  const text = await (await fetch(url)).text();
  const json = JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
  const rows = json.table?.rows || [];
  const cols = json.table?.cols || [];
  const tasks = []; let area = '';
  rows.forEach(row => {
    const v = cols.map((_,i) => { const c=row.c?.[i]; return c?String(c.v??c.f??'').trim():''; });
    const colA=v[0]||'', colB=v[1]||'', colC=v[2]||'';
    if(!colA && !colB) { console.log('[skip]', JSON.stringify(row.c?.slice(0,5))); return; }
    const isNum = !isNaN(parseInt(colA)) && parseInt(colA) > 0;
    if(!isNum) console.log('[rawrow]', JSON.stringify({colA, colB, colC}));
    if(!isNum && !colB && colA && colA !== colA.toLowerCase() && colA.length > 2 && !colA.includes('SPECIAL')) {
      area = colA.toUpperCase(); return;
    }
    if(!isNum && colB && colB !== colB.toLowerCase() && colB.length > 2 && !colB.includes('SPECIAL') && !colB.includes('📝') && !colB.includes('Note')) {
      area = colB.toUpperCase(); return;
    }
    if(colB.toUpperCase().includes('SPECIAL NOTES') || colB.includes('📝')) return;
    if(colB === 'Task' || colA === '#') return;
    if(isNum && colB && !colB.toLowerCase().includes('clean aircraft')) {
      tasks.push({ task: colB, freq: colC, area: area.toUpperCase(), done: false });
    }
  });
  return tasks;
}

async function runMigration() {
  if(!db) { setMigStatus('⚠️ Firestore not connected', 'var(--red)'); return; }

  // Disable migrate button during run
  const btn = document.getElementById('migStartBtn');
  if(btn) btn.disabled = true;

  // ── Step 1: Check for concurrent import lock (best-effort) ──────
  // If the lock read fails (e.g. Firestore rules don't cover this doc yet),
  // log it and continue — PIN + double-confirm already prevent accidents.
  setMigStatus('Checking for active imports...');
  try {
    const lockSnap = await db.collection('appConfig').doc('importing').get();
    if(lockSnap.exists && lockSnap.data()?.active === true) {
      setMigStatus('⚠️ Another device is already importing. Try again in a minute.', 'var(--red)');
      if(btn) btn.disabled = false;
      return;
    }
  } catch(e) {
    console.log('Lock check skipped (rules may not cover appConfig/importing):', e.code, e.message);
    // Non-fatal — proceed without the lock
  }

  // ── Step 2: Acquire lock (best-effort) ───────────────────────────
  await db.collection('appConfig').doc('importing').set({ active: true, startedAt: firebase.firestore.FieldValue.serverTimestamp() }).catch(e => {
    console.log('Lock set skipped:', e.code);
  });

  // ── Step 3: Preview fetch all 7 days and validate ─────────────────
  setMigStatus('📋 Fetching all 7 days from Sheets...');
  const preview = {};
  for(const day of DAYS) {
    setMigStatus(`📋 Fetching ${day}...`);
    try {
      const tasks = await fetchDayRaw(day);
      if(tasks.length < 3) {
        setMigStatus(`⚠️ ${day} only returned ${tasks.length} tasks — looks wrong. Aborting.`, 'var(--red)');
        await db.collection('appConfig').doc('importing').set({ active: false });
        if(btn) btn.disabled = false;
        return;
      }
      preview[day] = tasks;
    } catch(e) {
      setMigStatus(`⚠️ Failed to fetch ${day}: ${e.message||e}`, 'var(--red)');
      await db.collection('appConfig').doc('importing').set({ active: false }).catch(()=>{});
      if(btn) btn.disabled = false;
      return;
    }
  }

  // Show preview summary before writing anything
  const summary = DAYS.map(d => `${d.split(' ').pop()}: ${preview[d].length}`).join(' · ');
  setMigStatus(`✅ Preview OK — ${summary}<br>Writing to Firestore...`, 'var(--green)');
  await new Promise(r => setTimeout(r, 800)); // let user see the summary

  // ── Step 4: Write sequentially, one day at a time ─────────────────
  const migratedAt = firebase.firestore.FieldValue.serverTimestamp();
  for(const day of DAYS) {
    setMigStatus(`💾 Writing ${day}... (${DAYS.indexOf(day)+1}/7)`);
    try {
      await db.collection('tasks').doc(day).set({
        tasks: preview[day],
        migrated: true,
        migratedAt,
      });
    } catch(e) {
      setMigStatus(`⚠️ Failed writing ${day} — stopping. Source stays on Sheets.`, 'var(--red)');
      await db.collection('appConfig').doc('importing').set({ active: false });
      if(btn) btn.disabled = false;
      return;
    }
  }

  // ── Step 5: Atomic cutover ────────────────────────────────────────
  setMigStatus('🔄 Switching task source to Firestore...');
  try {
    await db.collection('appConfig').doc('tasksSource').set({ source: 'firestore' });
    S.tasksSource = 'firestore';
    // Load migrated tasks into memory
    DAYS.forEach(day => { S.tasks[day] = preview[day]; });
    // Wipe stale Sheets cache from localStorage
    localStorage.removeItem('gykf_tasks');
    await db.collection('appConfig').doc('importing').set({ active: false });
  } catch(e) {
    setMigStatus('⚠️ Cutover failed — tasks written but source not flipped. Try escape hatch.', 'var(--red)');
    await db.collection('appConfig').doc('importing').set({ active: false }).catch(()=>{});
    if(btn) btn.disabled = false;
    return;
  }

  setMigStatus('🟢 Migration complete! All 7 days now on Firestore.', 'var(--green)');
  haptic('medium');
  // Refresh the manager UI to reflect new source
  setTimeout(() => {
    document.getElementById('migManagerOverlay')?.remove();
    showMigrationManager();
    render();
  }, 2000);
}

// ── END OF DAY ─────────────────────────────────────────────────────
function showEOD() {
  const tabName=DAYS[getToday()], tasks=S.tasks[tabName]||[];
  const visible=tasks.filter(t=>!t.hidden);
  const done=visible.filter(t=>t.done);
  const missed=visible.filter(t=>!t.done&&t.area!=='CLOSURE');
  const closure=visible.filter(t=>t.area==='CLOSURE');
  const clDone=closure.filter(t=>t.done);
  const pct=visible.length?Math.round(done.length/visible.length*100):0;
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'});
  const timeStr=now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
  let msg=`✈ *SKYCARE — END OF DAY REPORT*\n📅 ${dateStr} · ${timeStr}\n${'─'.repeat(30)}\n\n`;
  msg+=`📊 *${done.length}/${tasks.length} tasks completed (${pct}%)*\n\n`;

  // Flight log
  const flog=S.flightLog[tabName]||{};
  const flLines=[
    ...(flog.arr||[]).map(t=>`  🛬 Arrival ${t}`),
    ...(flog.dep||[]).map(t=>`  🛫 Departure ${t}`),
    ...(flog.grm||[]).map(t=>`  🧹 Cleaned ${t}`),
  ];
  if(flLines.length) msg+=`✈ *Flight Activity:*\n${flLines.join('\n')}\n\n`;

  // Always show completed tasks
  if(done.length>0) {
    msg+=`✅ *Completed:*\n${done.map(t=>`  ✓ ${t.task}`).join('\n')}\n\n`;
  }

  // Show incomplete tasks if any
  if(missed.length>0) {
    msg+=`⚠️ *Incomplete:*\n${missed.map(t=>`  • ${t.task}`).join('\n')}\n\n`;
  } else {
    msg+=`🎯 All daily tasks completed!\n\n`;
  }

  // Closure section
  if(clDone.length===closure.length&&closure.length) {
    msg+=`🔐 *Closure: ✅ Complete*\n${clDone.map(t=>`  ✓ ${t.task}`).join('\n')}\n\n`;
  } else if(closure.length) {
    const clMissed=closure.filter(t=>!t.done);
    const clComplete=closure.filter(t=>t.done);
    if(clComplete.length) msg+=`🔐 *Closure — done:*\n${clComplete.map(t=>`  ✓ ${t.task}`).join('\n')}\n`;
    if(clMissed.length) msg+=`🔐 *Closure — pending:*\n${clMissed.map(t=>`  ❌ ${t.task}`).join('\n')}\n`;
    msg+='\n';
  }

  // Shopping summary
  const toBuyItems=S.shopping.filter(i=>i.checked);
  if(toBuyItems.length>0) {
    msg+=`🛒 *Shopping needed (${toBuyItems.length} items):*\n${toBuyItems.map(i=>`  • ${i.item} — ${i.store}`).join('\n')}\n\n`;
  }

  // Damage reports filed today

// In-page voice recording for the handoff note — same reasoning as the
// in-page camera: avoids handing off to an OS-level recorder app that could
// reload the PWA mid-flow. Hard-capped at 60s to stay well under Firestore's
// 1MB document size limit once base64-encoded.
let handoffRecorder = null;

// Prevent Firestore listeners from re-rendering while the user is mid-tap —
// otherwise a live update can swap DOM elements under the finger and cause
// the wrong task/item to be toggled.
let touchActive = false;
document.addEventListener('touchstart', ()=>{ touchActive=true; }, {passive:true, capture:true});
document.addEventListener('touchend',   ()=>{ touchActive=false; }, {passive:true, capture:true});
document.addEventListener('touchcancel',()=>{ touchActive=false; }, {passive:true, capture:true});
async function recordHandoffVoice() {
  const btn = document.getElementById('eodVoiceBtn');
  const status = document.getElementById('eodVoiceStatus');
  if(handoffRecorder && handoffRecorder.state==='recording') { handoffRecorder.stop(); return; }
  if(!window.MediaRecorder) {
    toast('Voice recording isn\'t supported on this browser');
    return;
  }
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
  } catch(e) {
    console.log('Mic unavailable:', e);
    toast('Microphone unavailable — check permissions');
    return;
  }
  const chunks=[];
  let seconds=0;
  const maxSeconds=60;
  // Safari/iOS doesn't support webm/opus at all — probe for a format the
  // browser actually supports instead of assuming one.
  const mime = ['audio/webm;codecs=opus','audio/mp4','audio/webm']
    .find(m => window.MediaRecorder.isTypeSupported && window.MediaRecorder.isTypeSupported(m));
  try {
    handoffRecorder = mime ? new MediaRecorder(stream, {mimeType:mime, audioBitsPerSecond:24000}) : new MediaRecorder(stream);
  } catch(e) {
    console.log('MediaRecorder construction failed:', e);
    toast('Could not start recording on this device');
    stream.getTracks().forEach(t=>t.stop());
    return;
  }
  handoffRecorder.ondataavailable = e => { if(e.data.size>0) chunks.push(e.data); };
  const timer = setInterval(()=>{
    seconds++;
    if(status) status.textContent = `🔴 Recording... ${seconds}s / ${maxSeconds}s (tap again to stop)`;
    if(seconds>=maxSeconds) handoffRecorder.stop();
  },1000);
  handoffRecorder.onstop = () => {
    clearInterval(timer);
    stream.getTracks().forEach(t=>t.stop());
    const blob = new Blob(chunks, {type:handoffRecorder.mimeType||'audio/webm'});
    const reader = new FileReader();
    reader.onload = () => {
      S.pendingHandoffAudio = reader.result;
      if(status) status.textContent = `✅ Voice note recorded (${seconds}s)`;
      if(btn) { btn.textContent = '🎙 Re-record voice note'; btn.style.color='var(--green)'; btn.style.borderColor='var(--green)'; }
    };
    reader.readAsDataURL(blob);
  };
  handoffRecorder.start();
  if(btn) btn.textContent = '⏹ Stop recording';
  if(status) status.textContent = '🔴 Recording... 0s / 60s (tap again to stop)';
}

let _undoActive=false;
function toast(msg) {
  if(_undoActive) return; // never overwrite an active undo toast
  const t=document.getElementById('toast');
  t.innerHTML=`<span>${msg}</span>`; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200);
}
function toastUndo(msg, fn) {
  _undoFn=fn; _undoActive=true;
  const t=document.getElementById('toast');
  t.style.whiteSpace='nowrap';
  t.innerHTML=`<span style="flex:1">${msg}</span><button class="toast-undo-btn" id="undoBtn">UNDO</button>`;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(()=>{t.classList.remove('show');_undoFn=null;_undoActive=false;},5000);
  // bind after paint — touchend for instant iOS response, click as fallback
  requestAnimationFrame(()=>{
    const btn=document.getElementById('undoBtn');
    if(!btn) return;
    const doUndo=e=>{
      e.preventDefault(); e.stopPropagation();
      if(!_undoFn) return;
      const f=_undoFn; _undoFn=null; _undoActive=false;
      clearTimeout(t._t); t.classList.remove('show');
      f();
    };
    btn.addEventListener('touchend', doUndo, {passive:false});
    btn.addEventListener('click', doUndo);
  });
}
// ── SWIPE HANDLER (two-direction) ────────────────────────────
function setupSwipeTwoWay(el, onLeft, onRight) {
  let startX=0, currentX=0, active=false;
  const inner = el.querySelector('.srow,.bitem,.trow');
  if(!inner) return;

  el.addEventListener('touchstart', e=>{
    // Close any other open swipes
    document.querySelectorAll('.swipe-wrap.open-left,.swipe-wrap.open-right').forEach(w=>{
      if(w!==el){w.classList.remove('open-left','open-right');}
    });
    startX=e.touches[0].clientX; active=true;
  },{passive:true});

  el.addEventListener('touchmove', e=>{
    if(!active) return;
    currentX = e.touches[0].clientX - startX;
    if(Math.abs(currentX) > 8) e.preventDefault();
    // Live feedback while dragging
    const inner = el.querySelector('.srow,.bitem,.trow');
    if(inner) inner.style.transform = `translateX(${Math.max(-90,Math.min(90,currentX))}px)`;
  },{passive:false});

  el.addEventListener('touchend', ()=>{
    if(!active) return; active=false;
    const inner = el.querySelector('.srow,.bitem,.trow');
    if(inner) inner.style.transform = '';
    const isOpen = el.classList.contains('open-left') || el.classList.contains('open-right');
    if(isOpen && Math.abs(currentX) < 20) {
      // tap on open row — close it
      el.classList.remove('open-left','open-right');
    } else if(currentX > 70) {
      el.classList.add('open-left');
      el.classList.remove('open-right');
    } else if(currentX < -70) {
      el.classList.add('open-right');
      el.classList.remove('open-left');
    } else {
      el.classList.remove('open-left','open-right');
    }
    currentX=0;
  });

  // Action buttons
  const leftBtn = el.querySelector('.swipe-action-left');
  const rightBtn = el.querySelector('.swipe-action-right');
  if(leftBtn) leftBtn.addEventListener('click', ()=>{
    el.classList.remove('open-left','open-right');
    onLeft();
  });
  if(rightBtn) rightBtn.addEventListener('click', ()=>{
    el.classList.remove('open-left','open-right');
    onRight();
  });
}

function drawQR(canvasId, url) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const size = canvas.width;

  // Simple QR using a pre-encoded URL approach
  // We'll use a free QR API image
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,size,size);
    ctx.drawImage(img, 0, 0, size, size);
  };
  img.onerror = () => {
    // Fallback: draw text
    ctx.fillStyle = '#0B1120';
    ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#C8A84B';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Scan on phone', size/2, size/2-10);
    ctx.fillText('camera app', size/2, size/2+10);
  };
  img.src = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(url)}&color=0B1120&bgcolor=ffffff`;
}

let dragSrcEl = null;

function setupDraggableNav() {
  const nav = document.getElementById('nav');
  if(!nav) return;

  const items = nav.querySelectorAll('.nb');
  items.forEach(item => {
    item.setAttribute('draggable', 'true');

    item.addEventListener('dragstart', e => {
      dragSrcEl = item;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    item.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      items.forEach(i=>i.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });

    item.addEventListener('dragleave', () => {
      item.classList.remove('drag-over');
    });

    item.addEventListener('drop', e => {
      e.preventDefault();
      if(dragSrcEl && dragSrcEl !== item) {
        // Swap positions
        const allItems = [...nav.querySelectorAll('.nb')];
        const srcIdx = allItems.indexOf(dragSrcEl);
        const dstIdx = allItems.indexOf(item);
        if(srcIdx < dstIdx) {
          nav.insertBefore(dragSrcEl, item.nextSibling);
        } else {
          nav.insertBefore(dragSrcEl, item);
        }
        // Save order
        const order = [...nav.querySelectorAll('.nb')].map(n=>n.id.replace('nb-',''));
        localStorage.setItem('gykf_nav_order', JSON.stringify(order));
      }
      items.forEach(i=>i.classList.remove('drag-over','dragging'));
    });

    item.addEventListener('dragend', () => {
      items.forEach(i=>i.classList.remove('dragging','drag-over'));
    });

    // Touch drag disabled on mobile — horizontal swipe scrolls the nav bar
    // and the clone logic was firing during normal scroll gestures.
  });
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');

// Sheets/the Apps Script backend stay the source of truth for *content*
// (task wording, shopping catalog, contacts, procedures). Firestore only
// carries fast-changing *shared state* — done/checked flags and damage
// reports — so every groomer's phone updates instantly when a teammate
// makes a change, instead of waiting for a manual sync tap.

  try {
    if(!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);

  } catch(e) {

// Firestore treats "." in a field name written through a plain object as a
// nested path, so task text (which can contain periods) needs sanitizing
// before being used as a map key.
function fsKey(text) { return String(text).replace(/[.\/]/g, '∙'); }
function localDateISO(d=new Date()) { const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }

// Firestore TTL would auto-delete a document once this field's timestamp is
// in the past, but enabling that policy requires the paid Blaze plan (a
// billing account on file), which we're intentionally not doing to keep
// this project 100% free. The field is written anyway — it's free to store
// and costs nothing to leave unused — so TTL can be turned on later with
// zero code changes if the storage math ever actually becomes a concern
// (at current photo/audio sizes, that's realistically years away).
function ttlTimestamp(days) {
  return firebase.firestore.Timestamp.fromMillis(Date.now() + days*24*60*60*1000);
}

function setupLiveSync() {
  if(!db) return;
  try {
    // Today's task done-state, shared live across every groomer's phone.
    const tabName = DAYS[getToday()];

    // When source is Firestore, attach a live listener on today's task content
    // so edits made by a manager on another device appear instantly.
    if(S.tasksSource === 'firestore') {
      db.collection('tasks').doc(tabName).onSnapshot(snap => {
        if(!snap.exists || !snap.data().migrated) return;
        const incoming = (snap.data().tasks || []).map(t => ({...t, done: false}));
        // Preserve current done states across the content refresh
        const prevDone = {};
        (S.tasks[tabName]||[]).forEach(t => { prevDone[fsKey(t.task)] = t.done; });
        S.tasks[tabName] = incoming;
        S.tasks[tabName].forEach(t => { if(fsKey(t.task) in prevDone) t.done = prevDone[fsKey(t.task)]; });
        // Also apply cached taskState (handles race where state arrived before content)
        if(_cachedTaskState) {
          const today = new Date().toDateString();
          if(!_cachedTaskState._date || _cachedTaskState._date === today) {
            S.tasks[tabName].forEach(t => { const v=_cachedTaskState[fsKey(t.task)]; if(v!==undefined) t.done=v; });
          }
        }
        _cacheTasksLocal(tabName);
        const el = document.getElementById('content');
        if(S.tab==='today') renderToday(el);
        else if(S.tab==='week' && S.inDay && S.dayView===getToday()) renderDayDetail(el);
      }, e => console.log('tasks content listener error:', e));
    }

    db.collection('taskState').doc(tabName).onSnapshot(snap => {
      const data = snap.data();
      _cachedTaskState = data; // always cache so task content listener can use it
      if(!data || !S.tasks[tabName]) return;
      // Ignore states written on a different calendar day (weekly cycle fix —
      // last Monday's done-flags must not re-appear this Monday).
      const today = new Date().toDateString();
      if(data._date && data._date !== today) return;
      S.tasks[tabName].forEach(t => {
        const v=data[fsKey(t.task)]; if(v!==undefined) t.done=v;
        const h=data[fsKey(t.task)+'_hidden']; t.hidden=h===true;
      });
      flightLogFromFirestore(tabName, data);
      // Skip re-render if this snapshot is echoing our own write (< 600ms ago)
      if(Date.now() - _lastSelfWrite < 600) return;
      // Defer re-render by 150ms so it never fires mid-tap (prevents wrong
      // task being toggled when DOM rebuilds under the user's finger).
      if(!touchActive) {
        if(S.tab==='today') renderToday(document.getElementById('content'));
        else if(S.tab==='week' && S.inDay && S.dayView===getToday()) renderDayDetail(document.getElementById('content'));
      } else {
        setTimeout(()=>{
          if(S.tab==='today') renderToday(document.getElementById('content'));
          else if(S.tab==='week' && S.inDay && S.dayView===getToday()) renderDayDetail(document.getElementById('content'));
        }, 200);
      }
    }, e => console.log('taskState listener error:', e));

    // Shopping checked/to-buy state.
    db.collection('shopState').doc('state').onSnapshot(snap => {
      const data = snap.data(); if(!data) return;
      _cachedShopState = data; // always cache so catalog listener can use it
      if(Date.now() - _lastShopWrite < 1500) return; // suppress echo of own write
      S.shopping.forEach(i => {
        const v=data[fsKey(i.item)];
        if(v!==undefined) { i.checked=v.checked; i.status=v.status; if(v.qty!==undefined) i.qty=v.qty; i.source=v.source||''; }
      });
      saveShoppingState();
      const el=document.getElementById('content');
      if(!touchActive) {
        if(S.tab==='shopping') renderShopping(el);
        else if(S.tab==='home'||S.tab==='today') render();
      } else {
        setTimeout(()=>{
          if(S.tab==='shopping') renderShopping(document.getElementById('content'));
          else if(S.tab==='home'||S.tab==='today') render();
        }, 200);
      }
    }, e => console.log('shopState listener error:', e));

    // Bored board done-state.
    db.collection('boredState').doc('state').onSnapshot(snap => {
      const data = snap.data(); if(!data) return;
      S.bored.forEach(b => { const v=data[fsKey(b.task)]; if(v!==undefined) b.done=v; });
      if(S.tab==='bored') {
        if(!touchActive) renderBored(document.getElementById('content'));
        else setTimeout(()=>{ if(S.tab==='bored') renderBored(document.getElementById('content')); }, 200);
      }
    }, e => console.log('boredState listener error:', e));

    // One-time silent cleanup: fix shoppingCatalog docs where notes === false or 'false'
    db.collection('shoppingCatalog').get().then(snap => {
      const batch = db.batch();
      let count = 0;
      snap.docs.forEach(doc => {
        const n = doc.data().notes;
        if(n === false || n === 'false' || n === null) {
          batch.update(doc.ref, {notes: ''});
          count++;
        }
      });
      if(count > 0) batch.commit().then(()=>console.log(`Cleaned ${count} catalog notes`));
    }).catch(()=>{});

    // Buyer-out session — when someone marks themselves as actively shopping,
    // a banner appears on all phones so adding new items triggers an alert.
    db.collection('shopSession').doc('active').onSnapshot(snap => {
      S.buyerOut = snap.exists && snap.data()?.active === true;
      if(S.tab==='shopping') renderShopping(document.getElementById('content'));
    }, e => console.log('shopSession listener error:', e));

    // Crew car data — live sync across all phones
    db.collection('crewCarData').doc('all').onSnapshot(snap => {
      if(!snap.exists) return;
      const data=snap.data();
      Object.assign(S.crewCarData, data);
      try { localStorage.setItem('gykf_ccd',JSON.stringify(S.crewCarData)); } catch(e){}
      const v=S.crewCarsView;
      if(v && v!==null && S.tab==='procedures') {
        const el=document.getElementById('content');
        if(v==='list') renderCrewCarsList(el);
        else if(!v.startsWith('audit')) renderCarDetail(el,v);
      }
    }, e => console.log('crewCarData listener error:', e));

    // Damage reports — fully live: every report any groomer files appears
    // on every phone immediately, and stays available for future reference.
    db.collection('damageReports').orderBy('ts','asc').onSnapshot(snap => {
      const byProc = {}; const idsByProc = {};
      snap.forEach(doc => {
        const d = doc.data();
        (byProc[d.procKey] ||= []).push({text:d.text, photo:d.photo||'', date:d.date, tailNumber:d.tailNumber||''});
        (idsByProc[d.procKey] ||= []).push(doc.id);
      });
      S.dmgReports = byProc;
      dmgReportIds = idsByProc;
      saveDmg();
      if(S.tab==='procedures') render();
    }, e => console.log('damageReports listener error:', e));

    // Shopping catalog (item/store/cabinet) — live so an item added by one
    // groomer shows up on every phone immediately, not just the checked flag.
    db.collection('shoppingCatalog').onSnapshot(snap => {
      if(snap.empty) return; // nothing imported/added yet — keep Sheets-sourced fallback
      const prevChecked = {}; S.shopping.forEach(i=>prevChecked[i.item]={checked:i.checked,status:i.status,source:i.source||''});
      S.shopping = snap.docs.map(d=>{
        const v=d.data();
        const prior = prevChecked[v.item];
        return {id:d.id, item:v.item, cabinet:v.cabinet||'', store:v.store||'', notes:v.notes||'', url:v.url||'',
          checked: prior?.checked||false, status: prior?.status||'In Stock', source: prior?.source||''};
      });
      // Apply cached Firestore shopState if available — handles the race where
      // shopState listener fires before shoppingCatalog on page load.
      if(_cachedShopState) {
        S.shopping.forEach(i => {
          const v=_cachedShopState[fsKey(i.item)];
          if(v!==undefined) { i.checked=v.checked; i.status=v.status; if(v.qty!==undefined) i.qty=v.qty; i.source=v.source||''; }
        });
      }
      if(S.tab==='shopping') renderShopping(document.getElementById('content'));
    }, e => console.log('shoppingCatalog listener error:', e));

    // Contacts/locations catalog — live.
    db.collection('contacts').onSnapshot(snap => {
      if(snap.empty) return; // nothing imported/added yet — keep Sheets-sourced fallback
      S.contacts = snap.docs.map(d=>({id:d.id, ...d.data()}));
      if(S.tab==='contacts') renderContacts(document.getElementById('content'));
    }, e => console.log('contacts listener error:', e));

    // Procedures catalog — live. Steps are read-only reference material, so
    // there's no per-step completion state to sync here, only the content.
    db.collection('procedures').onSnapshot(snap => {
      if(snap.empty) return; // not seeded yet — keep built-in defaults
      const procs = {};
      snap.forEach(d => {
        if(d.id==='crewcars') return; // replaced by audits hub — skip
        const v=d.data();
        const existing = S.procs[d.id];
        const isCrewCar    = v.isCrewCar    || existing?.isCrewCar    || false;
        const isCrewCarsHub= v.isCrewCarsHub|| existing?.isCrewCarsHub|| false;
        const isAuditsHub  = v.isAuditsHub  || existing?.isAuditsHub  || false;
        procs[d.id] = {title:v.title, icon:v.icon||'✈', warn:v.warn||'', video:v.video||'',
          steps:v.steps||[], open:existing?.open||false, done:existing?.done||[],
          isCrewCar, isCrewCarsHub, isAuditsHub};
      });
      // Always ensure audits hub is present
      if(!procs.audits) procs.audits = S.procs.audits || {title:'Audits',icon:'📁',open:false,done:[],warn:'',video:'',isAuditsHub:true,steps:[]};
      // Preserve any locally-known procedures not yet in Firestore
      Object.keys(S.procs).forEach(key=>{ if(!procs[key]) procs[key]=S.procs[key]; });
      S.procs = procs;
      if(S.tab==='procedures') render();
    }, e => console.log('procedures listener error:', e));

    // Shift handoff notes — sticky notes left at end-of-day for the next
    // shift. Single-field orderBy (no composite index needed); unresolved
    // filtering happens client-side since the list is always small.
    db.collection('handoffNotes').orderBy('ts','desc').onSnapshot(snap => {
      S.handoffNotes = snap.docs.map(d=>({id:d.id, ...d.data()})).filter(n=>!n.resolved);
      if(S.tab==='home') renderHome(document.getElementById('content'));
      else if(S.tab==='today') renderToday(document.getElementById('content'));
    }, e => console.log('handoffNotes listener error:', e));

    // Day notes — per-date team reminders
    db.collection('dayNotes').onSnapshot(snap => {
      snap.forEach(doc => { S.dayNotes[doc.id] = doc.data(); });
      // Remove deleted docs
      const liveIds = new Set(snap.docs.map(d=>d.id));
      Object.keys(S.dayNotes).forEach(k=>{ if(!liveIds.has(k)) delete S.dayNotes[k]; });
      try { localStorage.setItem('gykf_dayNotes', JSON.stringify(S.dayNotes)); } catch(e) {}
      // Don't re-render if a note is currently open and being typed into — prevents textarea from closing
      if(window._dayNoteSaving > 0) return;
      const anyOpen = Object.values(window._dayNoteOpen||{}).some(Boolean);
      if(anyOpen) return;
      const el = document.getElementById('content');
      if(S.tab==='today') renderToday(el);
      else if(S.tab==='week' && S.inDay) renderDayDetail(el);
      else if(S.tab==='week') renderWeek(el);
    }, e => console.log('dayNotes listener error:', e));

    // Broadcast notifications — fired by any device writing to this collection
    // Task source flag — 'sheets' or 'firestore', toggled by migration manager
    db.collection('appConfig').doc('tasksSource').onSnapshot(snap => {
      const data = snap.data();
      if(data?.source) S.tasksSource = data.source;
    }, e => console.log('tasksSource listener error:', e));

    // Custom stores — live so adding a store on one phone appears everywhere
    db.collection('appConfig').doc('stores').onSnapshot(snap => {
      const data = snap.data();
      S.customStores = (data && Array.isArray(data.custom)) ? data.custom : [];
      localStorage.setItem('gykf_custom_stores', JSON.stringify(S.customStores));
    }, e => console.log('customStores listener error:', e));

    // Trip notes — live so whoever is shopping sees the latest plan
    db.collection('teamData').doc('trip').onSnapshot(snap => {
      if(!snap.exists) return;
      const val = snap.data()?.notes || '';
      S.tripNotes = val; localStorage.setItem('gykf_trip', val);
      if(S.tab==='shopping') renderShopping(document.getElementById('content'));
    }, e => console.log('tripNotes listener error:', e));

    db.collection('notifications').orderBy('ts','desc').limit(1).onSnapshot(snap => {
      if (snap.empty) return;
      const doc = snap.docs[0];
      const data = doc.data();
      if (!data.ts) return; // not yet server-stamped
      const docMs = data.ts.toMillis ? data.ts.toMillis() : 0;
      if (docMs <= _notifSessionStart) return; // skip notifications from before this session
      const title = data.title || '✈ Skycare';
      const body = data.body || '';
      if (Notification.permission === 'granted') {
        new Notification(title, { body, icon: './cars/Metroliner_logo-removebg-preview.png', tag: data.tag || 'skycare', renotify: true });
      } else {
        toast(`🔔 ${title}${body ? ' — ' + body : ''}`);
      }
    }, e => console.log('notifications listener error:', e));
  } catch(e) {
    console.log('setupLiveSync error:', e);
  }
}

// ── BROADCAST NOTIFICATIONS ─────────────────────────────────────────
// Write an event to Firestore; every open device picks it up via onSnapshot
// and shows a native Notification (or a toast if permission not granted).
const _notifSessionStart = Date.now();
function broadcastNotif(title, body, tag) {
  if (!db) return;
  db.collection('notifications').add({
    title, body, tag: tag || 'skycare',
    ts: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(e => console.log('broadcastNotif failed (offline?):', e));
}

function markHandoffComplete(id) {
  if(!db) { toast('Not connected — try again when online'); return; }
  db.collection('handoffNotes').doc(id).update({resolved:true})
    .catch(e => console.log('markHandoffComplete failed:', e));
}

// ── FLEET TRACKER ───────────────────────────────────────────────────────
const FLEET_AIRCRAFT = [
  {reg:'C-GIOC', tail:'IOC', type:'Metroliner', icao24:''},
  {reg:'C-GIOJ', tail:'IOJ', type:'Metroliner', icao24:''},
  {reg:'C-GIOB', tail:'IOB', type:'Metroliner', icao24:''},
  {reg:'C-GIOE', tail:'IOE', type:'Metroliner', icao24:''},
  {reg:'C-GIOH', tail:'IOH', type:'Metroliner', icao24:''},
  {reg:'C-GIOA', tail:'IOA', type:'Metroliner', icao24:''},
  {reg:'C-FIAW', tail:'IAW', type:'Westwind',   icao24:''},
  {reg:'C-FXAW', tail:'XAW', type:'Westwind',   icao24:''},
  {reg:'C-FXDP', tail:'XDP', type:'Westwind',   icao24:''},
  {reg:'C-GDAX', tail:'DAX', type:'Astra',      icao24:''},
];

let _fleetData = {}; // icao24/callsign → state
let _fleetLastFetch = 0;
let _fleetTimer = null;

async function fetchFleetOpenSky() {
  // Query bounding box around CYKF (Waterloo Region Airport)
  // lat 43.46, lon -80.38 ± generous margin
  const url = 'https://opensky-network.org/api/states/all?lamin=42.8&lomin=-81.5&lamax=44.2&lomax=-79.0';
  try {
    const r = await fetch(url);
    if(!r.ok) return null;
    const data = await r.json();
    return data.states || [];
  } catch(e) { return null; }
}

function fleetCallsignMatch(callsign) {
  if(!callsign) return null;
  const cs = callsign.trim().toUpperCase();
  return FLEET_AIRCRAFT.find(a => {
    const reg = a.reg.replace('-','').toUpperCase(); // e.g. CGIOC
    return cs === reg || cs === ('C'+a.tail) || cs.includes(a.tail);
  }) || null;
}

async function refreshFleet() {
  const btn = document.getElementById('fleetRefreshBtn');
  if(btn) { btn.textContent = '⏳ Fetching...'; btn.disabled = true; }
  const states = await fetchFleetOpenSky();
  _fleetData = {};
  if(states) {
    states.forEach(s => {
      const ac = fleetCallsignMatch(s[1]);
      if(ac) _fleetData[ac.tail] = {
        callsign: (s[1]||'').trim(),
        lat: s[6], lon: s[5],
        altitude: s[7],
        speed: s[9],
        onGround: s[8],
        lastSeen: s[4]
      };
    });
  }
  _fleetLastFetch = Date.now();
  renderFleet(document.getElementById('content'));
}

function flipBoardDigit(val, label) {
  return `<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
    <div style="display:flex;gap:3px">
      ${String(val).padStart(2,'0').split('').map(d=>`
        <div style="width:36px;height:52px;background:#111;border-radius:6px;border:1px solid #333;
                    display:flex;align-items:center;justify-content:center;
                    font-size:32px;font-weight:800;color:#FFD700;font-family:'Courier New',monospace;
                    box-shadow:inset 0 2px 8px rgba(0,0,0,0.8),0 0 12px rgba(255,215,0,0.08);
                    position:relative;overflow:hidden">
          <div style="position:absolute;top:0;left:0;right:0;height:50%;background:rgba(0,0,0,0.25);pointer-events:none"></div>
          ${d}
        </div>`).join('')}
    </div>
    <div style="font-size:10px;color:rgba(255,255,255,0.4);font-weight:600;letter-spacing:1.5px;text-transform:uppercase">${label}</div>
  </div>`;
}

          const altStr = live && !live.onGround && live.altitude ? `${Math.round(live.altitude*3.28084).toLocaleString()} ft` : '';
          return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:11px 10px;border-top:1px solid rgba(255,255,255,0.05);align-items:center;background:${live?'rgba(255,255,255,0.03)':'transparent'}">
            <div>
              <div style="font-size:14px;font-weight:800;color:#fff;font-family:'Courier New',monospace">${ac.reg}</div>

            <div style="text-align:center;font-size:12px;color:rgba(255,255,255,0.55)">${ac.type}</div>
            <div style="text-align:right">
              <div style="font-size:11px;font-weight:700;color:${live?(live.onGround?'#F39C12':'#27AE60'):'rgba(255,255,255,0.25)'}">${statusLabel}</div>
              ${altStr?`<div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:1px">${altStr}</div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>

      <!-- Note -->
      <div style="margin:16px;padding:12px 14px;background:rgba(255,255,255,0.04);border-radius:10px;border:1px solid rgba(255,255,255,0.07)">
        <div style="font-size:11px;color:rgba(255,255,255,0.35);line-height:1.6">
          ℹ️ Live positions from <b style="color:rgba(255,255,255,0.5)">OpenSky Network</b> (free ADS-B). Aircraft registrations shown are estimates — confirm ICAO24 codes with your ops team for exact matching. Refresh every ~60s for best results.
        </div>
      </div>
    </div>`;

  el.innerHTML = html;

  // Auto-tick the flip clock every second
  clearTimeout(_fleetTimer);
  if(S.tab === 'fleet') {
    _fleetTimer = setTimeout(() => {
      if(S.tab === 'fleet') renderFleet(document.getElementById('content'));
    }, 1000);
  }
}

// ── DAY NOTES ──────────────────────────────────────────────────────────
// Per-calendar-date sticky notes pinned to Week tab and Today's tab.

function weekIsoDate(dayIdx) {
  const now = new Date();
  const diff = dayIdx - now.getDay();
  const d = new Date(now);
  d.setDate(now.getDate() + diff);
  // Use local year/month/day — toISOString() returns UTC which can be a day off at night
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

window._dayNoteOpen = {};
window._dayNoteTimer = {};

function renderDayNoteWidget(isoDate, isToday) {
  const note = S.dayNotes[isoDate] || {};
  const text = note.text || '';
  const isOpen = !!window._dayNoteOpen[isoDate];
  const hasText = text.trim().length > 0;

  // On Today tab: only show if there's content
  if(isToday && !hasText) return '';

  const btnLabel = isToday
    ? '📌 Day note'
    : (hasText ? '📝 Day note' : '📝 Add note for this day');

  return `<div style="margin:6px 14px 4px">
    <button onclick="toggleDayNote('${isoDate}')"
      style="display:flex;align-items:center;gap:7px;background:${hasText?'#FFF59D':'rgba(255,255,255,0.07)'};
             border:1.5px ${hasText?'dashed #C8A84B':'dashed rgba(255,255,255,0.18)'};
             border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;
             color:${hasText?'#333':'var(--t2)'};cursor:pointer;width:100%;text-align:left">
      ${btnLabel}
      ${hasText?`<span style="margin-left:auto;width:9px;height:9px;background:#F39C12;border-radius:50%;flex-shrink:0"></span>`:''}
    </button>
    ${isOpen ? `
    <div id="dayNoteCard_${isoDate}" style="
      margin-top:6px;
      background:#FFF59D;
      background-image:linear-gradient(225deg,rgba(0,0,0,0.13) 24px,transparent 24px);
      border-radius:4px 4px 0 4px;
      box-shadow:3px 5px 16px rgba(0,0,0,0.32);
      padding:12px 12px 50px;
      position:relative;
      animation:notePopIn 0.18s ease both">
      <textarea id="dayNoteTA_${isoDate}"
        placeholder="Write your reminder here..."
        oninput="scheduleSaveDayNote('${isoDate}')"
        style="width:100%;border:none;background:transparent;resize:none;
               font-family:inherit;font-size:14px;font-weight:600;color:#1c1c1c;
               line-height:1.5;outline:none;min-height:90px;box-sizing:border-box;
               caret-color:#333">${text.replace(/</g,'&lt;')}</textarea>
      <div style="position:absolute;bottom:10px;right:12px">
        <button onclick="completeDayNote('${isoDate}')"
          style="background:#27AE60;color:#fff;border:none;border-radius:20px;
                 padding:8px 20px;font-size:12px;font-weight:700;cursor:pointer;
                 box-shadow:0 2px 8px rgba(0,0,0,0.2)">
          ✅ Complete
        </button>
      </div>
    </div>` : ''}
  </div>`;
}

function toggleDayNote(isoDate) {
  window._dayNoteOpen[isoDate] = !window._dayNoteOpen[isoDate];
  const el = document.getElementById('content');
  if(S.tab==='today') renderToday(el);
  else if(S.tab==='week' && S.inDay) renderDayDetail(el);
  if(window._dayNoteOpen[isoDate]) {
    setTimeout(()=>{
      const ta = document.getElementById('dayNoteTA_'+isoDate);
      if(ta){ ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
    }, 60);
  }
}

function scheduleSaveDayNote(isoDate) {
  const ta = document.getElementById('dayNoteTA_'+isoDate);
  if(!ta) return;
  const text = ta.value;
  if(!S.dayNotes[isoDate]) S.dayNotes[isoDate] = {};
  S.dayNotes[isoDate].text = text;
  // Defer localStorage write so it doesn't block keystrokes
  clearTimeout(window._dayNoteTimer[isoDate]);
  window._dayNoteTimer[isoDate] = setTimeout(()=>{
    try { localStorage.setItem('gykf_dayNotes', JSON.stringify(S.dayNotes)); } catch(e) {}
    fsSaveDayNote(isoDate, true);
  }, 1000);
}

function completeDayNote(isoDate) {
  delete S.dayNotes[isoDate];
  delete window._dayNoteOpen[isoDate];
  try { localStorage.setItem('gykf_dayNotes', JSON.stringify(S.dayNotes)); } catch(e) {}
  if(db) db.collection('dayNotes').doc(isoDate).delete().catch(()=>{});
  const el = document.getElementById('content');
  if(S.tab==='today') renderToday(el);
  else if(S.tab==='week' && S.inDay) renderDayDetail(el);
  else if(S.tab==='week') renderWeek(el);
}

function fsSaveDayNote(isoDate, suppressRender) {
  if(!db) return;
  const note = S.dayNotes[isoDate];
  if(!note || !note.text) return;
  if(suppressRender) window._dayNoteSaving = (window._dayNoteSaving||0) + 1;
  db.collection('dayNotes').doc(isoDate).set({text: note.text})
    .then(()=>{ if(suppressRender) window._dayNoteSaving = Math.max(0,(window._dayNoteSaving||1)-1); })
    .catch(e => { console.log('fsSaveDayNote failed:', e); if(suppressRender) window._dayNoteSaving = Math.max(0,(window._dayNoteSaving||1)-1); });
}

// Sticky-note banner for unresolved handoff notes — shown on Home and Today.
function renderHandoffNotesHtml() {
  if(!S.handoffNotes || !S.handoffNotes.length) return '';
  return S.handoffNotes.map(n=>`
    <div style="margin:12px 14px;padding:14px 16px;background:#FFF4C2;border-radius:10px;
                box-shadow:0 4px 14px rgba(0,0,0,0.25);transform:rotate(-1deg);
                border:1px solid rgba(0,0,0,0.06)">
      <div style="font-size:11px;font-weight:700;color:#8a6d00;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px">📌 Handoff from ${n.day||'last shift'}</div>
      ${n.text?`<div style="font-size:14px;color:#2a2200;line-height:1.4;margin-bottom:8px">${n.text}</div>`:''}
      ${n.audio?`<audio controls src="${n.audio}" style="width:100%;margin-bottom:8px;height:32px"></audio>`:''}
      <button onclick="markHandoffComplete('${n.id}')" style="padding:7px 14px;border-radius:20px;border:none;background:#2a2200;color:#FFF4C2;font-size:12px;font-weight:600;cursor:pointer">✅ Complete</button>
    </div>
  `).join('');
}

// One-time bootstrap: if the procedures collection has never been seeded,
// push the app's built-in default procedures into Firestore so they become
// editable/live from here on. Harmless no-op on every later boot once seeded.
async function seedProceduresIfEmpty() {
  if(!db) return;
  try {
    const snap = await db.collection('procedures').get();
    const existingKeys = new Set(snap.docs.map(d=>d.id));
    const missingEntries = Object.entries(S.procs).filter(([key])=>!existingKeys.has(key));
    if(!missingEntries.length) return;
    const batch = db.batch();
    missingEntries.forEach(([key,p])=>{
      batch.set(db.collection('procedures').doc(key), {
        title:p.title, icon:p.icon, warn:p.warn||'', video:p.video||'',
        steps:p.steps, isCrewCar:p.isCrewCar||false
      });
    });
    await batch.commit();
    console.log('Seeded missing procedures:', missingEntries.map(([k])=>k));
  } catch(e) { console.log('seedProceduresIfEmpty failed:', e); }
}

// Best-effort write-through to Firestore. Local state has already been
// updated by the caller, so a failed/offline write just means this device
// won't broadcast the change until it's back online — nothing is lost.
function fsSetTaskDone(tabName, task, done) {
  if(!db) return;
  // Include today's date so stale states from last week are ignored on load
  db.collection('taskState').doc(tabName).set(
    {[fsKey(task)]:done, _date: new Date().toDateString()}, {merge:true}
  ).catch(e => console.log('fsSetTaskDone failed (offline?):', e));
}
function fsSetShopState(item, checked, status, qty) {
  if(!db) return;
  const upd = {checked, status};
  if(qty !== undefined) upd.qty = qty;
  db.collection('shopState').doc('state').set({[fsKey(item)]:upd}, {merge:true})
    .catch(e => console.log('fsSetShopState failed (offline?):', e));
}
function fsSetBoredDone(task, done) {
  if(!db) return;
  db.collection('boredState').doc('state').set({[fsKey(task)]:done}, {merge:true})
    .catch(e => console.log('fsSetBoredDone failed (offline?):', e));
}

async function requestNotificationPermission() {
  try {
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      toast('Notifications blocked — enable in browser settings');
      return false;
    }

    // Subscribe via native Web Push (works on iOS 16.4+ without APNs key)
    const swReg = await navigator.serviceWorker.ready;
    const sub = await swReg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });

    // Store subscription in Firestore keyed by endpoint hash
    const subId = btoa(sub.endpoint).replace(/[^a-zA-Z0-9]/g,'').slice(-40);
    localStorage.setItem('push_sub_id', subId);
    if (db) {
      db.collection('pushSubscriptions').doc(subId).set({
        sub: JSON.parse(JSON.stringify(sub)),
        ts: firebase.firestore.FieldValue.serverTimestamp(),
        ua: navigator.userAgent.slice(0, 80)
      }, { merge: true }).then(() => {
        console.log('Push sub saved to Firestore ✓');
      }).catch(e => {
        console.error('Push sub Firestore FAILED:', e);
        toast('⚠️ Sub saved locally but Firestore failed: ' + e.code);
      });
    }

    console.log('Push subscription saved:', subId);
    toast('✅ Notifications enabled!');
    localStorage.setItem('notifications_enabled', '1');
    updateNotifBtn();
    return true;
  } catch(e) {
    console.error('Notification setup error:', e);
    toast('Could not enable notifications: ' + e.message);
    return false;
  }
}

function scheduleLocalNotifications() {
  // Clear any existing scheduled notifications
  const existingIds = JSON.parse(localStorage.getItem('notif_ids') || '[]');
  existingIds.forEach(id => clearTimeout(id));

  const now = new Date();
  const ids = [];

  COFFEE_TIMES.forEach(({ hour, minute, message }) => {
    const target = new Date();
    target.setHours(hour, minute, 0, 0);

    // If time already passed today, schedule for tomorrow
    if (target <= now) {
      target.setDate(target.getDate() + 1);
    }

    const delay = target - now;
    const id = setTimeout(() => {
      if (Notification.permission === 'granted') {
        new Notification('✈ Skycare', {
          body: message,
          icon: './cars/Metroliner_logo-removebg-preview.png',
          badge: './cars/Metroliner_logo-removebg-preview.png',
          tag: `coffee-${hour}`,
          renotify: true,
        });
      }
      // Reschedule for next day
      const nextDay = setTimeout(() => scheduleLocalNotifications(), 100);
    }, delay);

    ids.push(id);
    console.log(`Notification scheduled for ${hour}:${minute < 10 ? '0'+minute : minute} (in ${Math.round(delay/60000)} min)`);
  });

  localStorage.setItem('notif_ids', JSON.stringify(ids));
}

async function disableNotifications() {
  const existingIds = JSON.parse(localStorage.getItem('notif_ids') || '[]');
  existingIds.forEach(id => clearTimeout(id));

  // Unsubscribe from push
  try {
    const swReg = await navigator.serviceWorker.ready;
    const sub = await swReg.pushManager.getSubscription();
    if (sub) await sub.unsubscribe();
  } catch(e) {}

  // Remove from Firestore
  const subId = localStorage.getItem('push_sub_id');
  if (subId && db) {
    db.collection('pushSubscriptions').doc(subId).delete().catch(()=>{});
  }

  localStorage.removeItem('notif_ids');
  localStorage.removeItem('notifications_enabled');
  localStorage.removeItem('push_sub_id');
  toast('🔕 Notifications disabled');
  updateNotifBtn();
}

function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (!btn) return;
  const enabled = localStorage.getItem('notifications_enabled') === '1';
  btn.textContent = enabled ? '🔔' : '🔕';
  btn.title = enabled ? 'Notifications ON — tap to disable' : 'Enable coffee notifications';
}

function toggleNotifications() {
  const enabled = localStorage.getItem('notifications_enabled') === '1';
  if (enabled) {
    disableNotifications();
  } else {
    requestNotificationPermission();
  }
}

window.addEventListener('load', () => {
  setTimeout(() => updateNotifBtn(), 2000);
});

// Handle incoming FCM messages when app is open
document.addEventListener('DOMContentLoaded', () => {
  if (fbMessaging) {
    fbMessaging.onMessage((payload) => {
      console.log('FCM message received:', payload);
      const { title, body } = payload.notification || {};
      if (title) toast(`${title}: ${body}`);
    });
  }
});
