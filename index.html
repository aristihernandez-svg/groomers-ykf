<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1A3A5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Groomers YKF">
<title>Groomers YKF</title>
<link rel="manifest" href="manifest.json">
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ══════════════════════════════════════════════
   BASE TOKENS — Premium Dark Night (default)
══════════════════════════════════════════════ */
:root{
  --bg:         #0B1120;
  --bg2:        #0F1830;
  --bg3:        #141F3A;
  --bg4:        #1A2848;
  --gold:       #C8A84B;
  --gold2:      #E8C86A;
  --gold-dim:   rgba(200,168,75,0.18);
  --gold-glow:  rgba(200,168,75,0.08);
  --glass:      rgba(255,255,255,0.05);
  --glass2:     rgba(255,255,255,0.08);
  --glass3:     rgba(255,255,255,0.12);
  --border:     rgba(255,255,255,0.07);
  --border2:    rgba(255,255,255,0.12);
  --border-gold:rgba(200,168,75,0.30);
  /* Text — clear contrast ladder */
  --t1:         #F0F4FF;   /* primary — headings, task names */
  --t2:         #A8B8CC;   /* secondary — metadata, frequencies */
  --t3:         #607080;   /* tertiary — hints, timestamps */
  --t4:         #3A4A5A;   /* disabled / done */
  /* Status */
  --green:      #2ECC8A;
  --green-dim:  rgba(46,204,138,0.12);
  --red:        #E84040;
  --red-dim:    rgba(232,64,64,0.12);
  /* Done state */
  --done-bg:    rgba(255,255,255,0.02);
  --done-text:  #3A4A5A;
  /* Misc */
  --safe-b:     env(safe-area-inset-bottom,0px);
  --safe-t:     env(safe-area-inset-top,0px);
  --radius:     12px;
  --radius-sm:  8px;
  --accent:     var(--gold);
  --accent2:    var(--gold2);
  --accent-dim: var(--gold-dim);
  --accent-border: var(--border-gold);
}

/* ══════════════════════════════════════════════
   THEME: Premium Dark — Day
══════════════════════════════════════════════ */
[data-theme="premium-day"]{
  --bg:         #E8EDF8;
  --bg2:        #F2F5FC;
  --bg3:        #FFFFFF;
  --bg4:        #DDE3F0;
  --gold:       #9A7A28;
  --gold2:      #B89030;
  --gold-dim:   rgba(154,122,40,0.12);
  --gold-glow:  rgba(154,122,40,0.06);
  --glass:      rgba(255,255,255,0.60);
  --glass2:     rgba(255,255,255,0.80);
  --glass3:     rgba(255,255,255,0.95);
  --border:     rgba(0,20,60,0.08);
  --border2:    rgba(0,20,60,0.14);
  --border-gold:rgba(154,122,40,0.30);
  --t1:         #0A1428;
  --t2:         #3A5070;
  --t3:         #7A90A8;
  --t4:         #AAB8C8;
  --green:      #1A7A50;
  --green-dim:  rgba(26,122,80,0.10);
  --red:        #C03030;
  --red-dim:    rgba(192,48,48,0.10);
  --done-bg:    rgba(0,20,60,0.04);
  --done-text:  #AAB8C8;
  --accent:     var(--gold);
  --accent2:    var(--gold2);
  --accent-dim: var(--gold-dim);
  --accent-border: var(--border-gold);
}

/* ══════════════════════════════════════════════
   THEME: Standard — Night
══════════════════════════════════════════════ */
[data-theme="standard-night"]{
  --bg:         #111111;
  --bg2:        #1A1A1A;
  --bg3:        #222222;
  --bg4:        #2A2A2A;
  --gold:       #FFFFFF;
  --gold2:      #DDDDDD;
  --gold-dim:   rgba(255,255,255,0.08);
  --gold-glow:  rgba(255,255,255,0.04);
  --glass:      rgba(255,255,255,0.04);
  --glass2:     rgba(255,255,255,0.07);
  --glass3:     rgba(255,255,255,0.10);
  --border:     rgba(255,255,255,0.08);
  --border2:    rgba(255,255,255,0.14);
  --border-gold:rgba(255,255,255,0.20);
  --t1:         #FFFFFF;
  --t2:         #AAAAAA;
  --t3:         #666666;
  --t4:         #3A3A3A;
  --green:      #44CC77;
  --green-dim:  rgba(68,204,119,0.12);
  --red:        #EE4444;
  --red-dim:    rgba(238,68,68,0.12);
  --done-bg:    rgba(255,255,255,0.02);
  --done-text:  #3A3A3A;
  --radius:     8px;
  --radius-sm:  5px;
  --accent:     #FFFFFF;
  --accent2:    #DDDDDD;
  --accent-dim: rgba(255,255,255,0.08);
  --accent-border: rgba(255,255,255,0.20);
}

/* ══════════════════════════════════════════════
   THEME: Standard — Day
══════════════════════════════════════════════ */
[data-theme="standard-day"]{
  --bg:         #F5F5F5;
  --bg2:        #FFFFFF;
  --bg3:        #F0F0F0;
  --bg4:        #E8E8E8;
  --gold:       #111111;
  --gold2:      #333333;
  --gold-dim:   rgba(0,0,0,0.06);
  --gold-glow:  rgba(0,0,0,0.03);
  --glass:      rgba(0,0,0,0.02);
  --glass2:     rgba(0,0,0,0.04);
  --glass3:     rgba(0,0,0,0.06);
  --border:     rgba(0,0,0,0.08);
  --border2:    rgba(0,0,0,0.14);
  --border-gold:rgba(0,0,0,0.20);
  --t1:         #111111;
  --t2:         #444444;
  --t3:         #888888;
  --t4:         #BBBBBB;
  --green:      #1A7A40;
  --green-dim:  rgba(26,122,64,0.10);
  --red:        #CC2222;
  --red-dim:    rgba(204,34,34,0.10);
  --done-bg:    rgba(0,0,0,0.03);
  --done-text:  #BBBBBB;
  --radius:     8px;
  --radius-sm:  5px;
  --accent:     #111111;
  --accent2:    #333333;
  --accent-dim: rgba(0,0,0,0.06);
  --accent-border: rgba(0,0,0,0.20);
}

/* ══════════════════════════════════════════════
   GLOBAL STYLES — use token vars everywhere
══════════════════════════════════════════════ */
html,body{
  height:100%;overflow:hidden;
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);color:var(--t1);
}

/* Background mesh — premium only */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%,rgba(200,168,75,0.05) 0%,transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 100%,rgba(26,40,72,0.6) 0%,transparent 70%);
  transition:opacity 0.4s;
}
[data-theme="premium-day"] body::before{
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%,rgba(154,122,40,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 100%,rgba(180,196,220,0.4) 0%,transparent 70%);
}
[data-theme="standard-night"] body::before,
[data-theme="standard-day"] body::before{background:none}

/* SPLASH */
#splash{
  position:fixed;inset:0;z-index:999;transition:opacity 0.6s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%,#1A2848 0%,#0B1120 60%,#060C18 100%);
}
#splash.out{opacity:0;pointer-events:none}
.splash-ring{
  width:120px;height:120px;border-radius:50%;
  border:1px solid rgba(200,168,75,0.35);
  display:flex;align-items:center;justify-content:center;
  position:relative;margin-bottom:24px;
  box-shadow:0 0 40px rgba(200,168,75,0.08),inset 0 0 40px rgba(200,168,75,0.04);
}
.splash-ring::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid rgba(200,168,75,0.10);
}
.sp-plane{
  font-size:52px;
  filter:drop-shadow(0 4px 16px rgba(200,168,75,0.35));
  animation:bob 2.5s ease-in-out infinite;
}
@keyframes bob{
  0%,100%{transform:translateY(0) rotate(-4deg)}
  50%{transform:translateY(-10px) rotate(4deg)}
}
@keyframes takeoff{
  0%   {transform:translateX(-60px) translateY(8px)  rotate(0deg); opacity:0}
  8%   {transform:translateX(-45px) translateY(6px)  rotate(2deg); opacity:0.6}
  18%  {transform:translateX(-25px) translateY(3px)  rotate(8deg); opacity:0.9}
  30%  {transform:translateX(-5px)  translateY(-4px) rotate(12deg);opacity:1}
  50%  {transform:translateX(20px)  translateY(-16px) rotate(15deg);opacity:1}
  70%  {transform:translateX(50px)  translateY(-34px) rotate(15deg);opacity:0.7}
  85%  {transform:translateX(75px)  translateY(-52px) rotate(15deg);opacity:0}
  86%  {transform:translateX(-70px) translateY(8px)  rotate(0deg); opacity:0}
  100% {transform:translateX(-60px) translateY(8px)  rotate(0deg); opacity:0}
}
.sp-title{color:#E8C86A;font-size:26px;font-weight:700;letter-spacing:4px;text-transform:uppercase}
.sp-sub{color:#7890A8;font-size:12px;letter-spacing:3px;margin-top:6px;font-weight:300}
.sp-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,#C8A84B,transparent);margin:18px auto;opacity:0.5}
.sp-bar{width:160px;height:1px;background:rgba(255,255,255,0.08);border-radius:1px;margin-top:8px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,#C8A84B,#E8C86A);animation:prog 2s ease forwards;box-shadow:0 0 8px #C8A84B}
@keyframes prog{to{width:100%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bob2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* APP */
#app{display:flex;flex-direction:column;height:100%;opacity:0;transition:opacity 0.3s;position:relative;z-index:1}
#app.show{opacity:1}

/* TOPBAR */
.bar{
  background:rgba(11,17,32,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  padding:calc(var(--safe-t) + 12px) 16px 12px;
  flex-shrink:0;position:relative;z-index:20;
}
[data-theme="premium-day"] .bar{background:rgba(232,237,248,0.92)}
[data-theme="standard-night"] .bar{background:#111111}
[data-theme="standard-day"] .bar{background:#FFFFFF;border-bottom:1px solid rgba(0,0,0,0.10)}
.bar-title{font-size:17px;font-weight:600;color:var(--t1);flex:1;letter-spacing:0.3px;cursor:pointer}
.bar-pill{
  background:var(--accent-dim);border:1px solid var(--accent-border);
  padding:4px 12px;border-radius:20px;font-size:11px;
  color:var(--accent);font-weight:500;letter-spacing:0.5px;
}
.bar-btn{background:none;border:none;color:var(--t3);font-size:18px;padding:4px 6px;cursor:pointer}

/* PULL TO REFRESH */
.ptr{height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:height 0.2s;flex-shrink:0}
.ptr.active{height:44px}
.ptr-spin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(70px + var(--safe-b));background:var(--bg)}

/* NAV */
.nav{
  background:rgba(11,17,32,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;
  flex-shrink:0;padding-bottom:var(--safe-b);
}
[data-theme="premium-day"] .nav{background:rgba(232,237,248,0.95)}
[data-theme="standard-night"] .nav{background:#111111;border-top:1px solid rgba(255,255,255,0.08)}
[data-theme="standard-day"] .nav{background:#FFFFFF;border-top:1px solid rgba(0,0,0,0.08)}
.nav::-webkit-scrollbar{display:none}
.nb{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;padding:9px 16px 7px;cursor:pointer;border-top:2px solid transparent;transition:all 0.2s;min-width:64px}
.nb.on{border-top-color:#1A3A5C}
.nb.on .ni{color:#1A3A5C}
.nb.on .nl{color:#1A3A5C;font-weight:700}
.ni{font-size:20px;color:#607080;margin-bottom:2px;transition:color 0.2s;display:flex;align-items:center;justify-content:center;height:24px}
.nl{font-size:10px;color:#607080;white-space:nowrap;font-weight:500;letter-spacing:0.3px;transition:color 0.2s}

/* SPINNER */
.spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
.spin-lbl{font-size:13px;color:var(--t2)}

/* PROGRESS */
.prog-wrap{
  background:rgba(11,17,32,0.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);padding:12px 16px;
  position:sticky;top:0;z-index:10;
}
[data-theme="premium-day"] .prog-wrap{background:rgba(232,237,248,0.90)}
[data-theme="standard-night"] .prog-wrap{background:#1A1A1A}
[data-theme="standard-day"] .prog-wrap{background:#FFFFFF;border-bottom:1px solid rgba(0,0,0,0.08)}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:7px;font-weight:500}
.prog-bar{height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.4s;box-shadow:0 0 6px var(--accent-dim)}

/* SECTION HEADER */
.sec{
  padding:8px 16px;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);
  background:linear-gradient(90deg,var(--accent-dim),transparent);
  border-bottom:1px solid var(--border);
  border-left:2px solid var(--accent);
  margin-top:2px;
}
[data-theme="standard-night"] .sec{
  background:var(--bg3);color:var(--t1);border-left-color:var(--t4);
}
[data-theme="standard-day"] .sec{
  background:var(--bg3);color:var(--t1);border-left-color:var(--t4);
}

/* TASK ROWS */
.trow-wrap{position:relative;overflow:hidden}
.trow-del-bg{
  position:absolute;right:0;top:0;bottom:0;width:80px;
  background:var(--red-dim);display:flex;align-items:center;
  justify-content:center;color:var(--red);font-size:12px;font-weight:600;
  cursor:pointer;border-left:1px solid rgba(232,64,64,0.2);
}
.trow{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:var(--glass);border-bottom:1px solid var(--border);
  cursor:pointer;min-height:54px;position:relative;
  transition:background 0.15s,transform 0.2s ease;
}
[data-theme="standard-night"] .trow{background:var(--bg2)}
[data-theme="standard-day"] .trow{background:var(--bg2)}
.trow:active{background:var(--glass2)}
.trow.done{background:var(--done-bg)}
.trow.done .ttxt{text-decoration:line-through;color:var(--done-text)}
.trow.done .tfreq{color:var(--t4)}
.trow.closure{background:rgba(232,64,64,0.04);border-left:2px solid rgba(232,64,64,0.2)}
.trow.closure.done{background:var(--done-bg)}

/* CHECKBOX */
.tcb{
  width:26px;height:26px;border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:12px;color:var(--bg);
  transition:all 0.2s;
}
.tcb.on{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-color:var(--accent);
  box-shadow:0 0 10px var(--accent-dim);
}
.tinfo{flex:1;min-width:0}
.ttxt{font-size:14px;color:var(--t1);line-height:1.3;font-weight:600}
.tfreq{font-size:11px;color:var(--t3);margin-top:2px}

/* ADD ROW */
.add-row{display:flex;align-items:center;gap:10px;padding:10px 16px;background:transparent;border-bottom:1px solid var(--border);cursor:pointer;opacity:0.4;transition:opacity 0.15s}
.add-row:active{opacity:0.7}
.add-circ{width:24px;height:24px;border-radius:50%;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:14px;flex-shrink:0}
.add-row span{font-size:12px;color:var(--t3)}

/* GLASS CARDS */
.notes-wrap{
  margin:12px;background:var(--glass);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;
}
[data-theme="standard-night"] .notes-wrap,[data-theme="standard-day"] .notes-wrap{background:var(--bg2);backdrop-filter:none}
.notes-hdr{
  background:var(--glass2);border-bottom:1px solid var(--border);
  padding:10px 14px;font-size:12px;font-weight:600;color:var(--t2);
  display:flex;align-items:center;justify-content:space-between;
}
[data-theme="standard-night"] .notes-hdr,[data-theme="standard-day"] .notes-hdr{background:var(--bg3)}
.notes-hdr button{
  background:var(--accent-dim);border:1px solid var(--accent-border);
  color:var(--accent);border-radius:20px;padding:4px 12px;
  font-size:11px;cursor:pointer;font-weight:500;
}
.nrow{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.nrow:last-child{border-bottom:none}
.nrow.done .ntxt{text-decoration:line-through;color:var(--done-text)}
.ncb{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--bg);transition:all 0.15s;margin-top:1px}
.ncb.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent)}
.ninfo{flex:1}
.ntxt{font-size:13px;color:var(--t1);line-height:1.4}
.nmeta{font-size:11px;color:var(--t3);margin-top:2px}
.nphoto{width:100%;border-radius:var(--radius-sm);margin-top:8px;max-height:160px;object-fit:cover;border:1px solid var(--border)}
.ndel{color:var(--t4);font-size:15px;padding:2px 6px;cursor:pointer}

/* RESET DAY */
.reset-day-bar{padding:10px 12px;background:transparent;border-bottom:1px solid var(--border)}
.reset-day-btn{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid var(--border);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}

/* SHOPPING */
.shop-filters{background:rgba(11,17,32,0.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
[data-theme="premium-day"] .shop-filters{background:rgba(232,237,248,0.92)}
[data-theme="standard-night"] .shop-filters{background:#111111}
[data-theme="standard-day"] .shop-filters{background:#FFFFFF}
.shop-bar{padding:10px 12px 0;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.shop-bar::-webkit-scrollbar{display:none}
.shop-bar2{padding:6px 12px 10px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border)}
.shop-bar2::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--glass);color:var(--t2);transition:all 0.15s}
.chip:active{opacity:0.7}
.chip-label{font-size:10px;color:var(--t3);padding:2px 12px 0;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.search-wrap{padding:8px 12px;border-bottom:1px solid var(--border)}
.search-inner{position:relative}
.search-inp{width:100%;padding:10px 36px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--glass2);font-size:14px;font-family:inherit;color:var(--t1);outline:none}
.search-inp:focus{border-color:var(--accent-border)}
.search-inp::placeholder{color:var(--t3)}
.s-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t3);pointer-events:none}

.cart-store-hdr{padding:9px 16px 6px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#fff;display:flex;align-items:center;gap:8px}
.cart-count{background:rgba(255,255,255,0.15);border-radius:20px;padding:1px 8px;font-size:10px}

.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:12px}
.empty-icon{font-size:40px;opacity:0.5}
.empty p{font-size:13px;color:var(--t3);text-align:center}
.empty button{margin-top:8px;padding:8px 20px;border-radius:20px;border:1px solid var(--border2);background:var(--glass);font-size:13px;cursor:pointer;color:var(--t2)}

.reset-bar{padding:12px 14px;background:rgba(11,17,32,0.8);border-top:1px solid var(--border)}

[data-theme="standard-night"] .reset-bar{background:#111111}

.reset-btn{width:100%;padding:13px;border-radius:var(--radius-sm);background:var(--green-dim);color:var(--green);border:1px solid rgba(46,204,138,0.2);font-size:14px;font-weight:600;cursor:pointer}

/* PROCEDURES */
.proc-list{padding:0;display:flex;flex-direction:column;gap:0}
.pcard{background:var(--glass);border-radius:0;border:none;border-bottom:1px solid var(--border);overflow:hidden;transition:border-color 0.2s;margin-bottom:0}
[data-theme="standard-night"] .pcard,[data-theme="standard-day"] .pcard{background:var(--bg2)}

.pcard-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;background:var(--glass);border-bottom:1px solid var(--border)}
[data-theme="standard-night"] .pcard-hdr,[data-theme="standard-day"] .pcard-hdr{background:var(--bg2)}
.picon{font-size:24px}
.ptitle{font-size:15px;font-weight:700;color:var(--t1);flex:1}

.parr{color:var(--border2);font-size:20px;transition:transform 0.2s,color 0.2s}

.pbody{display:none;padding:8px 16px 16px;border-top:1px solid var(--border);background:var(--glass)}
.pcard.open .pbody{display:block}
.pwarn{background:var(--red-dim);border-left:3px solid var(--red);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:10px 14px;margin:12px 0 8px;font-size:12px;color:var(--red);font-weight:500;line-height:1.6}
.pstep{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);cursor:pointer}
.pstep:last-child{border-bottom:none}
.pstep.done .stxt{text-decoration:line-through;color:var(--done-text)}

.snum{width:28px;height:28px;border-radius:50%;background:var(--glass2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--t2);flex-shrink:0;transition:all 0.2s}
.pstep.done .snum{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);border-color:var(--accent)}
.sinfo{flex:1}
.stxt{font-size:13px;color:var(--t1);line-height:1.5}
.snote{font-size:11px;color:var(--t3);margin-top:2px}
.green-step .stxt{color:var(--green);font-weight:500}
.proc-actions{display:flex;gap:8px;margin-top:12px}
.proc-act-btn{flex:1;padding:10px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--glass2);color:var(--t2)}
.video-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;background:rgba(64,144,255,0.06);border:1px solid rgba(64,144,255,0.15);border-radius:var(--radius-sm);margin:10px 0;cursor:pointer;text-decoration:none}
.video-btn span{font-size:13px;color:#6EB0FF;font-weight:500}
.vicon{font-size:20px}
.dmg-section{margin-top:12px;background:var(--red-dim);border-radius:var(--radius-sm);border:1px solid rgba(232,64,64,0.15);overflow:hidden}
.dmg-hdr{background:rgba(232,64,64,0.08);color:var(--red);padding:8px 14px;font-size:11px;font-weight:600;letter-spacing:0.5px}
.dmg-body{padding:10px 14px}
.dmg-btn{width:100%;padding:10px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid rgba(232,64,64,0.15);font-size:12px;font-weight:500;color:var(--red);cursor:pointer;margin-bottom:8px;display:flex;align-items:center;justify-content:center;gap:8px}
.dmg-photo{width:100%;border-radius:var(--radius-sm);margin-top:6px;max-height:200px;object-fit:cover}
.dmg-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.dmg-item{background:var(--glass);border-radius:var(--radius-sm);padding:8px 10px;border:1px solid var(--border);font-size:12px;color:var(--t2)}
.dmg-item-photo{width:100%;border-radius:6px;margin-top:4px;max-height:120px;object-fit:cover}

/* CONTACTS */
.con-list{padding:0;display:flex;flex-direction:column;gap:0}
.ccard{background:var(--glass);border-radius:0;border:none;border-bottom:1px solid var(--border);overflow:hidden}
[data-theme="standard-night"] .ccard,[data-theme="standard-day"] .ccard{background:var(--bg2)}
.crow{padding:14px 16px}
.cname{font-size:14px;font-weight:700;color:var(--t1)}
.caddr{font-size:12px;color:var(--t2);margin-top:5px;line-height:1.5;cursor:pointer;display:flex;align-items:flex-start;gap:6px}
.caddr-text{flex:1;color:#6EB0FF;text-decoration:underline;font-weight:500}
.cnote{font-size:12px;color:var(--t2);margin-top:5px;line-height:1.5}
.maps-btn{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:7px 14px;border-radius:20px;background:rgba(64,144,255,0.10);color:#6EB0FF;font-size:12px;font-weight:600;cursor:pointer;border:1px solid rgba(64,144,255,0.20);text-decoration:none}

/* BORED */
.bored-list{padding:0;display:flex;flex-direction:column;gap:0}
.bitem{display:flex;align-items:center;gap:12px;background:var(--glass);border-radius:0;border:none;border-bottom:1px solid var(--border);padding:14px 16px;cursor:pointer;transition:background 0.15s}
[data-theme="standard-night"] .bitem,[data-theme="standard-day"] .bitem{background:var(--bg2)}
.bitem:active{background:var(--glass2)}
.bitem.done{background:var(--done-bg);border-color:var(--border)}
.bitem.done .btxt{text-decoration:line-through;color:var(--done-text)}
.bcb{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:var(--bg);transition:all 0.2s}
.bcb.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent);box-shadow:0 0 8px var(--accent-dim)}
.btxt{font-size:14px;color:var(--t1);line-height:1.4;flex:1;font-weight:600}
.bdel{color:var(--t4);font-size:16px;padding:2px 8px;cursor:pointer}

/* WEEK */
.week-list{padding:0;display:flex;flex-direction:column;gap:0}

/* DAY DETAIL */
.dbar{display:flex;align-items:center;gap:10px;padding:12px 16px;color:#fff;position:sticky;top:0;z-index:15;backdrop-filter:blur(10px)}
.back-btn{background:none;border:none;color:var(--accent);font-size:24px;cursor:pointer;padding:0 4px;line-height:1}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);display:none;align-items:flex-end;z-index:200}
.overlay.open{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border2);border-bottom:none;border-radius:20px 20px 0 0;padding:20px;width:100%;padding-bottom:calc(20px + var(--safe-b));max-height:90vh;overflow-y:auto}
.modal::before{content:'';display:block;width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--t1)}
.modal input,.modal select,.modal textarea{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--glass2);font-size:14px;font-family:inherit;color:var(--t1);outline:none;margin-bottom:10px}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent-border)}
.modal input::placeholder,.modal textarea::placeholder{color:var(--t3)}
.modal textarea{height:80px;resize:none}
.modal label{font-size:12px;color:var(--t3);display:block;margin-bottom:4px;margin-top:4px;font-weight:500}
.mbtn-row{display:flex;gap:8px;margin-top:6px}
.mbtn{flex:1;padding:14px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none}
.mbtn.cancel{background:var(--glass2);color:var(--t2);border:1px solid var(--border)}
.mbtn.save{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg)}
[data-theme="standard-day"] .mbtn.save{color:#fff}

/* FAB */
.fab{position:fixed;right:16px;bottom:calc(72px + var(--safe-b));width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);border:none;font-size:24px;font-weight:700;box-shadow:0 4px 20px var(--accent-dim);cursor:pointer;display:none;align-items:center;justify-content:center;z-index:50}
.fab:active{transform:scale(0.93)}
[data-theme="standard-day"] .fab{color:#fff}

/* EOD FAB */
.eod-fab{position:fixed;left:16px;bottom:calc(72px + var(--safe-b));width:52px;height:52px;border-radius:50%;background:var(--green-dim);color:var(--green);border:1px solid rgba(46,204,138,0.2);font-size:20px;box-shadow:0 4px 16px rgba(46,204,138,0.1);cursor:pointer;display:none;align-items:center;justify-content:center;z-index:50}
.eod-fab.show{display:flex}

/* TOAST */
.toast{position:fixed;bottom:calc(76px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);color:var(--t1);border:1px solid var(--border2);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:400;box-shadow:0 8px 24px rgba(0,0,0,0.3);font-weight:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SWIPE ACTIONS ── */
.swipe-wrap{position:relative;overflow:hidden;touch-action:pan-y}
.swipe-action-left{
  position:absolute;left:0;top:0;bottom:0;width:90px;
  background:linear-gradient(135deg,#1A6B3C,#22A855);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:700;
  transform:translateX(-100%);
  transition:transform 0.25s ease;
  cursor:pointer;z-index:2;
}
.swipe-action-right{
  position:absolute;right:0;top:0;bottom:0;width:90px;
  background:linear-gradient(135deg,#8B1A1A,#CC2222);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:700;
  transform:translateX(100%);
  transition:transform 0.25s ease;
  cursor:pointer;z-index:2;
}
.swipe-wrap.open-right .swipe-action-right{
  transform:translateX(0);
}
.swipe-wrap .srow,
.swipe-wrap .bitem{
  position:relative;z-index:1;
  transition:transform 0.2s ease;
  background:var(--glass);
}
.swipe-wrap.open-left .srow,
.swipe-wrap.open-left .bitem{transform:translateX(90px)}
.swipe-wrap.open-left .swipe-action-left{transform:translateX(0)}
.swipe-wrap.open-right .srow,
.swipe-wrap.open-right .bitem{transform:translateX(-90px)}
.swipe-wrap.open-right .swipe-action-right{transform:translateX(0)}

/* ── DRAGGABLE NAV ── */
.nb{cursor:grab}
.nb.dragging{opacity:0.5;cursor:grabbing}
.nb.drag-over{background:var(--accent-dim)}

/* ── CART STORE HEADER (bigger, not red) ── */
.cart-store-hdr{
  padding:12px 16px 8px;
  font-size:13px;font-weight:700;
  letter-spacing:0.5px;
  color:#fff;
  display:flex;align-items:center;gap:10px;
  margin-top:4px;
}
.cart-count{
  background:rgba(255,255,255,0.2);
  border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600;
}
.cart-store-divider{
  height:3px;margin:0 0 2px;border-radius:2px;
}

/* ── QR CODE ── */
.qr-wrap{
  margin:12px 16px;
  background:var(--glass);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px;text-align:center;
}
.qr-title{font-size:11px;font-weight:700;color:var(--t2);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
.qr-canvas{border-radius:8px;background:#fff;padding:8px}
.qr-url{font-size:11px;color:var(--t3);margin-top:8px;font-family:monospace}

/* PHOTO PREVIEW */
.photo-preview{width:100%;border-radius:var(--radius-sm);margin:8px 0;max-height:200px;object-fit:cover;display:none;border:1px solid var(--border)}
</style>

<script>
// ── CONFIG ────────────────────────────────────────────────────────

// ── PULL TO REFRESH ────────────────────────────────────────────────
function setupPullToRefresh() {
  const content=document.getElementById('content');
  const ptr=document.getElementById('ptr');
  let startY=0, pulling=false;
  content.addEventListener('touchstart',e=>{
    if(content.scrollTop===0) startY=e.touches[0].clientY;
  },{passive:true});
  content.addEventListener('touchmove',e=>{
    if(!startY) return;
    const dy=e.touches[0].clientY-startY;
    if(dy>40&&content.scrollTop===0){pulling=true;ptr.classList.add('active');}
  },{passive:true});
  content.addEventListener('touchend',async()=>{
    if(pulling){
      pulling=false; startY=0;
      await syncAll();
      ptr.classList.remove('active');
    } else { startY=0; }
  });
}

// ── SWIPE TO DELETE ────────────────────────────────────────────────
function setupSwipe(el, onDelete) {
  let startX=0, currentX=0, swiping=false;
  const inner=el.querySelector('.trow');
  const bg=el.querySelector('.trow-del-bg');
  if(!inner||!bg) return;
  inner.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;swiping=true;},{passive:true});
  inner.addEventListener('touchmove',e=>{
    if(!swiping) return;
    currentX=e.touches[0].clientX-startX;
    if(currentX<0) inner.style.transform=`translateX(${Math.max(currentX,-80)}px)`;
  },{passive:true});
  inner.addEventListener('touchend',()=>{
    swiping=false;
    if(currentX<-50){
      inner.style.transform='translateX(-80px)';
      bg.style.display='flex';
    } else {
      inner.style.transform='';
      bg.style.display='none';
    }
    currentX=0;
  });
  bg.addEventListener('click',()=>{
    inner.style.transform=''; bg.style.display='none';
    onDelete();
  });
}

async function fetchDay(tabName) {
  try {
    const gid = TAB_GIDS[tabName];
    const url = gid
      ? `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`
      : `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
    const text=(await (await fetch(url)).text());
    const json=JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table?.rows||[];
    const cols=json.table?.cols||[];
    const tasks=[]; let area='';
    rows.forEach(row=>{
      const v=cols.map((_,i)=>{const c=row.c?.[i];return c?String(c.v??c.f??'').trim():'';});
      const colA=v[0]||'', colB=v[1]||'', colC=v[2]||'', colD=v[3]||'';
      if(!colA && !colB) return; // fully empty row
      // Section header: col A empty, col B has text, no number in col A
      const isNum = !isNaN(parseInt(colA)) && parseInt(colA)>0;
      if(!isNum && colB && colB!==colB.toLowerCase() && colB.length>2 && !colB.includes('SPECIAL') && !colB.includes('📝') && !colB.includes('Note')) {
        area=colB.toUpperCase(); return;
      }
      if(colB.toUpperCase().includes('SPECIAL NOTES')||colB.includes('📝')) return;
      if(colB==='Task'||colA==='#') return;
      if(isNum && colB) tasks.push({task:colB,freq:colC,area,done:false});
    });
    S.tasks[tabName]=tasks;
  } catch(e){ S.tasks[tabName]=S.tasks[tabName]||fallback(); }
  // Cache tasks locally so they survive page refresh
  try {
    const cached = JSON.parse(localStorage.getItem('gykf_tasks')||'{}');
    cached[tabName] = S.tasks[tabName];
    localStorage.setItem('gykf_tasks', JSON.stringify(cached));
  } catch(e) {}
}

async function fetchShopping() {
  try {
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=441663137`;
    const text=(await (await fetch(url)).text());
    const json=JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table?.rows||[], cols=json.table?.cols||[];
    // Normalize cabinet names at fetch time
    const normCabinet = (s) => {
      if(!s) return '';
      s = s.trim();
      // Standardize MX Hangar variations
      if(/mx\s*han[gh]?[ae]r/i.test(s)) return 'MX Hangar';
      if(/mx\s*office/i.test(s)) return 'MX Office';
      if(/crew\s*house/i.test(s)) return 'Crew House';
      if(/jet/i.test(s)) return "Jet's Cabinet"; // normalize all Jet variations
      if(/cr\s*(groomer|corner)/i.test(s)) return "CR Groomers' Corner";
      if(/cr\s*office/i.test(s)) return 'CR Office';
      if(/metro/i.test(s)) return 'Metro Cabinet';
      return s;
    };
    S.shopping=rows.map(row=>{
      const v=cols.map((_,i)=>{const c=row.c?.[i];return c?String(c.v??c.f??'').trim():'';});
      return {item:v[0],cabinet:normCabinet(v[1]),store:v[2],status:v[3],notes:v[4]||'',checked:v[3]==='To Buy'};
    }).filter(r=>r.item&&r.item!=='Item'&&!r.item.startsWith('💡')&&!r.item.startsWith('TO SHOP')&&r.item.length>1);
  } catch(e){S.shopping=S.shopping||[];}
  restoreShoppingState(); // overlay local checked state
}

// ── TODAY ──────────────────────────────────────────────────────────
function renderToday(el) {
  document.getElementById('barTitle').textContent='Skycare';
  document.getElementById('eodFab').classList.add('show');
  showFab(()=>openAddTask(DAYS[TODAY]));
  const tabName=DAYS[TODAY], tasks=S.tasks[tabName]||[], notes=S.notes[tabName]||[];
  const done=tasks.filter(t=>t.done).length;
  const pct=tasks.length?Math.round(done/tasks.length*100):0;
  let html=`
    <div class="reset-day-bar">
      <button class="reset-day-btn" onclick="resetDay()">🔄 Reset today's tasks</button>
    </div>
    <div class="prog-wrap">
      <div class="prog-row"><span>${DAY_NAMES[TODAY]}</span><span>${done}/${tasks.length} — ${pct}%</span></div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>`;
  html+=renderGroups(tasks,tabName);
  html+=renderNotes(notes,tabName);
  html+='<div style="height:90px"></div>';
  el.innerHTML=html;
  el.querySelectorAll('.trow-wrap').forEach(w=>{
    const idx=parseInt(w.dataset.idx);
    setupSwipe(w,()=>deleteTask(tabName,idx));
  });
}

function renderGroups(tasks, tabName) {
  const areas={};
  tasks.forEach(t=>{ (areas[t.area]=areas[t.area]||[]).push(t); });
  let html='';
  const areaOrder=['AIRCRAFT',"CR GROOMERS' CORNER",'CR OFFICE','MX HANGAR','MISC','CHARTER','CLOSURE'];
  const orderedAreas=[...areaOrder.filter(a=>areas[a]),...Object.keys(areas).filter(a=>!areaOrder.includes(a)&&areas[a])];
  orderedAreas.forEach(area=>{
    const atasks=areas[area];
    const bg=AREA_COLORS[area]||'#4A4A4A';
    html+=`<div class="sec" style="background:${bg}">${area||'TASKS'}</div>`;
    atasks.forEach(t=>{
      const gi=tasks.indexOf(t);
      html+=`
        <div class="trow-wrap" data-idx="${gi}">
          <div class="trow-del-bg" style="display:none">🗑 Delete</div>
          <div class="trow ${t.done?'done':''} ${area==='CLOSURE'?'closure':''}"
               onclick="toggleT('${tabName}',${gi})">
            <div class="tcb ${t.done?'on':''}">${t.done?'✓':''}</div>
            <div class="tinfo">
              <div class="ttxt">${t.task}</div>
              ${t.freq?`<div class="tfreq">${t.freq}</div>`:''}
            </div>
          </div>
        </div>`;
    });
    html+=`<div class="add-row" onclick="openAddTask('${tabName}','${area}')">
      <div class="add-circ">+</div><span>Add task to ${area}...</span></div>`;
  });
  return html;
}

function renderNotes(notes, tabName) {
  let html=`<div class="notes-wrap">
    <div class="notes-hdr">📝 Special Notes & Carry-over Tasks
      <button onclick="openAddNote('${tabName}')">+ Add</button>
    </div>`;
  if(!notes.length) {
    html+=`<div class="nrow"><div class="ninfo">
      <div class="ntxt" style="color:var(--t3);font-style:italic">No notes — tap + Add</div>
    </div></div>`;
  } else {
    notes.forEach((n,i)=>{
      html+=`<div class="nrow ${n.done?'done':''}" onclick="toggleNote('${tabName}',${i})">
        <div class="ncb ${n.done?'on':''}">${n.done?'✓':''}</div>
        <div class="ninfo">
          <div class="ntxt">${n.text}</div>
          <div class="nmeta">${n.area?n.area+' · ':''}${n.date||''}</div>
          ${n.photo?`<img class="nphoto" src="${n.photo}" onclick="event.stopPropagation();viewPhoto('${n.photo}')">`:''}
        </div>
        <div class="ndel" onclick="event.stopPropagation();deleteNote('${tabName}',${i})">✕</div>
      </div>`;
    });
  }
  return html+'</div>';
}

  el.querySelectorAll('.swipe-wrap[data-idx]').forEach(w=>{
    const i=parseInt(w.dataset.idx);
    if(!isNaN(i)) setupSwipeTwoWay(w, ()=>editShopItem(i), ()=>deleteShopItem(i));
  });
  // Restore vertical + horizontal scroll positions — done after layout
  // settles (rAF) so the browser doesn't clamp scrollTop back to 0 when
  // tapping a filter chip near the end of the scrollable row.
  requestAnimationFrame(() => {
    if(el) el.scrollTop = scrollTop;
    const b1 = document.querySelector('.shop-bar');
    const b2 = document.querySelector('.shop-bar2');
    if(b1 && bar1Scroll) b1.scrollLeft = bar1Scroll;
    if(b2 && bar2Scroll) b2.scrollLeft = bar2Scroll;
  });
  // Keep search focus
  const si=document.getElementById('shopSrch');
  if(si&&q){si.focus();si.setSelectionRange(q.length,q.length);}
}

function renderContactsList(q) {
  // Categorize contacts
  // Fixed categories — don't rely on heuristics
  const STORE_NAMES  = ['zehrs','costco','a1 cash','home depot','canadian tire',
                        'monarch','aviation supplier','jsa','aircraft spruce',
                        'crew house','laundry'];
  const CODE_NAMES   = ['code mx','code cr','code lock','code medic','ramp hanger','gate'];
  const PERSON_NAMES = ['wes','josh','keddy'];

  let stores  = [];
  let codes   = [];
  let persons = [];

  S.contacts.forEach(c => {
    const n = c.name.toLowerCase();
    if (PERSON_NAMES.some(p => n.includes(p)) || c.phone || c.role) {
      persons.push(c);
    } else if (CODE_NAMES.some(k => n.includes(k)) || /code/i.test(c.name)) {
      codes.push(c);
    } else {
      stores.push(c);
    }
  });

  // Apply search filter
  const filterFn = c => !q ||
    c.name.toLowerCase().includes(q) ||
    (c.address||'').toLowerCase().includes(q) ||
    (c.notes||'').toLowerCase().includes(q);

  stores  = stores.filter(filterFn);
  codes   = codes.filter(filterFn);
  persons = persons.filter(filterFn);

  let html = '';

  // ── SECTION: STORES & SUPPLIERS ─────────────────────────────
  if (stores.length) {
    html += `<div style="padding:14px 16px 10px;font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--accent);background:linear-gradient(90deg,var(--accent-dim),transparent);border-left:4px solid var(--accent);border-bottom:1px solid var(--border);margin-top:4px">📍 &nbsp;Stores & Suppliers</div>`;
    stores.forEach(c => {
      const hasAddr = c.address && c.address.length > 5 && /\d/.test(c.address);
      const mapsUrl = `https://maps.google.com/?q=${encodeURIComponent(c.address||c.name+' Kitchener ON')}`;
      html += `
        <div style="padding:13px 16px;background:var(--glass);border-bottom:1px solid var(--border)">
          <div style="font-size:14px;font-weight:700;color:var(--t1);margin-bottom:4px">${c.name}</div>
          ${c.address ? `
            <div style="font-size:12px;color:var(--t2);margin-bottom:6px;display:flex;align-items:flex-start;gap:5px">
              <span>📍</span><span>${c.address}</span>
            </div>` : ''}
          ${c.notes ? `<div style="font-size:11px;color:var(--t3);margin-bottom:6px;font-style:italic">${c.notes}</div>` : ''}
          ${hasAddr ? `
            <a href="${mapsUrl}" target="_blank" class="maps-btn">
              🗺 Open in Maps
            </a>` : ''}
        </div>`;
    });
  }

  // ── SECTION: CODES & ACCESS ──────────────────────────────────
  if (codes.length) {
    html += `<div style="padding:14px 16px 10px;font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--red);background:linear-gradient(90deg,rgba(232,64,64,0.1),transparent);border-left:4px solid var(--red);border-bottom:1px solid var(--border);margin-top:4px">🔐 &nbsp;Codes & Access</div>`;
    codes.forEach(c => {
      // Extract code from notes
      const codeMatch = (c.notes||'').match(/(\d{4,})/);
      const code = c.code || (codeMatch ? codeMatch[1] : '');
      const hasAddr = c.address && c.address.length > 5 && /\d/.test(c.address);
      const mapsUrl = `https://maps.google.com/?q=${encodeURIComponent(c.address)}`;
      html += `
        <div style="padding:13px 16px;background:var(--glass);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px">
          <div style="flex:1">
            <div style="font-size:14px;font-weight:700;color:var(--t1);margin-bottom:4px">${c.name}</div>
            ${c.address ? `<div style="font-size:12px;color:var(--t2);margin-bottom:4px">📍 ${c.address}</div>` : ''}
            ${c.notes ? `<div style="font-size:11px;color:var(--t3)">${c.notes}</div>` : ''}

          </div>
          ${code ? `
            <div style="
              background:var(--red-dim);border:2px solid var(--red);
              border-radius:var(--radius-sm);padding:10px 16px;
              text-align:center;flex-shrink:0;
            ">
              <div style="font-size:10px;color:var(--red);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">CODE</div>
              <div style="font-size:24px;font-weight:700;color:var(--t1);letter-spacing:4px">${code}</div>
            </div>` : ''}
        </div>`;
    });
  }

  // ── SECTION: KEY CONTACTS ────────────────────────────────────
  if (persons.length) {
    html += `<div style="padding:14px 16px 10px;font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#6EB0FF;background:linear-gradient(90deg,rgba(64,144,255,0.1),transparent);border-left:4px solid #6EB0FF;border-bottom:1px solid var(--border);margin-top:4px">📞 &nbsp;Key Contacts</div>`;
    persons.forEach(c => {
      // Extract phone from notes or phone field
      const phoneMatch = (c.notes||'').match(/(\d{3}[-.]?\d{3}[-.]?\d{4})/);
      const phone = c.phone || (phoneMatch ? phoneMatch[1].replace(/\D/g,'') : '');
      const phoneDisplay = phoneMatch ? phoneMatch[1] : (phone ? phone : '');
      const role = c.role || '';
      const otherNotes = (c.notes||'').replace(/\d{3}[-.]?\d{3}[-.]?\d{4}/, '').replace(/^[·\s]+/, '').trim();
      html += `
        <div style="padding:13px 16px;background:var(--glass);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px">
          <div style="
            width:44px;height:44px;border-radius:50%;
            background:rgba(64,144,255,0.15);border:1.5px solid rgba(64,144,255,0.3);
            display:flex;align-items:center;justify-content:center;
            font-size:18px;flex-shrink:0;
          ">👤</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700;color:var(--t1)">${c.name}</div>
            ${role ? `<div style="font-size:11px;color:#6EB0FF;font-weight:600;margin-top:2px">${role}</div>` : ''}
            ${phoneDisplay ? `<div style="font-size:12px;color:var(--t2);margin-top:4px">📱 ${phoneDisplay}</div>` : ''}
            ${otherNotes ? `<div style="font-size:11px;color:var(--t3);margin-top:2px;font-style:italic">${otherNotes}</div>` : ''}
          </div>
          ${phone ? `
            <a href="tel:+1${phone}" style="
              width:44px;height:44px;border-radius:50%;
              background:rgba(64,144,255,0.15);border:1.5px solid rgba(64,144,255,0.3);
              display:flex;align-items:center;justify-content:center;
              font-size:20px;flex-shrink:0;text-decoration:none;
            ">📞</a>` : ''}
        </div>`;
    });
  }

  if (!stores.length && !codes.length && !persons.length) {
    html += `<div class="empty"><div class="empty-icon">📞</div>
      <p>${q ? 'No results for "'+q+'"' : 'No contacts loaded. Tap ↻ to sync.'}</p></div>`;
  }

  html += `<div style="height:80px"></div>`;
  return html;
}

  const n=S.shopping.filter(i=>i.checked).length;
  if(!n){toast('Already all In Stock ✅');return;}
  if(!confirm(`Reset ${n} items to In Stock?`)) return;
  S.shopping.forEach(i=>{i.checked=false;i.status='In Stock';});
  saveShoppingState(); // persist locally
  api({action:'resetShop'});
  renderShopping(document.getElementById('content'));
  toast(`✅ ${n} items reset`);

  S.bored[idx].done=!S.bored[idx].done;

// Persist an in-progress damage report (text + photo) so it survives a PWA
// reload triggered by the OS camera app handing control back to the browser.
function saveDmgDraft() {
  if(!S.dmgKeyCtx) return;
  const textEl=document.getElementById('dmgText');
  const draft={procKey:S.dmgKeyCtx,text:textEl?textEl.value:'',photo:S.pendingDmgPhoto||''};

function recoverDmgDraft() {
  try {
    const raw=localStorage.getItem('gykf_dmg_draft');
    if(!raw) return;
    const draft=JSON.parse(raw);
    if(!draft || !draft.photo || !draft.procKey) { localStorage.removeItem('gykf_dmg_draft'); return; }
    if(!S.dmgReports[draft.procKey]) S.dmgReports[draft.procKey]=[];
    const date=new Date().toLocaleDateString('en-CA',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    S.dmgReports[draft.procKey].push({text:draft.text||'(recovered photo)',photo:draft.photo,date});
    saveDmg();
    localStorage.removeItem('gykf_dmg_draft');
    toast('📸 Recovered a damage photo that didn\'t finish saving');
  } catch(e) { localStorage.removeItem('gykf_dmg_draft'); }
}

// ── END OF DAY ─────────────────────────────────────────────────────
function showEOD() {
  const tabName=DAYS[TODAY], tasks=S.tasks[tabName]||[];
  const done=tasks.filter(t=>t.done);
  const missed=tasks.filter(t=>!t.done&&t.area!=='CLOSURE');
  const closure=tasks.filter(t=>t.area==='CLOSURE');
  const clDone=closure.filter(t=>t.done);
  const pct=tasks.length?Math.round(done.length/tasks.length*100):0;
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'});
  const timeStr=now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
  let msg=`✈ *SKYCARE — END OF DAY REPORT*\n📅 ${dateStr} · ${timeStr}\n${'─'.repeat(30)}\n\n`;
  msg+=`📊 *${done.length}/${tasks.length} tasks completed (${pct}%)*\n\n`;

  // Always show completed tasks
  if(done.length>0) {
    msg+=`✅ *Completed:*\n${done.map(t=>`  ✓ ${t.task}`).join('\n')}\n\n`;
  }

  // Show incomplete tasks if any
  if(missed.length>0) {
    msg+=`⚠️ *Incomplete:*\n${missed.map(t=>`  • ${t.task}`).join('\n')}\n\n`;
  } else {
    msg+=`🎯 All daily tasks completed!\n\n`;
  }

  // Closure section
  if(clDone.length===closure.length&&closure.length) {
    msg+=`🔐 *Closure: ✅ Complete*\n${clDone.map(t=>`  ✓ ${t.task}`).join('\n')}\n\n`;
  } else if(closure.length) {
    const clMissed=closure.filter(t=>!t.done);
    const clComplete=closure.filter(t=>t.done);
    if(clComplete.length) msg+=`🔐 *Closure — done:*\n${clComplete.map(t=>`  ✓ ${t.task}`).join('\n')}\n`;
    if(clMissed.length) msg+=`🔐 *Closure — pending:*\n${clMissed.map(t=>`  ❌ ${t.task}`).join('\n')}\n`;
    msg+='\n';
  }

  // Shopping summary
  const toBuyItems=S.shopping.filter(i=>i.checked);
  if(toBuyItems.length>0) {
    msg+=`🛒 *Shopping needed (${toBuyItems.length} items):*\n${toBuyItems.map(i=>`  • ${i.item} — ${i.store}`).join('\n')}\n\n`;
  }

  // Carry-over notes
  const todayNotes=(S.notes[DAYS[TODAY]]||[]).filter(n=>!n.done);
  if(todayNotes.length>0) {
    msg+=`📝 *Carry-over notes:*\n${todayNotes.map(n=>`  • ${n.text}${n.area?' ('+n.area+')':''}`).join('\n')}\n\n`;
  }

  msg+=`${'─'.repeat(30)}\n_Sent from ✈ Skycare — YKF Grooming Team_`;
  openModal('📋 End of Day Summary',
    `<textarea id="eodTxt" readonly style="height:240px;font-size:12px;line-height:1.5;background:var(--bg3)">${msg}</textarea>`,
    ()=>{ const t=document.getElementById('eodTxt'); t.select(); document.execCommand('copy'); toast('✅ Copied — paste into WhatsApp'); closeModal(); });
  document.getElementById('mSave').textContent='📋 Copy & Close';
}

// ── SWIPE HANDLER (two-direction) ────────────────────────────
function setupSwipeTwoWay(el, onLeft, onRight) {
  let startX=0, currentX=0, active=false;
  const inner = el.querySelector('.srow,.bitem');
  if(!inner) return;

  el.addEventListener('touchstart', e=>{
    // Close any other open swipes
    document.querySelectorAll('.swipe-wrap.open-left,.swipe-wrap.open-right').forEach(w=>{
      if(w!==el){w.classList.remove('open-left','open-right');}
    });
    startX=e.touches[0].clientX; active=true;
  },{passive:true});

  el.addEventListener('touchmove', e=>{
    if(!active) return;
    currentX = e.touches[0].clientX - startX;
    if(Math.abs(currentX) > 8) e.preventDefault();
    // Live feedback while dragging
    const inner = el.querySelector('.srow,.bitem');
    if(inner) inner.style.transform = `translateX(${Math.max(-90,Math.min(90,currentX))}px)`;
  },{passive:false});

  el.addEventListener('touchend', ()=>{
    if(!active) return; active=false;
    const inner = el.querySelector('.srow,.bitem');
    if(inner) inner.style.transform = '';
    if(currentX > 50) {
      el.classList.add('open-left');
      el.classList.remove('open-right');
    } else if(currentX < -50) {
      el.classList.add('open-right');
      el.classList.remove('open-left');
    } else {
      el.classList.remove('open-left','open-right');
    }
    currentX=0;
  });

  // Action buttons
  const leftBtn = el.querySelector('.swipe-action-left');
  const rightBtn = el.querySelector('.swipe-action-right');
  if(leftBtn) leftBtn.addEventListener('click', ()=>{
    el.classList.remove('open-left','open-right');
    onLeft();
  });
  if(rightBtn) rightBtn.addEventListener('click', ()=>{
    el.classList.remove('open-left','open-right');
    onRight();
  });
}

// ── QR CODE GENERATOR (pure JS, no library) ──────────────────
function drawQR(canvasId, url) {
  const canvas = document.getElementById(canvasId);
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const size = canvas.width;

  // Simple QR using a pre-encoded URL approach
  // We'll use a free QR API image
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,size,size);
    ctx.drawImage(img, 0, 0, size, size);
  };
  img.onerror = () => {
    // Fallback: draw text
    ctx.fillStyle = '#0B1120';
    ctx.fillRect(0,0,size,size);
    ctx.fillStyle = '#C8A84B';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Scan on phone', size/2, size/2-10);
    ctx.fillText('camera app', size/2, size/2+10);
  };
  // Use Google Charts QR API (free, no key)
  img.src = `https://chart.googleapis.com/chart?chs=180x180&cht=qr&chl=${encodeURIComponent(url)}&choe=UTF-8`;
}

// ── DRAGGABLE NAV ICONS ───────────────────────────────────────
let dragSrcEl = null;

function setupDraggableNav() {
  const nav = document.getElementById('nav');
  if(!nav) return;

  const items = nav.querySelectorAll('.nb');
  items.forEach(item => {
    item.setAttribute('draggable', 'true');

    item.addEventListener('dragstart', e => {
      dragSrcEl = item;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    item.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      items.forEach(i=>i.classList.remove('drag-over'));
      item.classList.add('drag-over');
    });

    item.addEventListener('dragleave', () => {
      item.classList.remove('drag-over');
    });

    item.addEventListener('drop', e => {
      e.preventDefault();
      if(dragSrcEl && dragSrcEl !== item) {
        // Swap positions
        const allItems = [...nav.querySelectorAll('.nb')];
        const srcIdx = allItems.indexOf(dragSrcEl);
        const dstIdx = allItems.indexOf(item);
        if(srcIdx < dstIdx) {
          nav.insertBefore(dragSrcEl, item.nextSibling);
        } else {
          nav.insertBefore(dragSrcEl, item);
        }
        // Save order
        const order = [...nav.querySelectorAll('.nb')].map(n=>n.id.replace('nb-',''));
        localStorage.setItem('gykf_nav_order', JSON.stringify(order));
      }
      items.forEach(i=>i.classList.remove('drag-over','dragging'));
    });

    item.addEventListener('dragend', () => {
      items.forEach(i=>i.classList.remove('dragging','drag-over'));
    });

    // Touch drag support for mobile
    let touchStartX=0, touchStartY=0, clone=null;
    item.addEventListener('touchstart', e=>{
      if(e.touches.length!==1) return;
      touchStartX=e.touches[0].clientX;
      touchStartY=e.touches[0].clientY;
    },{passive:true});

    item.addEventListener('touchmove', e=>{
      if(!clone&&Math.abs(e.touches[0].clientX-touchStartX)>10){
        clone=item.cloneNode(true);
        clone.style.cssText='position:fixed;opacity:0.7;pointer-events:none;z-index:999;background:var(--accent-dim);border-radius:8px';
        document.body.appendChild(clone);
        dragSrcEl=item;
        item.classList.add('dragging');
      }
      if(clone){
        clone.style.left=(e.touches[0].clientX-30)+'px';
        clone.style.top=(e.touches[0].clientY-30)+'px';
        // Find target
        clone.style.display='none';
        const el2=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
        clone.style.display='';
        const target=el2?.closest('.nb');
        items.forEach(i=>i.classList.remove('drag-over'));
        if(target&&target!==item) target.classList.add('drag-over');
      }
    },{passive:true});

    item.addEventListener('touchend', e=>{
      if(clone){
        document.body.removeChild(clone); clone=null;
        const target=nav.querySelector('.nb.drag-over');
        if(target&&target!==item){
          const allItems=[...nav.querySelectorAll('.nb')];
          const srcIdx=allItems.indexOf(item);
          const dstIdx=allItems.indexOf(target);
          if(srcIdx<dstIdx) nav.insertBefore(item,target.nextSibling);
          else nav.insertBefore(item,target);
          const order=[...nav.querySelectorAll('.nb')].map(n=>n.id.replace('nb-',''));
          localStorage.setItem('gykf_nav_order',JSON.stringify(order));
        }
        items.forEach(i=>i.classList.remove('drag-over','dragging'));
        dragSrcEl=null;
      }
    },{passive:true});
  });
}

function restoreNavOrder() {
  try {
    const order = JSON.parse(localStorage.getItem('gykf_nav_order')||'[]');
    if(!order.length) return;
    const nav = document.getElementById('nav');
    order.forEach(id=>{
      const el = document.getElementById('nb-'+id);
      if(el) nav.appendChild(el);
    });
  } catch(e) {}
}

// Coffee notification times: 9:40, 11:40, 15:40
const COFFEE_TIMES = [
  { hour: 9,  minute: 40, message: "☕ Hurry... gotta make coffee!" },
  { hour: 11, minute: 40, message: "☕ Hurry... gotta make coffee!" },
  { hour: 15, minute: 40, message: "☕ Hurry... gotta make coffee!" },

let fbMessaging = null;

async function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    fbMessaging = firebase.messaging();
    console.log('Firebase initialized');
  } catch(e) {
    console.log('Firebase init error:', e);

async function requestNotificationPermission() {
  try {
    // Init Firebase if not done
    if (!fbMessaging) await initFirebase();

    // Request browser permission
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      toast('Notifications blocked — enable in browser settings');
      return false;
    }

    // Get FCM token
    const token = await fbMessaging.getToken({ vapidKey: VAPID_KEY });
    if (token) {
      localStorage.setItem('fcm_token', token);
      console.log('FCM token:', token);
    }

    // Schedule local notifications as backup
    scheduleLocalNotifications();

    toast('✅ Notifications enabled!');
    localStorage.setItem('notifications_enabled', '1');
    updateNotifBtn();
    return true;
  } catch(e) {
    console.error('Notification setup error:', e);
    // Fall back to local notifications only
    if (Notification.permission === 'granted') {
      scheduleLocalNotifications();
      toast('✅ Local notifications enabled');
      localStorage.setItem('notifications_enabled', '1');
      updateNotifBtn();
      return true;
    }
    toast('Could not enable notifications');
    return false;
  }
}

function scheduleLocalNotifications() {
  // Clear any existing scheduled notifications
  const existingIds = JSON.parse(localStorage.getItem('notif_ids') || '[]');
  existingIds.forEach(id => clearTimeout(id));

  const now = new Date();
  const ids = [];

  COFFEE_TIMES.forEach(({ hour, minute, message }) => {
    const target = new Date();
    target.setHours(hour, minute, 0, 0);

    // If time already passed today, schedule for tomorrow
    if (target <= now) {
      target.setDate(target.getDate() + 1);
    }

    const delay = target - now;
    const id = setTimeout(() => {
      if (Notification.permission === 'granted') {
        new Notification('✈ Skycare', {
          body: message,
          icon: './icon-192.svg',
          badge: './icon-192.svg',
          tag: `coffee-${hour}`,
          renotify: true,
        });
      }
      // Reschedule for next day
      const nextDay = setTimeout(() => scheduleLocalNotifications(), 100);
    }, delay);

    ids.push(id);
    console.log(`Notification scheduled for ${hour}:${minute < 10 ? '0'+minute : minute} (in ${Math.round(delay/60000)} min)`);
  });

  localStorage.setItem('notif_ids', JSON.stringify(ids));
}

function disableNotifications() {
  const existingIds = JSON.parse(localStorage.getItem('notif_ids') || '[]');
  existingIds.forEach(id => clearTimeout(id));
  localStorage.removeItem('notif_ids');
  localStorage.removeItem('notifications_enabled');
  localStorage.removeItem('fcm_token');
  toast('🔕 Notifications disabled');
  updateNotifBtn();
}

function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (!btn) return;
  const enabled = localStorage.getItem('notifications_enabled') === '1';
  btn.textContent = enabled ? '🔔' : '🔕';
  btn.title = enabled ? 'Notifications ON — tap to disable' : 'Enable coffee notifications';
}

function toggleNotifications() {
  const enabled = localStorage.getItem('notifications_enabled') === '1';
  if (enabled) {
    disableNotifications();
  } else {
    requestNotificationPermission();
  }
}

// Auto-reschedule on app open if enabled
window.addEventListener('load', () => {
  setTimeout(() => {
    if (localStorage.getItem('notifications_enabled') === '1') {
      if (!fbMessaging) initFirebase();
      scheduleLocalNotifications();
      console.log('Notifications rescheduled on app open');
    }
    updateNotifBtn();
  }, 2000);
});

// Handle incoming FCM messages when app is open
document.addEventListener('DOMContentLoaded', () => {
  if (fbMessaging) {
    fbMessaging.onMessage((payload) => {
      console.log('FCM message received:', payload);
      const { title, body } = payload.notification || {};
      if (title) toast(`${title}: ${body}`);
    });
  }
});
