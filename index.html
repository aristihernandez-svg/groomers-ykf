<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1A3A5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Groomers YKF">
<title>Groomers YKF</title>
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1A3A5C;--gold:#C8A000;
  --bg:#F0F2F5;--bg2:#fff;--bg3:#F7F7F7;
  --border:#E0E0E0;--border2:#CCCCCC;
  --text:#111;--text2:#555;--text3:#999;
  --lred:#FFF0F0;--red:#8B0000;
  --lgreen:#E8F8EE;--green:#1A6600;
  --done-bg:#E8E8E8;--done-text:#999;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
[data-theme="dark"]{
  --bg:#0D1117;--bg2:#161B22;--bg3:#21262D;
  --border:#30363D;--border2:#444C56;
  --text:#E6EDF3;--text2:#8B949E;--text3:#6E7681;
  --lred:#3D1515;--red:#FF6B6B;
  --lgreen:#0D2818;--green:#56D364;
  --done-bg:#21262D;--done-text:#6E7681;
}
html,body{height:100%;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;
  background:var(--bg);color:var(--text)}
/* SPLASH */
#splash{position:fixed;inset:0;background:var(--navy);display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  z-index:999;transition:opacity 0.5s}
#splash.out{opacity:0;pointer-events:none}
.sp-plane{font-size:72px;animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-5deg)}
               50%{transform:translateY(-10px) rotate(5deg)}}
.sp-title{color:#fff;font-size:26px;font-weight:700;letter-spacing:2px;margin-top:16px}
.sp-sub{color:#A8C4E0;font-size:13px;margin-top:6px}
.sp-bar{width:180px;height:3px;background:rgba(255,255,255,0.15);
  border-radius:2px;margin-top:36px;overflow:hidden}
.sp-fill{height:100%;background:#fff;border-radius:2px;animation:prog 2s ease forwards}
@keyframes prog{to{width:100%}}
/* APP */
#app{display:flex;flex-direction:column;height:100%;opacity:0;transition:opacity 0.3s}
#app.show{opacity:1}
/* TOPBAR */
.bar{background:var(--navy);color:#fff;display:flex;align-items:center;gap:10px;
  padding:calc(var(--safe-t) + 10px) 14px 10px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(0,0,0,0.25);z-index:20}
.bar-title{font-size:17px;font-weight:700;flex:1}
.bar-pill{background:rgba(255,255,255,0.12);padding:3px 10px;
  border-radius:20px;font-size:12px;color:#A8C4E0}
.bar-btn{background:none;border:none;color:#A8C4E0;font-size:20px;
  padding:4px 6px;cursor:pointer;line-height:1}
/* PULL TO REFRESH */
.ptr{height:0;overflow:hidden;display:flex;align-items:center;
  justify-content:center;background:var(--bg);transition:height 0.2s;flex-shrink:0}
.ptr.active{height:44px}
.ptr-spin{width:22px;height:22px;border:2px solid var(--border2);
  border-top-color:var(--navy);border-radius:50%;animation:spin 0.7s linear infinite}
/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(62px + var(--safe-b))}
/* NAV */
.nav{background:var(--bg2);border-top:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;
  flex-shrink:0;padding-bottom:var(--safe-b)}
.nav::-webkit-scrollbar{display:none}
.nb{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;
  padding:8px 16px 6px;cursor:pointer;border-top:2.5px solid transparent;
  transition:all 0.15s;min-width:62px}
.nb.on{border-top-color:var(--navy)}
.nb.on .ni{color:var(--navy)}
.nb.on .nl{color:var(--navy);font-weight:700}
.ni{font-size:20px;color:var(--text3);margin-bottom:2px}
.nl{font-size:10px;color:var(--text3);white-space:nowrap}
/* SPINNER */
.spin-wrap{display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:200px;gap:12px}
.spinner{width:28px;height:28px;border:3px solid var(--border);
  border-top-color:var(--navy);border-radius:50%;animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-lbl{font-size:13px;color:var(--text2)}
/* PROGRESS */
.prog-wrap{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:10px 16px;position:sticky;top:0;z-index:10}
.prog-row{display:flex;justify-content:space-between;
  font-size:12px;color:var(--text2);margin-bottom:5px}
.prog-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--navy);border-radius:3px;transition:width 0.4s}
/* SECTION HEADER */
.sec{padding:7px 16px;font-size:11px;font-weight:700;letter-spacing:0.6px;
  text-transform:uppercase;color:#fff;margin-top:1px}
/* TASK ROW — swipe to delete */
.trow-wrap{position:relative;overflow:hidden}
.trow-del-bg{position:absolute;right:0;top:0;bottom:0;width:80px;
  background:#C0392B;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.trow{display:flex;align-items:center;gap:12px;padding:13px 16px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  cursor:pointer;min-height:52px;position:relative;
  transition:transform 0.2s ease;user-select:none}
.trow:active{background:var(--bg3)}
.trow.done{background:var(--done-bg)}
.trow.done .ttxt{text-decoration:line-through;color:var(--done-text)}
.trow.done .tfreq{color:var(--text3)}
.trow.closure{background:#FFF8F8}
[data-theme="dark"] .trow.closure{background:#2D1515}
.trow.closure.done{background:#2D1515}
.tcb{width:26px;height:26px;border-radius:50%;border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:13px;color:#fff;transition:all 0.2s}
.tcb.on{background:var(--navy);border-color:var(--navy)}
.tinfo{flex:1;min-width:0}
.ttxt{font-size:14px;color:var(--text);line-height:1.3}
.tfreq{font-size:11px;color:var(--text3);margin-top:2px}
/* ADD TASK ROW */
.add-row{display:flex;align-items:center;gap:10px;padding:10px 16px;
  background:var(--bg2);border-bottom:1px solid var(--border);cursor:pointer}
.add-row span{font-size:13px;color:var(--text3)}
.add-circ{width:26px;height:26px;border-radius:50%;border:2px dashed var(--border2);
  display:flex;align-items:center;justify-content:center;
  color:var(--text3);font-size:16px;flex-shrink:0}
/* NOTES */
.notes-wrap{margin:10px 12px 0;background:var(--bg2);border-radius:10px;
  border:1px solid var(--border);overflow:hidden}
.notes-hdr{background:#555;color:#fff;padding:9px 14px;font-size:12px;
  font-weight:700;display:flex;align-items:center;justify-content:space-between}
.notes-hdr button{background:rgba(255,255,255,0.15);border:none;color:#fff;
  border-radius:6px;padding:3px 10px;font-size:11px;cursor:pointer}
.nrow{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;
  border-bottom:1px solid var(--border);cursor:pointer}
.nrow:last-child{border-bottom:none}
.nrow.done .ntxt{text-decoration:line-through;color:var(--done-text)}
.ncb{width:22px;height:22px;border-radius:4px;border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:11px;color:#fff;transition:all 0.15s;margin-top:1px}
.ncb.on{background:#555;border-color:#555}
.ninfo{flex:1}
.ntxt{font-size:13px;color:var(--text);line-height:1.4}
.nmeta{font-size:11px;color:var(--text3);margin-top:2px}
.nphoto{width:100%;max-height:160px;object-fit:cover;border-radius:6px;
  margin-top:8px;cursor:pointer}
.ndel{color:var(--border2);font-size:16px;padding:2px 6px;cursor:pointer}
/* RESET DAY BTN */
.reset-day-bar{padding:10px 14px;background:var(--bg2);
  border-bottom:1px solid var(--border)}
.reset-day-btn{width:100%;padding:11px;border-radius:10px;
  background:var(--bg3);color:var(--navy);
  border:1.5px solid var(--border2);font-size:13px;
  font-weight:600;cursor:pointer;display:flex;align-items:center;
  justify-content:center;gap:8px}
/* SHOPPING */
.shop-filters{background:var(--bg2);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:10}
.shop-bar{padding:9px 12px 0;display:flex;gap:7px;overflow-x:auto;
  scrollbar-width:none}
.shop-bar::-webkit-scrollbar{display:none}
.shop-bar2{padding:5px 12px 9px;display:flex;gap:7px;overflow-x:auto;
  scrollbar-width:none;border-top:1px solid var(--border)}
.shop-bar2::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:5px 13px;border-radius:20px;font-size:12px;
  font-weight:600;cursor:pointer;border:none;transition:opacity 0.15s}
.chip:active{opacity:0.7}
.chip-label{font-size:10px;color:var(--text3);padding:2px 12px 0;
  font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.search-wrap{padding:8px 12px;background:var(--bg2);
  border-bottom:1px solid var(--border)}
.search-inner{position:relative}
.search-inp{width:100%;padding:9px 36px;border-radius:20px;
  border:1px solid var(--border2);background:var(--bg3);
  font-size:14px;font-family:inherit;color:var(--text);outline:none}
.search-inp:focus{border-color:var(--navy)}
.s-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:14px;color:var(--text3);pointer-events:none}
.s-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  font-size:16px;color:var(--text3);cursor:pointer}
/* SHOP ITEMS */
.shop-section-hdr{padding:6px 16px;font-size:11px;font-weight:700;
  letter-spacing:0.5px;text-transform:uppercase;color:#fff}
.srow{display:flex;align-items:center;gap:12px;padding:13px 16px;
  background:var(--bg2);border-bottom:1px solid var(--border);cursor:pointer}
.srow:active{background:var(--bg3)}
.srow.tobuy{background:var(--lred)}
.srow.tobuy .sname{color:var(--red);font-weight:600}
.scb{width:26px;height:26px;border-radius:6px;border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:13px;color:#fff;transition:all 0.15s}
.scb.on{background:var(--red);border-color:var(--red)}
.sinfo{flex:1;min-width:0}
.sname{font-size:14px;color:var(--text)}
.smeta{font-size:11px;color:var(--text3);margin-top:2px;display:flex;gap:8px}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;
  margin-right:3px;vertical-align:middle}
/* CART VIEW */
.cart-store-hdr{padding:10px 16px 6px;font-size:12px;font-weight:700;
  color:#fff;display:flex;align-items:center;gap:8px}
.cart-count{background:rgba(255,255,255,0.2);border-radius:10px;
  padding:1px 8px;font-size:11px}
/* EMPTY STATE */
.empty{display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 20px;gap:10px}
.empty-icon{font-size:40px}
.empty p{font-size:13px;color:var(--text3);text-align:center}
.empty button{margin-top:8px;padding:8px 18px;border-radius:20px;
  border:1px solid var(--border2);background:var(--bg2);
  font-size:13px;cursor:pointer;color:var(--navy)}
/* RESET BAR */
.reset-bar{padding:12px 14px;background:var(--bg2);
  border-top:1px solid var(--border)}
.reset-btn{width:100%;padding:13px;border-radius:10px;background:var(--lgreen);
  color:var(--green);border:1.5px solid var(--green);font-size:14px;
  font-weight:600;cursor:pointer}
/* PROCS */
.proc-list{padding:12px;display:flex;flex-direction:column;gap:10px}
.pcard{background:var(--bg2);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.pcard-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;
  cursor:pointer;border-bottom:1px solid transparent;transition:border-color 0.15s}
.pcard.open .pcard-hdr{border-color:var(--border)}
.picon{font-size:22px}
.ptitle{font-size:14px;font-weight:600;color:var(--text);flex:1}
.psub{font-size:12px;color:var(--text3);margin-top:2px}
.parr{color:var(--border2);font-size:20px;transition:transform 0.2s}
.pcard.open .parr{transform:rotate(90deg)}
.pbody{display:none;padding:0 16px 12px}
.pcard.open .pbody{display:block}
.pwarn{background:var(--lred);border-left:3px solid var(--red);
  border-radius:0 6px 6px 0;padding:10px 12px;margin:10px 0 6px;
  font-size:12px;color:var(--red);font-weight:600;line-height:1.5}
.pstep{display:flex;gap:12px;padding:10px 0;
  border-bottom:1px solid var(--border);cursor:pointer}
.pstep:last-child{border-bottom:none}
.pstep.done .stxt{text-decoration:line-through;color:var(--done-text)}
.pstep.done .snote{color:var(--text3)}
.snum{width:26px;height:26px;border-radius:50%;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:var(--navy);flex-shrink:0;
  transition:all 0.15s}
.pstep.done .snum{background:var(--navy);color:#fff}
.sinfo{flex:1}
.stxt{font-size:13px;color:var(--text);line-height:1.5}
.snote{font-size:11px;color:var(--text3);margin-top:2px}
.green-step .stxt{color:var(--green);font-weight:600}
.proc-actions{display:flex;gap:8px;margin-top:10px}
.proc-act-btn{flex:1;padding:9px;border-radius:8px;font-size:12px;
  font-weight:600;cursor:pointer;border:1px solid var(--border2);
  background:var(--bg3);color:var(--text2)}
/* VIDEO LINK */
.video-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;
  background:#1A1A2E;border-radius:8px;margin:8px 0;cursor:pointer;
  text-decoration:none}
.video-btn span{font-size:13px;color:#fff;font-weight:500}
.video-btn .vicon{font-size:20px}
/* DAMAGE REPORT */
.dmg-section{margin-top:10px;background:var(--lred);border-radius:8px;
  border:1px solid #FFAAAA;overflow:hidden}
.dmg-hdr{background:#C0392B;color:#fff;padding:8px 14px;font-size:12px;font-weight:700}
.dmg-body{padding:10px 14px}
.dmg-btn{width:100%;padding:11px;border-radius:8px;background:var(--bg2);
  border:1px solid var(--border2);font-size:13px;font-weight:600;
  color:var(--red);cursor:pointer;margin-bottom:8px;
  display:flex;align-items:center;justify-content:center;gap:8px}
.dmg-photo{width:100%;border-radius:8px;margin-top:6px;max-height:200px;object-fit:cover}
.dmg-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.dmg-item{background:var(--bg2);border-radius:6px;padding:8px 10px;
  border:1px solid var(--border);font-size:12px;color:var(--text2)}
.dmg-item-photo{width:100%;border-radius:4px;margin-top:4px;max-height:120px;object-fit:cover}
/* CONTACTS */
.con-list{padding:12px;display:flex;flex-direction:column;gap:8px}
.ccard{background:var(--bg2);border-radius:10px;border:1px solid var(--border);overflow:hidden}
.crow{padding:14px 16px}
.cname{font-size:14px;font-weight:600;color:var(--text)}
.caddr{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.4;
  cursor:pointer;display:flex;align-items:flex-start;gap:6px}
.caddr-text{flex:1;text-decoration:underline;color:var(--navy)}
.cnote{font-size:12px;color:var(--navy);margin-top:4px;font-style:italic}
.maps-btn{display:inline-flex;align-items:center;gap:5px;margin-top:6px;
  padding:5px 12px;border-radius:20px;background:var(--navy);color:#fff;
  font-size:12px;font-weight:600;cursor:pointer;border:none;text-decoration:none}
/* BORED */
.bored-list{padding:12px;display:flex;flex-direction:column;gap:8px}
.bitem{display:flex;align-items:center;gap:12px;background:var(--bg2);
  border-radius:10px;border:1px solid var(--border);padding:14px 16px;cursor:pointer}
.bitem:active{background:var(--bg3)}
.bitem.done{background:var(--done-bg)}
.bitem.done .btxt{text-decoration:line-through;color:var(--done-text)}
.bcb{width:26px;height:26px;border-radius:6px;border:2px solid var(--border2);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  font-size:13px;color:#fff;transition:all 0.15s}
.bcb.on{background:#555;border-color:#555}
.btxt{font-size:14px;color:var(--text);line-height:1.4;flex:1}
.bdel{color:var(--border2);font-size:18px;padding:2px 8px;cursor:pointer}
/* WEEK */
.week-list{padding:12px;display:flex;flex-direction:column;gap:8px}
.wcard{background:var(--bg2);border-radius:10px;border:1px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer}
.wcard:active{background:var(--bg3)}
.wcard.today{border-color:var(--navy);
  box-shadow:0 2px 8px rgba(26,58,92,0.15)}
.wday-emoji{font-size:24px}
.winfo{flex:1}
.wday-name{font-size:14px;font-weight:600;color:var(--text)}
.wday-count{font-size:12px;color:var(--text3);margin-top:2px}
.warr{color:var(--border2);font-size:20px}
/* DAY DETAIL */
.dbar{display:flex;align-items:center;gap:10px;padding:10px 16px;
  color:#fff;position:sticky;top:0;z-index:15}
.back-btn{background:none;border:none;color:#fff;font-size:24px;
  cursor:pointer;padding:0 4px;line-height:1}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);
  display:none;align-items:flex-end;z-index:200}
.overlay.open{display:flex}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;
  padding:20px;width:100%;
  padding-bottom:calc(20px + var(--safe-b));
  max-height:90vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:600;margin-bottom:14px;color:var(--text)}
.modal input,.modal select,.modal textarea{
  width:100%;padding:11px 14px;border-radius:8px;
  border:1px solid var(--border2);background:var(--bg3);
  font-size:14px;font-family:inherit;color:var(--text);
  outline:none;margin-bottom:10px}
.modal textarea{height:75px;resize:none}
.modal label{font-size:12px;color:var(--text2);display:block;
  margin-bottom:4px;margin-top:4px}
.mbtn-row{display:flex;gap:8px;margin-top:4px}
.mbtn{flex:1;padding:13px;border-radius:10px;font-size:14px;
  font-weight:600;cursor:pointer;border:none}
.mbtn.cancel{background:var(--bg3);color:var(--text2)}
.mbtn.save{background:var(--navy);color:#fff}
/* FAB */
.fab{position:fixed;right:16px;bottom:calc(68px + var(--safe-b));
  width:52px;height:52px;border-radius:50%;background:var(--navy);
  color:#fff;border:none;font-size:24px;
  box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;
  display:none;align-items:center;justify-content:center;z-index:50}
.fab:active{transform:scale(0.93)}
/* EOD FAB */
.eod-fab{position:fixed;left:16px;bottom:calc(68px + var(--safe-b));
  width:52px;height:52px;border-radius:50%;background:#2E7D32;
  color:#fff;border:none;font-size:22px;
  box-shadow:0 4px 14px rgba(0,0,0,0.25);cursor:pointer;
  display:none;align-items:center;justify-content:center;z-index:50}
.eod-fab.show{display:flex}
/* TOAST */
.toast{position:fixed;bottom:calc(72px + var(--safe-b));left:50%;
  transform:translateX(-50%) translateY(10px);background:#222;color:#fff;
  padding:9px 18px;border-radius:20px;font-size:13px;opacity:0;
  transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:400}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* DARK MODE TOGGLE */
.dm-toggle{display:flex;align-items:center;gap:8px;padding:4px 8px;
  border-radius:20px;background:rgba(255,255,255,0.1);cursor:pointer;
  border:none;color:#A8C4E0;font-size:13px}
/* PHOTO PREVIEW in modal */
.photo-preview{width:100%;border-radius:8px;margin:8px 0;
  max-height:200px;object-fit:cover;display:none}
</style>
</head>
<body>
<div id="splash">
  <div class="sp-plane">✈</div>
  <div class="sp-title">Groomers YKF</div>
  <div class="sp-sub">Aviation Grooming Team</div>
  <div class="sp-bar"><div class="sp-fill"></div></div>
</div>

<div id="app">

// ── PULL TO REFRESH ────────────────────────────────────────────────
function setupPullToRefresh() {
  const content=document.getElementById('content');
  const ptr=document.getElementById('ptr');
  let startY=0, pulling=false;
  content.addEventListener('touchstart',e=>{
    if(content.scrollTop===0) startY=e.touches[0].clientY;
  },{passive:true});
  content.addEventListener('touchmove',e=>{
    if(!startY) return;
    const dy=e.touches[0].clientY-startY;
    if(dy>40&&content.scrollTop===0){pulling=true;ptr.classList.add('active');}
  },{passive:true});
  content.addEventListener('touchend',async()=>{
    if(pulling){
      pulling=false; startY=0;
      await syncAll();
      ptr.classList.remove('active');
    } else { startY=0; }
  });
}

function haptic(type='light') {
  if(navigator.vibrate) navigator.vibrate(type==='light'?30:60);
}

// ── SWIPE TO DELETE ────────────────────────────────────────────────
function setupSwipe(el, onDelete) {
  let startX=0, currentX=0, swiping=false;
  const inner=el.querySelector('.trow');
  const bg=el.querySelector('.trow-del-bg');
  if(!inner||!bg) return;
  inner.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;swiping=true;},{passive:true});
  inner.addEventListener('touchmove',e=>{
    if(!swiping) return;
    currentX=e.touches[0].clientX-startX;
    if(currentX<0) inner.style.transform=`translateX(${Math.max(currentX,-80)}px)`;
  },{passive:true});
  inner.addEventListener('touchend',()=>{
    swiping=false;
    if(currentX<-50){
      inner.style.transform='translateX(-80px)';
      bg.style.display='flex';
    } else {
      inner.style.transform='';
      bg.style.display='none';
    }
    currentX=0;
  });
  bg.addEventListener('click',()=>{
    inner.style.transform=''; bg.style.display='none';
    onDelete();
  });
}

// ── FETCH ──────────────────────────────────────────────────────────
async function fetchDay(tabName) {
  try {
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
    const text=(await (await fetch(url)).text());
    const json=JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table?.rows||[];
    const cols=json.table?.cols||[];
    const tasks=[]; let area='';
    rows.forEach(row=>{
      const v=cols.map((_,i)=>{const c=row.c?.[i];return c?String(c.v??c.f??'').trim():'';});
      const colA=v[0]||'', colB=v[1]||'', colC=v[2]||'', colD=v[3]||'';
      if(!colA && !colB) return; // fully empty row
      // Section header: col A empty, col B has text, no number in col A
      const isNum = !isNaN(parseInt(colA)) && parseInt(colA)>0;
      if(!isNum && colB && colB!==colB.toLowerCase() && colB.length>2 && !colB.includes('SPECIAL') && !colB.includes('📝') && !colB.includes('Note')) {
        area=colB.toUpperCase(); return;
      }
      if(colB.toUpperCase().includes('SPECIAL NOTES')||colB.includes('📝')) return;
      if(colB==='Task'||colA==='#') return;
      if(isNum && colB) tasks.push({task:colB,freq:colC,area,done:false});
    });
    S.tasks[tabName]=tasks;
  } catch(e){ S.tasks[tabName]=S.tasks[tabName]||fallback(); }
}

async function fetchShopping() {
  try {
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('🛒 Shopping Audit')}`;
    const text=(await (await fetch(url)).text());
    const json=JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table?.rows||[], cols=json.table?.cols||[];
    S.shopping=rows.map(row=>{
      const v=cols.map((_,i)=>{const c=row.c?.[i];return c?String(c.v??c.f??'').trim():'';});
      return {item:v[0],cabinet:v[1],store:v[2],status:v[3],notes:v[4]||'',checked:v[3]==='To Buy'};
    }).filter(r=>r.item&&r.item!=='Item'&&!r.item.startsWith('💡')&&!r.item.startsWith('TO SHOP')&&r.item.length>1);
  } catch(e){S.shopping=S.shopping||[];}
}

async function fetchContacts() {
  try {
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('📞 Contacts & Info')}`;
    const text=(await (await fetch(url)).text());
    const json=JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table?.rows||[], cols=json.table?.cols||[];
    S.contacts=rows.map(row=>{
      const v=cols.map((_,i)=>{const c=row.c?.[i];return c?String(c.v??c.f??'').trim():'';});
      return {name:v[0],address:v[1],notes:v[2]};
    }).filter(r => {
      if (!r.name || r.name.length < 2) return false;
      const skip = ['name / store','contacts & store','quick reference','fill in phone'];
      if (skip.some(s => r.name.toLowerCase().includes(s))) return false;
      return true;
    });
  } catch(e){S.contacts=[];}
}

async function fetchBored() {
  try {
    const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('💡 Bored Board')}`;
    const text=(await (await fetch(url)).text());
    const json=JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table?.rows||[], cols=json.table?.cols||[];
    S.bored=rows.map((row,i)=>{
      const v=cols.map((_,j)=>{const c=row.c?.[j];return c?String(c.v??c.f??'').trim():'';});
      return {id:i,task:v[1]||'',done:false};
    }).filter(r=>r.task&&r.task!=='Task / Idea');
  } catch(e){S.bored=[];}
}

      </div>
    </div>
  </div>`;

  if(!filtered.length) {
    html+=`<div class="empty">

      const dot=STORE_COLORS[item.store]||'#888';
      html+=`<div class="srow ${item.checked?'tobuy':''}" onclick="toggleShop(${ri})">

  }
  html+='<div style="height:80px"></div>';
  el.innerHTML=html;
  const rb=document.createElement('div');
  rb.className='reset-bar';
  rb.innerHTML=`<button class="reset-btn" onclick="resetShop()">✅ Reset all to In Stock</button>`;

}

// ── END OF DAY ─────────────────────────────────────────────────────
function showEOD() {
  const tabName=DAYS[TODAY], tasks=S.tasks[tabName]||[];
  const done=tasks.filter(t=>t.done);
  const missed=tasks.filter(t=>!t.done&&t.area!=='CLOSURE');
  const closure=tasks.filter(t=>t.area==='CLOSURE');
  const clDone=closure.filter(t=>t.done);
  const pct=tasks.length?Math.round(done.length/tasks.length*100):0;
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'});
  const timeStr=now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
  let msg=`✈ *GROOMING TEAM — END OF DAY*\n📅 ${dateStr} · ${timeStr}\n${'─'.repeat(28)}\n\n`;
  msg+=`📊 *${done.length}/${tasks.length} tasks (${pct}%)*\n\n`;
  if(missed.length) msg+=`⚠️ *Incomplete:*\n${missed.map(t=>`  • ${t.task}`).join('\n')}\n\n`;
  else msg+=`✅ All tasks done!\n\n`;
  if(clDone.length===closure.length&&closure.length) msg+=`🔐 *Closure: ✅ Complete*\n\n`;
  else if(closure.length) msg+=`🔐 *Closure — pending:*\n${closure.filter(t=>!t.done).map(t=>`  ❌ ${t.task}`).join('\n')}\n\n`;
  msg+=`${'─'.repeat(28)}\n_Sent from ✈ Groomers YKF_`;
  openModal('📋 End of Day Summary',
    `<textarea id="eodTxt" readonly style="height:240px;font-size:12px;line-height:1.5;background:var(--bg3)">${msg}</textarea>`,
    ()=>{ const t=document.getElementById('eodTxt'); t.select(); document.execCommand('copy'); toast('✅ Copied — paste into WhatsApp'); closeModal(); });
  document.getElementById('mSave').textContent='📋 Copy & Close';
}
