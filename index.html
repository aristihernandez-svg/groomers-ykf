<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1A3A5C">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Groomers YKF">
<title>Groomers YKF</title>
<link rel="manifest" href="manifest.json">
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ══════════════════════════════════════════════
   BASE TOKENS — Premium Dark Night (default)
══════════════════════════════════════════════ */
:root{
  --bg:         #0B1120;
  --bg2:        #0F1830;
  --bg3:        #141F3A;
  --bg4:        #1A2848;
  --gold:       #C8A84B;
  --gold2:      #E8C86A;
  --gold-dim:   rgba(200,168,75,0.18);
  --gold-glow:  rgba(200,168,75,0.08);
  --glass:      rgba(255,255,255,0.05);
  --glass2:     rgba(255,255,255,0.08);
  --glass3:     rgba(255,255,255,0.12);
  --border:     rgba(255,255,255,0.07);
  --border2:    rgba(255,255,255,0.12);
  --border-gold:rgba(200,168,75,0.30);
  /* Text — clear contrast ladder */
  --t1:         #F0F4FF;   /* primary — headings, task names */
  --t2:         #A8B8CC;   /* secondary — metadata, frequencies */
  --t3:         #607080;   /* tertiary — hints, timestamps */
  --t4:         #3A4A5A;   /* disabled / done */
  /* Status */
  --green:      #2ECC8A;
  --green-dim:  rgba(46,204,138,0.12);
  --red:        #E84040;
  --red-dim:    rgba(232,64,64,0.12);
  /* Done state */
  --done-bg:    rgba(255,255,255,0.02);
  --done-text:  #3A4A5A;
  /* Misc */
  --safe-b:     env(safe-area-inset-bottom,0px);
  --safe-t:     env(safe-area-inset-top,0px);
  --radius:     12px;
  --radius-sm:  8px;
  --accent:     var(--gold);
  --accent2:    var(--gold2);
  --accent-dim: var(--gold-dim);
  --accent-border: var(--border-gold);
}

/* ══════════════════════════════════════════════
   THEME: Premium Dark — Day
══════════════════════════════════════════════ */
[data-theme="premium-day"]{
  --bg:         #E8EDF8;
  --bg2:        #F2F5FC;
  --bg3:        #FFFFFF;
  --bg4:        #DDE3F0;
  --gold:       #9A7A28;
  --gold2:      #B89030;
  --gold-dim:   rgba(154,122,40,0.12);
  --gold-glow:  rgba(154,122,40,0.06);
  --glass:      rgba(255,255,255,0.60);
  --glass2:     rgba(255,255,255,0.80);
  --glass3:     rgba(255,255,255,0.95);
  --border:     rgba(0,20,60,0.08);
  --border2:    rgba(0,20,60,0.14);
  --border-gold:rgba(154,122,40,0.30);
  --t1:         #0A1428;
  --t2:         #3A5070;
  --t3:         #7A90A8;
  --t4:         #AAB8C8;
  --green:      #1A7A50;
  --green-dim:  rgba(26,122,80,0.10);
  --red:        #C03030;
  --red-dim:    rgba(192,48,48,0.10);
  --done-bg:    rgba(0,20,60,0.04);
  --done-text:  #AAB8C8;
  --accent:     var(--gold);
  --accent2:    var(--gold2);
  --accent-dim: var(--gold-dim);
  --accent-border: var(--border-gold);
}

/* ══════════════════════════════════════════════
   THEME: Standard — Night
══════════════════════════════════════════════ */
[data-theme="standard-night"]{
  --bg:         #111111;
  --bg2:        #1A1A1A;
  --bg3:        #222222;
  --bg4:        #2A2A2A;
  --gold:       #FFFFFF;
  --gold2:      #DDDDDD;
  --gold-dim:   rgba(255,255,255,0.08);
  --gold-glow:  rgba(255,255,255,0.04);
  --glass:      rgba(255,255,255,0.04);
  --glass2:     rgba(255,255,255,0.07);
  --glass3:     rgba(255,255,255,0.10);
  --border:     rgba(255,255,255,0.08);
  --border2:    rgba(255,255,255,0.14);
  --border-gold:rgba(255,255,255,0.20);
  --t1:         #FFFFFF;
  --t2:         #AAAAAA;
  --t3:         #666666;
  --t4:         #3A3A3A;
  --green:      #44CC77;
  --green-dim:  rgba(68,204,119,0.12);
  --red:        #EE4444;
  --red-dim:    rgba(238,68,68,0.12);
  --done-bg:    rgba(255,255,255,0.02);
  --done-text:  #3A3A3A;
  --radius:     8px;
  --radius-sm:  5px;
  --accent:     #FFFFFF;
  --accent2:    #DDDDDD;
  --accent-dim: rgba(255,255,255,0.08);
  --accent-border: rgba(255,255,255,0.20);
}

/* ══════════════════════════════════════════════
   THEME: Standard — Day
══════════════════════════════════════════════ */
[data-theme="standard-day"]{
  --bg:         #F5F5F5;
  --bg2:        #FFFFFF;
  --bg3:        #F0F0F0;
  --bg4:        #E8E8E8;
  --gold:       #111111;
  --gold2:      #333333;
  --gold-dim:   rgba(0,0,0,0.06);
  --gold-glow:  rgba(0,0,0,0.03);
  --glass:      rgba(0,0,0,0.02);
  --glass2:     rgba(0,0,0,0.04);
  --glass3:     rgba(0,0,0,0.06);
  --border:     rgba(0,0,0,0.08);
  --border2:    rgba(0,0,0,0.14);
  --border-gold:rgba(0,0,0,0.20);
  --t1:         #111111;
  --t2:         #444444;
  --t3:         #888888;
  --t4:         #BBBBBB;
  --green:      #1A7A40;
  --green-dim:  rgba(26,122,64,0.10);
  --red:        #CC2222;
  --red-dim:    rgba(204,34,34,0.10);
  --done-bg:    rgba(0,0,0,0.03);
  --done-text:  #BBBBBB;
  --radius:     8px;
  --radius-sm:  5px;
  --accent:     #111111;
  --accent2:    #333333;
  --accent-dim: rgba(0,0,0,0.06);
  --accent-border: rgba(0,0,0,0.20);
}

/* ══════════════════════════════════════════════
   GLOBAL STYLES — use token vars everywhere
══════════════════════════════════════════════ */
html,body{
  height:100%;overflow:hidden;
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);color:var(--t1);
}

/* Background mesh — premium only */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%,rgba(200,168,75,0.05) 0%,transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 100%,rgba(26,40,72,0.6) 0%,transparent 70%);
  transition:opacity 0.4s;
}
[data-theme="premium-day"] body::before{
  background:
    radial-gradient(ellipse 60% 40% at 20% 0%,rgba(154,122,40,0.06) 0%,transparent 70%),
    radial-gradient(ellipse 50% 50% at 80% 100%,rgba(180,196,220,0.4) 0%,transparent 70%);
}
[data-theme="standard-night"] body::before,
[data-theme="standard-day"] body::before{background:none}

/* SPLASH */
#splash{
  position:fixed;inset:0;z-index:999;transition:opacity 0.6s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 30% 20%,#1A2848 0%,#0B1120 60%,#060C18 100%);
}
#splash.out{opacity:0;pointer-events:none}
.splash-ring{
  width:120px;height:120px;border-radius:50%;
  border:1px solid rgba(200,168,75,0.35);
  display:flex;align-items:center;justify-content:center;
  position:relative;margin-bottom:24px;
  box-shadow:0 0 40px rgba(200,168,75,0.08),inset 0 0 40px rgba(200,168,75,0.04);
}
.splash-ring::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid rgba(200,168,75,0.10);
}
.sp-plane{
  font-size:52px;
  filter:drop-shadow(0 4px 16px rgba(200,168,75,0.35));
  animation:bob 2.5s ease-in-out infinite;
}
@keyframes bob{
  0%{transform:translateY(0) translateX(0) rotate(-3deg)}
  25%{transform:translateY(-8px) translateX(4px) rotate(0deg)}
  50%{transform:translateY(-12px) translateX(8px) rotate(3deg)}
  75%{transform:translateY(-6px) translateX(4px) rotate(1deg)}
  100%{transform:translateY(0) translateX(0) rotate(-3deg)}
}
.sp-title{color:#E8C86A;font-size:26px;font-weight:700;letter-spacing:4px;text-transform:uppercase}
.sp-sub{color:#7890A8;font-size:12px;letter-spacing:3px;margin-top:6px;font-weight:300}
.sp-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,#C8A84B,transparent);margin:18px auto;opacity:0.5}
.sp-bar{width:160px;height:1px;background:rgba(255,255,255,0.08);border-radius:1px;margin-top:8px;overflow:hidden}
.sp-fill{height:100%;background:linear-gradient(90deg,#C8A84B,#E8C86A);animation:prog 2s ease forwards;box-shadow:0 0 8px #C8A84B}
@keyframes prog{to{width:100%}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bob2{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* APP */
#app{display:flex;flex-direction:column;height:100%;opacity:0;transition:opacity 0.3s;position:relative;z-index:1}
#app.show{opacity:1}

/* TOPBAR */
.bar{
  background:rgba(11,17,32,0.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  padding:calc(var(--safe-t) + 12px) 16px 12px;
  flex-shrink:0;position:relative;z-index:20;
}
[data-theme="premium-day"] .bar{background:rgba(232,237,248,0.92)}
[data-theme="standard-night"] .bar{background:#111111}
[data-theme="standard-day"] .bar{background:#FFFFFF;border-bottom:1px solid rgba(0,0,0,0.10)}
.bar-title{font-size:17px;font-weight:600;color:var(--t1);flex:1;letter-spacing:0.3px;cursor:pointer}
.bar-pill{
  background:var(--accent-dim);border:1px solid var(--accent-border);
  padding:4px 12px;border-radius:20px;font-size:11px;
  color:var(--accent);font-weight:500;letter-spacing:0.5px;
}
.bar-btn{background:none;border:none;color:var(--t3);font-size:18px;padding:4px 6px;cursor:pointer}

/* PULL TO REFRESH */
.ptr{height:0;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:height 0.2s;flex-shrink:0}
.ptr.active{height:44px}
.ptr-spin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}

/* CONTENT */
.content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(70px + var(--safe-b));background:var(--bg)}

/* NAV */
.nav{
  background:rgba(11,17,32,0.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  display:flex;overflow-x:auto;scrollbar-width:none;
  flex-shrink:0;padding-bottom:var(--safe-b);
}
[data-theme="premium-day"] .nav{background:rgba(232,237,248,0.95)}
[data-theme="standard-night"] .nav{background:#111111;border-top:1px solid rgba(255,255,255,0.08)}
[data-theme="standard-day"] .nav{background:#FFFFFF;border-top:1px solid rgba(0,0,0,0.08)}
.nav::-webkit-scrollbar{display:none}
.nb{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;padding:9px 16px 7px;cursor:pointer;border-top:2px solid transparent;transition:all 0.2s;min-width:64px}
.nb.on{border-top-color:#1A3A5C}
.nb.on .ni{color:#1A3A5C}
.nb.on .nl{color:#1A3A5C;font-weight:700}
.ni{font-size:20px;color:#607080;margin-bottom:2px;transition:color 0.2s;display:flex;align-items:center;justify-content:center;height:24px}
.nl{font-size:10px;color:#607080;white-space:nowrap;font-weight:500;letter-spacing:0.3px;transition:color 0.2s}

/* SPINNER */
.spin-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:12px}
.spinner{width:28px;height:28px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}
.spin-lbl{font-size:13px;color:var(--t2)}

/* PROGRESS */
.prog-wrap{
  background:rgba(11,17,32,0.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);padding:12px 16px;
  position:sticky;top:0;z-index:10;
}
[data-theme="premium-day"] .prog-wrap{background:rgba(232,237,248,0.90)}
[data-theme="standard-night"] .prog-wrap{background:#1A1A1A}
[data-theme="standard-day"] .prog-wrap{background:#FFFFFF;border-bottom:1px solid rgba(0,0,0,0.08)}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:7px;font-weight:500}
.prog-bar{height:3px;background:var(--border2);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.4s;box-shadow:0 0 6px var(--accent-dim)}

/* SECTION HEADER */
.sec{
  padding:8px 16px;font-size:10px;font-weight:700;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);
  background:linear-gradient(90deg,var(--accent-dim),transparent);
  border-bottom:1px solid var(--border);
  border-left:2px solid var(--accent);
  margin-top:2px;
}
[data-theme="standard-night"] .sec{
  background:var(--bg3);color:var(--t1);border-left-color:var(--t4);
}
[data-theme="standard-day"] .sec{
  background:var(--bg3);color:var(--t1);border-left-color:var(--t4);
}

/* TASK ROWS */
.trow-wrap{position:relative;overflow:hidden}
.trow-del-bg{
  position:absolute;right:0;top:0;bottom:0;width:80px;
  background:var(--red-dim);display:flex;align-items:center;
  justify-content:center;color:var(--red);font-size:12px;font-weight:600;
  cursor:pointer;border-left:1px solid rgba(232,64,64,0.2);
}
.trow{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  background:var(--glass);border-bottom:1px solid var(--border);
  cursor:pointer;min-height:54px;position:relative;
  transition:background 0.15s,transform 0.2s ease;
}
[data-theme="standard-night"] .trow{background:var(--bg2)}
[data-theme="standard-day"] .trow{background:var(--bg2)}
.trow:active{background:var(--glass2)}
.trow.done{background:var(--done-bg)}
.trow.done .ttxt{text-decoration:line-through;color:var(--done-text)}
.trow.done .tfreq{color:var(--t4)}
.trow.closure{background:rgba(232,64,64,0.04);border-left:2px solid rgba(232,64,64,0.2)}
.trow.closure.done{background:var(--done-bg)}

/* CHECKBOX */
.tcb{
  width:26px;height:26px;border-radius:50%;
  border:1.5px solid var(--border2);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:12px;color:var(--bg);
  transition:all 0.2s;
}
.tcb.on{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-color:var(--accent);
  box-shadow:0 0 10px var(--accent-dim);
}
.tinfo{flex:1;min-width:0}
.ttxt{font-size:14px;color:var(--t1);line-height:1.3;font-weight:600}
.tfreq{font-size:11px;color:var(--t3);margin-top:2px}

/* ADD ROW */
.add-row{display:flex;align-items:center;gap:10px;padding:10px 16px;background:transparent;border-bottom:1px solid var(--border);cursor:pointer;opacity:0.4;transition:opacity 0.15s}
.add-row:active{opacity:0.7}
.add-circ{width:24px;height:24px;border-radius:50%;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:14px;flex-shrink:0}
.add-row span{font-size:12px;color:var(--t3)}

/* GLASS CARDS */
.notes-wrap{
  margin:12px;background:var(--glass);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;
}
[data-theme="standard-night"] .notes-wrap,[data-theme="standard-day"] .notes-wrap{background:var(--bg2);backdrop-filter:none}
.notes-hdr{
  background:var(--glass2);border-bottom:1px solid var(--border);
  padding:10px 14px;font-size:12px;font-weight:600;color:var(--t2);
  display:flex;align-items:center;justify-content:space-between;
}
[data-theme="standard-night"] .notes-hdr,[data-theme="standard-day"] .notes-hdr{background:var(--bg3)}
.notes-hdr button{
  background:var(--accent-dim);border:1px solid var(--accent-border);
  color:var(--accent);border-radius:20px;padding:4px 12px;
  font-size:11px;cursor:pointer;font-weight:500;
}
.nrow{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border);cursor:pointer}
.nrow:last-child{border-bottom:none}
.nrow.done .ntxt{text-decoration:line-through;color:var(--done-text)}
.ncb{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--bg);transition:all 0.15s;margin-top:1px}
.ncb.on{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent)}
.ninfo{flex:1}
.ntxt{font-size:13px;color:var(--t1);line-height:1.4}
.nmeta{font-size:11px;color:var(--t3);margin-top:2px}
.nphoto{width:100%;border-radius:var(--radius-sm);margin-top:8px;max-height:160px;object-fit:cover;border:1px solid var(--border)}
.ndel{color:var(--t4);font-size:15px;padding:2px 6px;cursor:pointer}

/* RESET DAY */
.reset-day-bar{padding:10px 12px;background:transparent;border-bottom:1px solid var(--border)}
.reset-day-btn{width:100%;padding:11px;border-radius:var(--radius-sm);background:var(--glass);border:1px solid var(--border);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}

/* SHOPPING */
.shop-filters{background:rgba(11,17,32,0.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
[data-theme="premium-day"] .shop-filters{background:rgba(232,237,248,0.92)}
[data-theme="standard-night"] .shop-filters{background:#111111}
[data-theme="standard-day"] .shop-filters{background:#FFFFFF}
.shop-bar{padding:10px 12px 0;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.shop-bar::-webkit-scrollbar{display:none}
.shop-bar2{padding:6px 12px 10px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;border-top:1px solid var(--border)}
.shop-bar2::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border2);background:var(--glass);color:var(--t2);transition:all 0.15s}
.chip:active{opacity:0.7}
.chip-label{font-size:10px;color:var(--t3);padding:2px 12px 0;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.search-wrap{padding:8px 12px;border-bottom:1px solid var(--border)}
.search-inner{position:relative}
.search-inp{width:100%;padding:10px 36px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--glass2);font-size:14px;font-family:inherit;color:var(--t1);outline:none}
.search-inp:focus{border-color:var(--accent-border)}
.search-inp::placeholder{color:var(--t3)}
.s-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t3);pointer-events:none}
.s-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--t3);cursor:pointer}

/* SHOP ROWS */
.srow{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--glass);border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
[data-theme="standard-night"] .srow,[data-theme="standard-day"] .srow{background:var(--bg2)}
.srow:active{background:var(--glass2)}
.srow.tobuy{background:var(--red-dim);border-left:2px solid rgba(232,64,64,0.4)}
.srow.tobuy .sname{color:var(--red);font-weight:600}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);backdrop-filter:blur(4px);display:none;align-items:flex-end;z-index:200}
.overlay.open{display:flex}
.modal{background:var(--bg3);border:1px solid var(--border2);border-bottom:none;border-radius:20px 20px 0 0;padding:20px;width:100%;padding-bottom:calc(20px + var(--safe-b));max-height:90vh;overflow-y:auto}
.modal::before{content:'';display:block;width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 18px}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;color:var(--t1)}
.modal input,.modal select,.modal textarea{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:var(--glass2);font-size:14px;font-family:inherit;color:var(--t1);outline:none;margin-bottom:10px}
.modal input:focus,.modal select:focus,.modal textarea:focus{border-color:var(--accent-border)}
.modal input::placeholder,.modal textarea::placeholder{color:var(--t3)}
.modal textarea{height:80px;resize:none}
.modal label{font-size:12px;color:var(--t3);display:block;margin-bottom:4px;margin-top:4px;font-weight:500}
.mbtn-row{display:flex;gap:8px;margin-top:6px}
.mbtn{flex:1;padding:14px;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;border:none}
.mbtn.cancel{background:var(--glass2);color:var(--t2);border:1px solid var(--border)}
.mbtn.save{background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg)}

/* FAB */
.fab{position:fixed;right:16px;bottom:calc(72px + var(--safe-b));width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);border:none;font-size:24px;font-weight:700;box-shadow:0 4px 20px var(--accent-dim);cursor:pointer;display:none;align-items:center;justify-content:center;z-index:50}
.fab:active{transform:scale(0.93)}
[data-theme="standard-day"] .fab{color:#fff}

/* EOD FAB */
.eod-fab{position:fixed;left:16px;bottom:calc(72px + var(--safe-b));width:52px;height:52px;border-radius:50%;background:var(--green-dim);color:var(--green);border:1px solid rgba(46,204,138,0.2);font-size:20px;box-shadow:0 4px 16px rgba(46,204,138,0.1);cursor:pointer;display:none;align-items:center;justify-content:center;z-index:50}
.eod-fab.show{display:flex}

/* TOAST */
.toast{position:fixed;bottom:calc(76px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg3);color:var(--t1);border:1px solid var(--border2);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:all 0.25s;pointer-events:none;white-space:nowrap;z-index:400;box-shadow:0 8px 24px rgba(0,0,0,0.3);font-weight:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.photo-preview{width:100%;border-radius:var(--radius-sm);margin:8px 0;max-height:200px;object-fit:cover;display:none;border:1px solid var(--border)}
</style>

function openFlightAware() {
  // Try deep link first (opens app if installed)
  // iOS and Android both support this URL scheme
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
  const isAndroid = /Android/.test(navigator.userAgent);

  if(isIOS) {
    // iOS deep link — opens FlightAware app or App Store
    const appLink = 'flightaware://';
    const fallback = 'https://flightaware.com';
    const start = Date.now();
    // Try app link
    window.location.href = appLink;
    // If app not installed, fall back to website after 1.5s
    setTimeout(() => {
      if(Date.now() - start < 2000) {
        window.open(fallback, '_blank');
      }
    }, 1500);
  } else if(isAndroid) {
    // Android intent — opens app if installed, website if not
    const intentUrl = 'intent://flightaware.com/#Intent;scheme=https;package=com.flightaware.android.liveflighttracker;S.browser_fallback_url=https%3A%2F%2Fflightaware.com;end';
    window.location.href = intentUrl;
  } else {
    // Desktop — open website
    window.open('https://flightaware.com', '_blank');
  }
}

function setupPullToRefresh() {
  const content=document.getElementById('content');
  const ptr=document.getElementById('ptr');
  let startY=0, pulling=false;
  content.addEventListener('touchstart',e=>{
    if(content.scrollTop===0) startY=e.touches[0].clientY;
  },{passive:true});
  content.addEventListener('touchmove',e=>{
    if(!startY) return;
    const dy=e.touches[0].clientY-startY;
    if(dy>40&&content.scrollTop===0){pulling=true;ptr.classList.add('active');}
  },{passive:true});
  content.addEventListener('touchend',async()=>{
    if(pulling){
      pulling=false; startY=0;
      await syncAll();
      ptr.classList.remove('active');
    } else { startY=0; }
  });
}

// ── SWIPE TO DELETE ────────────────────────────────────────────────
function setupSwipe(el, onDelete) {
  let startX=0, currentX=0, swiping=false;
  const inner=el.querySelector('.trow');
  const bg=el.querySelector('.trow-del-bg');
  if(!inner||!bg) return;
  inner.addEventListener('touchstart',e=>{startX=e.touches[0].clientX;swiping=true;},{passive:true});
  inner.addEventListener('touchmove',e=>{
    if(!swiping) return;
    currentX=e.touches[0].clientX-startX;
    if(currentX<0) inner.style.transform=`translateX(${Math.max(currentX,-80)}px)`;
  },{passive:true});
  inner.addEventListener('touchend',()=>{
    swiping=false;
    if(currentX<-50){
      inner.style.transform='translateX(-80px)';
      bg.style.display='flex';
    } else {
      inner.style.transform='';
      bg.style.display='none';
    }
    currentX=0;
  });
  bg.addEventListener('click',()=>{
    inner.style.transform=''; bg.style.display='none';
    onDelete();
  });
}

async function fetchDay(tabName) {
  try {
    const gid = TAB_GIDS[tabName];
    const url = gid
      ? `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`
      : `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(tabName)}`;
    const text=(await (await fetch(url)).text());
    const json=JSON.parse(text.match(/setResponse\(([\s\S]*)\)/)[1]);
    const rows=json.table?.rows||[];
    const cols=json.table?.cols||[];
    const tasks=[]; let area='';
    rows.forEach(row=>{
      const v=cols.map((_,i)=>{const c=row.c?.[i];return c?String(c.v??c.f??'').trim():'';});
      const colA=v[0]||'', colB=v[1]||'', colC=v[2]||'', colD=v[3]||'';
      if(!colA && !colB) return; // fully empty row
      // Section header: col A empty, col B has text, no number in col A
      const isNum = !isNaN(parseInt(colA)) && parseInt(colA)>0;
      if(!isNum && colB && colB!==colB.toLowerCase() && colB.length>2 && !colB.includes('SPECIAL') && !colB.includes('📝') && !colB.includes('Note')) {
        area=colB.toUpperCase(); return;
      }
      if(colB.toUpperCase().includes('SPECIAL NOTES')||colB.includes('📝')) return;
      if(colB==='Task'||colA==='#') return;
      if(isNum && colB) tasks.push({task:colB,freq:colC,area,done:false});
    });
    S.tasks[tabName]=tasks;
  } catch(e){ S.tasks[tabName]=S.tasks[tabName]||fallback(); }
}

  if(code <= 79) return '❄️';

  if(code<=86) return 'Snow showers';
  if(code<=99) return 'Thunderstorm';
  return 'Unknown';
}

function renderToday(el) {
  document.getElementById('barTitle').textContent='Skycare';

  showFab(()=>openAddTask(DAYS[TODAY]));
  const tabName=DAYS[TODAY], tasks=S.tasks[tabName]||[], notes=S.notes[tabName]||[];

  let html=`
    <div class="reset-day-bar">
      <button class="reset-day-btn" onclick="resetDay()">🔄 Reset today's tasks</button>
    </div>

  html+=renderGroups(tasks,tabName);

  html+='<div style="height:90px"></div>';
  el.innerHTML=html;
  el.querySelectorAll('.trow-wrap').forEach(w=>{
    const idx=parseInt(w.dataset.idx);
    setupSwipe(w,()=>deleteTask(tabName,idx));
  });
}

function renderGroups(tasks, tabName) {
  const areas={};
  tasks.forEach(t=>{ (areas[t.area]=areas[t.area]||[]).push(t); });
  let html='';
  const areaOrder=['AIRCRAFT',"CR GROOMERS' CORNER",'CR OFFICE','MX HANGAR','MISC','CHARTER','CLOSURE'];
  const orderedAreas=[...areaOrder.filter(a=>areas[a]),...Object.keys(areas).filter(a=>!areaOrder.includes(a)&&areas[a])];
  orderedAreas.forEach(area=>{
    const atasks=areas[area];
    const bg=AREA_COLORS[area]||'#4A4A4A';
    html+=`<div class="sec" style="background:${bg}">${area||'TASKS'}</div>`;
    atasks.forEach(t=>{
      const gi=tasks.indexOf(t);
      html+=`
        <div class="trow-wrap" data-idx="${gi}">
          <div class="trow-del-bg" style="display:none">🗑 Delete</div>
          <div class="trow ${t.done?'done':''} ${area==='CLOSURE'?'closure':''}"
               onclick="toggleT('${tabName}',${gi})">
            <div class="tcb ${t.done?'on':''}">${t.done?'✓':''}</div>
            <div class="tinfo">
              <div class="ttxt">${t.task}</div>
              ${t.freq?`<div class="tfreq">${t.freq}</div>`:''}
            </div>
          </div>
        </div>`;
    });
    html+=`<div class="add-row" onclick="openAddTask('${tabName}','${area}')">
      <div class="add-circ">+</div><span>Add task to ${area}...</span></div>`;
  });
  return html;
}

function renderNotes(notes, tabName) {
  let html=`<div class="notes-wrap">
    <div class="notes-hdr">📝 Special Notes & Carry-over Tasks
      <button onclick="openAddNote('${tabName}')">+ Add</button>
    </div>`;
  if(!notes.length) {
    html+=`<div class="nrow"><div class="ninfo">
      <div class="ntxt" style="color:var(--text3);font-style:italic">No notes — tap + Add</div>
    </div></div>`;
  } else {
    notes.forEach((n,i)=>{
      html+=`<div class="nrow ${n.done?'done':''}" onclick="toggleNote('${tabName}',${i})">
        <div class="ncb ${n.done?'on':''}">${n.done?'✓':''}</div>
        <div class="ninfo">
          <div class="ntxt">${n.text}</div>
          <div class="nmeta">${n.area?n.area+' · ':''}${n.date||''}</div>
          ${n.photo?`<img class="nphoto" src="${n.photo}" onclick="event.stopPropagation();viewPhoto('${n.photo}')">`:''}
        </div>
        <div class="ndel" onclick="event.stopPropagation();deleteNote('${tabName}',${i})">✕</div>
      </div>`;
    });
  }
  return html+'</div>';
}

// ── END OF DAY ─────────────────────────────────────────────────────
function showEOD() {
  const tabName=DAYS[TODAY], tasks=S.tasks[tabName]||[];
  const done=tasks.filter(t=>t.done);
  const missed=tasks.filter(t=>!t.done&&t.area!=='CLOSURE');
  const closure=tasks.filter(t=>t.area==='CLOSURE');
  const clDone=closure.filter(t=>t.done);
  const pct=tasks.length?Math.round(done.length/tasks.length*100):0;
  const now=new Date();
  const dateStr=now.toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'});
  const timeStr=now.toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
  let msg=`✈ *SKYCARE — END OF DAY REPORT*\n📅 ${dateStr} · ${timeStr}\n${'─'.repeat(30)}\n\n`;
  msg+=`📊 *${done.length}/${tasks.length} tasks completed (${pct}%)*\n\n`;

  // Always show completed tasks
  if(done.length>0) {
    msg+=`✅ *Completed:*\n${done.map(t=>`  ✓ ${t.task}`).join('\n')}\n\n`;
  }

  // Show incomplete tasks if any
  if(missed.length>0) {
    msg+=`⚠️ *Incomplete:*\n${missed.map(t=>`  • ${t.task}`).join('\n')}\n\n`;
  } else {
    msg+=`🎯 All daily tasks completed!\n\n`;
  }

  // Closure section
  if(clDone.length===closure.length&&closure.length) {
    msg+=`🔐 *Closure: ✅ Complete*\n${clDone.map(t=>`  ✓ ${t.task}`).join('\n')}\n\n`;
  } else if(closure.length) {
    const clMissed=closure.filter(t=>!t.done);
    const clComplete=closure.filter(t=>t.done);
    if(clComplete.length) msg+=`🔐 *Closure — done:*\n${clComplete.map(t=>`  ✓ ${t.task}`).join('\n')}\n`;
    if(clMissed.length) msg+=`🔐 *Closure — pending:*\n${clMissed.map(t=>`  ❌ ${t.task}`).join('\n')}\n`;
    msg+='\n';
  }

  // Shopping summary
  const toBuyItems=S.shopping.filter(i=>i.checked);
  if(toBuyItems.length>0) {
    msg+=`🛒 *Shopping needed (${toBuyItems.length} items):*\n${toBuyItems.map(i=>`  • ${i.item} — ${i.store}`).join('\n')}\n\n`;
  }

  // Carry-over notes
  const todayNotes=(S.notes[DAYS[TODAY]]||[]).filter(n=>!n.done);
  if(todayNotes.length>0) {
    msg+=`📝 *Carry-over notes:*\n${todayNotes.map(n=>`  • ${n.text}${n.area?' ('+n.area+')':''}`).join('\n')}\n\n`;
  }

  msg+=`${'─'.repeat(30)}\n_Sent from ✈ Skycare — YKF Grooming Team_`;
  openModal('📋 End of Day Summary',
    `<textarea id="eodTxt" readonly style="height:240px;font-size:12px;line-height:1.5;background:var(--bg3)">${msg}</textarea>`,
    ()=>{ const t=document.getElementById('eodTxt'); t.select(); document.execCommand('copy'); toast('✅ Copied — paste into WhatsApp'); closeModal(); });
  document.getElementById('mSave').textContent='📋 Copy & Close';
}

// Coffee notification times: 9:40, 11:40, 15:40
const COFFEE_TIMES = [
  { hour: 9,  minute: 40, message: "☕ Hurry... gotta make coffee!" },
  { hour: 11, minute: 40, message: "☕ Hurry... gotta make coffee!" },
  { hour: 15, minute: 40, message: "☕ Hurry... gotta make coffee!" },
  { hour: 20, minute: 0,  message: "🔐 Leave the CC and the phone on charge!" },
];

let fbMessaging = null;

async function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    fbMessaging = firebase.messaging();
    console.log('Firebase initialized');
  } catch(e) {
    console.log('Firebase init error:', e);
  }
}

async function requestNotificationPermission() {
  try {
    // Init Firebase if not done
    if (!fbMessaging) await initFirebase();

    // Request browser permission
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      toast('Notifications blocked — enable in browser settings');
      return false;
    }

    // Get FCM token
    const token = await fbMessaging.getToken({ vapidKey: VAPID_KEY });
    if (token) {
      localStorage.setItem('fcm_token', token);
      console.log('FCM token:', token);
    }

    // Schedule local notifications as backup
    scheduleLocalNotifications();

    toast('✅ Notifications enabled!');
    localStorage.setItem('notifications_enabled', '1');
    updateNotifBtn();
    return true;
  } catch(e) {
    console.error('Notification setup error:', e);
    // Fall back to local notifications only
    if (Notification.permission === 'granted') {
      scheduleLocalNotifications();
      toast('✅ Local notifications enabled');
      localStorage.setItem('notifications_enabled', '1');
      updateNotifBtn();
      return true;
    }
    toast('Could not enable notifications');
    return false;
  }
}

function scheduleLocalNotifications() {
  // Clear any existing scheduled notifications
  const existingIds = JSON.parse(localStorage.getItem('notif_ids') || '[]');
  existingIds.forEach(id => clearTimeout(id));

  const now = new Date();
  const ids = [];

  COFFEE_TIMES.forEach(({ hour, minute, message }) => {
    const target = new Date();
    target.setHours(hour, minute, 0, 0);

    // If time already passed today, schedule for tomorrow
    if (target <= now) {
      target.setDate(target.getDate() + 1);
    }

    const delay = target - now;
    const id = setTimeout(() => {
      if (Notification.permission === 'granted') {
        new Notification('✈ Skycare', {
          body: message,
          icon: './icon-192.svg',
          badge: './icon-192.svg',
          tag: `coffee-${hour}`,
          renotify: true,
        });
      }
      // Reschedule for next day
      const nextDay = setTimeout(() => scheduleLocalNotifications(), 100);
    }, delay);

    ids.push(id);
    console.log(`Notification scheduled for ${hour}:${minute < 10 ? '0'+minute : minute} (in ${Math.round(delay/60000)} min)`);
  });

  localStorage.setItem('notif_ids', JSON.stringify(ids));
}

function disableNotifications() {
  const existingIds = JSON.parse(localStorage.getItem('notif_ids') || '[]');
  existingIds.forEach(id => clearTimeout(id));
  localStorage.removeItem('notif_ids');
  localStorage.removeItem('notifications_enabled');
  localStorage.removeItem('fcm_token');
  toast('🔕 Notifications disabled');
  updateNotifBtn();
}

function updateNotifBtn() {
  const btn = document.getElementById('notifBtn');
  if (!btn) return;
  const enabled = localStorage.getItem('notifications_enabled') === '1';
  btn.textContent = enabled ? '🔔' : '🔕';
  btn.title = enabled ? 'Notifications ON — tap to disable' : 'Enable coffee notifications';
}

function toggleNotifications() {
  const enabled = localStorage.getItem('notifications_enabled') === '1';
  if (enabled) {
    disableNotifications();
  } else {
    requestNotificationPermission();
  }
}

// Auto-reschedule on app open if enabled
window.addEventListener('load', () => {
  setTimeout(() => {
    if (localStorage.getItem('notifications_enabled') === '1') {
      if (!fbMessaging) initFirebase();
      scheduleLocalNotifications();
      console.log('Notifications rescheduled on app open');
    }
    updateNotifBtn();
  }, 2000);
});

// Handle incoming FCM messages when app is open
document.addEventListener('DOMContentLoaded', () => {
  if (fbMessaging) {
    fbMessaging.onMessage((payload) => {
      console.log('FCM message received:', payload);
      const { title, body } = payload.notification || {};
      if (title) toast(`${title}: ${body}`);
    });
  }
});
