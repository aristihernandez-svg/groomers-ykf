name: MX Parts Notification

on:
  workflow_dispatch:
    inputs:
      title:
        description: 'Notification title'
        required: true
        default: '🔧 MX Parts Request'
      body:
        description: 'Notification body'
        required: true
        default: 'New item added to the MX order list'

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: notif/package.json

      - name: Install dependencies
        run: npm install
        working-directory: notif

      - name: Send MX push notification
        run: node mx-notif.js
        working-directory: notif
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          VAPID_PUBLIC_KEY: "BIqy0tnx4xBbmSKqyucc0mnLZtTtfkpEfsf0RAH9LRwu1ZQ_aSDVpv_lJmfVq8QWQA7eKMKBgrIe2MHYS5NcOiU"
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          NOTIF_TITLE: ${{ inputs.title }}
          NOTIF_BODY: ${{ inputs.body }}
