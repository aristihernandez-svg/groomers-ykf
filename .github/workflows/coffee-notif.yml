name: Coffee Notifications

on:
  # EDT (UTC-4, summer): 9:40=13:40, 11:40=15:40, 15:40=19:40
  # EST (UTC-5, winter): 9:40=14:40, 11:40=16:40, 15:40=20:40
  # Both sets run year-round; send.js checks Eastern time and skips the wrong one.
  schedule:
    - cron: '40 13 * * *'   # EDT  9:40 AM
    - cron: '40 14 * * *'   # EST  9:40 AM
    - cron: '40 15 * * *'   # EDT 11:40 AM
    - cron: '40 16 * * *'   # EST 11:40 AM
    - cron: '40 19 * * *'   # EDT  3:40 PM
    - cron: '40 20 * * *'   # EST  3:40 PM
  workflow_dispatch:         # manual trigger for testing

jobs:
  send-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: notif/package.json

      - name: Install dependencies
        run: npm install
        working-directory: notif

      - name: Send coffee notifications
        run: node send.js
        working-directory: notif
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
