<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Skycare — MX Parts & Supplies</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0B1120;--bg2:#111827;--bg3:#1a2235;--glass:rgba(255,255,255,0.05);--glass2:rgba(255,255,255,0.08);--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--t1:#f0f4ff;--t2:#9aa5be;--t3:#5a6478;--accent:#4A90D9;--green:#27AE60;--red:#E74C3C;--radius:16px;--radius-sm:10px}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:100px}
.bar{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px}
.bar-title{font-size:16px;font-weight:800;color:var(--t1);flex:1}
.item-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
.item-row:active{background:var(--glass)}
.item-row.tobuy .item-name{color:var(--accent)}
.cb{width:24px;height:24px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;transition:all 0.15s}
.cb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.item-name{font-size:15px;font-weight:600;color:var(--t1)}
.item-notes{font-size:12px;color:var(--t3);margin-top:2px}
.badge{display:inline-block;background:rgba(74,144,217,0.2);color:var(--accent);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;margin-left:6px}
.empty{text-align:center;padding:60px 24px;color:var(--t3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.fab{position:fixed;bottom:28px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#2176AE);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#27AE60;color:#fff;padding:12px 24px;border-radius:40px;font-size:14px;font-weight:700;z-index:999;opacity:0;transition:opacity 0.3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.toast.show{opacity:1}
.form-wrap{padding:16px}
label{display:block;font-size:12px;color:var(--t2);font-weight:600;margin-bottom:5px;margin-top:14px}
label:first-of-type{margin-top:0}
input,textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px 13px;color:var(--t1);font-size:15px;font-family:inherit;outline:none}
input:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:none;min-height:60px;font-size:14px}
.save-btn{display:block;width:100%;margin-top:16px;padding:14px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--accent),#2176AE);color:#fff;font-size:15px;font-weight:800;cursor:pointer}
.save-btn:active{opacity:0.8}
.cancel-btn{display:block;width:100%;margin-top:10px;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer}
.section-header{padding:10px 16px 4px;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.fetching{font-size:11px;color:var(--t3);margin-top:4px;min-height:16px}
</style>
</head>
<body>

<div class="bar">
  <button onclick="goBack()" style="background:none;border:none;color:#4A90D9;font-size:24px;line-height:1;cursor:pointer;padding:0 4px;flex-shrink:0">‹</button>
  <img src="cars/Skycare_logo-removebg-preview.png" style="height:22px;filter:brightness(0) invert(1)" alt="Skycare">
  <span class="bar-title">MX Parts &amp; Supplies</span>
  <span id="cartCount" style="background:var(--accent);color:#fff;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;display:none"></span>
</div>

<div id="app"></div>
<button class="fab" onclick="showAddForm()" title="Add item">+</button>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyA7BHDcP-PVTpsaNu9TTWCnChfI0bnOLi8",
  authDomain:"groomer-ykf.firebaseapp.com",
  projectId:"groomer-ykf",
  storageBucket:"groomer-ykf.firebasestorage.app",
  messagingSenderId:"384366195372",
  appId:"1:384366195372:web:35d38ffbc947188d4a6509"
});
const db = firebase.firestore();

let catalog = [];
let shopState = {};
let view = 'list';

db.collection('shoppingCatalog').onSnapshot(snap => {
  catalog = snap.docs
    .map(d => ({id:d.id, ...d.data()}))
    .filter(i => i.cabinet === 'Mechanics');
  render();
});

db.collection('shopState').doc('state').onSnapshot(snap => {
  if(snap.exists) shopState = snap.data() || {};
  render();
});

function fsKey(text) { return String(text).replace(/[.\/]/g, '∙'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function render() {
  if(view === 'add') { renderAdd(); return; }
  renderList();
}

function renderList() {
  const toBuyCount = catalog.filter(i => shopState[fsKey(i.item)]?.checked).length;
  const cc = document.getElementById('cartCount');
  if(toBuyCount > 0) { cc.textContent = toBuyCount+' to buy'; cc.style.display=''; }
  else cc.style.display='none';

  if(!catalog.length) {
    document.getElementById('app').innerHTML = `<div class="empty">
      <div class="empty-icon">🔧</div>
      <p style="font-size:15px;font-weight:600;color:var(--t2)">No MX items yet</p>
      <p style="font-size:13px;margin-top:6px">Tap + to add a part or supply</p>
    </div>`;
    return;
  }

  const toBuy = catalog.filter(i => shopState[fsKey(i.item)]?.checked);
  const rest  = catalog.filter(i => !shopState[fsKey(i.item)]?.checked);

  let html = '';
  if(toBuy.length) {
    html += `<div class="section-header">🛒 To Order (${toBuy.length})</div>`;
    toBuy.forEach(i => html += itemHtml(i, true));
  }
  if(rest.length) {
    html += `<div class="section-header">🔧 MX Items</div>`;
    rest.forEach(i => html += itemHtml(i, false));
  }
  html += `<div style="padding:16px;text-align:center;font-size:12px;color:var(--t3)">Tap an item to add it to the order list ·<br>Tap again to remove it</div>`;

  document.getElementById('app').innerHTML = html;
}

function itemHtml(item, checked) {
  const key = fsKey(item.item);
  const safeKey  = key.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  const safeName = item.item.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  const qty = shopState[key]?.qty || 1;
  const notes = item.notes && String(item.notes) !== 'false' && String(item.notes).trim() ? item.notes : '';
  return `<div class="item-row ${checked?'tobuy':''}" data-key="${safeKey}" data-name="${safeName}" onclick="toggleItem(this.dataset.key,this.dataset.name)">
    <div class="cb ${checked?'on':''}">${checked?'✓':''}</div>
    <div style="flex:1;min-width:0">
      <div class="item-name">${item.item}${checked?'<span class="badge">To Order</span>':''}</div>
      ${notes?`<div class="item-notes">${notes}</div>`:''}
    </div>
    ${checked ? `<div onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:0;flex-shrink:0;border:1px solid rgba(74,144,217,0.4);border-radius:20px;overflow:hidden">
      <button data-key="${safeKey}" onclick="event.stopPropagation();changeQty(this.dataset.key,-1)" style="background:none;border:none;color:var(--accent);font-size:18px;font-weight:700;width:32px;height:32px;cursor:pointer;line-height:1">−</button>
      <span style="min-width:22px;text-align:center;font-size:14px;font-weight:700;color:var(--t1)">${qty}</span>
      <button data-key="${safeKey}" onclick="event.stopPropagation();changeQty(this.dataset.key,1)" style="background:none;border:none;color:var(--accent);font-size:18px;font-weight:700;width:32px;height:32px;cursor:pointer;line-height:1">+</button>
    </div>` : ''}
  </div>`;
}

function toggleItem(key, name) {
  const cur = shopState[key] || {};
  const nowChecked = !cur.checked;
  const newStatus = nowChecked ? 'To Buy' : 'In Stock';
  const newQty = cur.qty || 1;
  const newSource = nowChecked ? 'mechanics' : '';
  shopState[key] = {checked: nowChecked, status: newStatus, qty: newQty, source: newSource};
  render();
  db.collection('shopState').doc('state').set(
    {[key]: {checked: nowChecked, status: newStatus, qty: newQty, source: newSource}},
    {merge: true}
  ).then(() => {
    toast(nowChecked ? `🛒 Added to order list` : `✅ Removed from order list`);
  }).catch(e => {
    console.error('[mechanics] Firestore write FAILED:', e);
    toast('❌ Could not sync — check connection');
  });
}

function changeQty(key, delta) {
  const cur = shopState[key] || {};
  const newQty = Math.max(1, (cur.qty || 1) + delta);
  shopState[key] = {...cur, qty: newQty};
  render();
  db.collection('shopState').doc('state').set(
    {[key]: {...cur, qty: newQty}},
    {merge: true}
  ).catch(e => console.error('[mechanics] qty write FAILED:', e));
}

function showAddForm() {
  view = 'add';
  render();
}

// ── URL-to-name helpers (same as main app) ───────────────────────────────────
function nameFromUrlSlug(url) {
  try {
    const path = new URL(url).pathname;
    const parts = path.split('/').filter(Boolean);
    const slug = parts.slice().reverse().find(p => p.length > 4 && /[a-z]/.test(p) && !p.match(/^\d+[pP]?$/)) || parts[parts.length-1] || '';
    const clean = slug.replace(/\.[^.]+$/, '').replace(/-?\d{6,}[a-z]?$/i, '').replace(/-/g, ' ').trim();
    return clean ? clean.replace(/\b\w/g, c => c.toUpperCase()) : '';
  } catch(_) { return ''; }
}

let _lastFetchUrl = '';
async function onUrlInput() {
  const urlEl   = document.getElementById('inUrl');
  const nameEl  = document.getElementById('inName');
  const hint    = document.getElementById('fetchHint');
  const url = urlEl.value.trim();
  if(!url.startsWith('http')) return;
  if(url === _lastFetchUrl) return;
  _lastFetchUrl = url;

  // Instant slug fill while Worker runs
  if(!nameEl.value.trim()) {
    const slug = nameFromUrlSlug(url);
    if(slug) nameEl.value = slug;
  }

  hint.textContent = '⏳ Fetching name…';
  try {
    const res  = await fetch(`https://skycare-worker.skycare.workers.dev?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    const blocked = ['access denied','403','forbidden','robot','blocked','captcha']
      .some(w => (data.name||'').toLowerCase().includes(w));
    const slugAtFetch = nameFromUrlSlug(url);
    const curName = nameEl.value.trim();
    if(data.name && !blocked && (!curName || curName === slugAtFetch)) {
      nameEl.value = data.name;
      hint.textContent = '✓ Name filled from product page';
    } else {
      hint.textContent = '';
    }
  } catch(_) { hint.textContent = ''; }
}

function renderAdd() {
  document.getElementById('app').innerHTML = `
    <div class="form-wrap">
      <div style="font-size:16px;font-weight:800;color:var(--t1);margin-bottom:4px">Add Part / Supply</div>
      <div style="font-size:12px;color:var(--t3);margin-bottom:16px">Paste a product URL and the name will fill automatically.</div>
      <label>Product URL</label>
      <input type="url" id="inUrl" placeholder="https://…" autocomplete="off" autocorrect="off" spellcheck="false"
        oninput="onUrlInput()" onpaste="setTimeout(onUrlInput,150)" onchange="onUrlInput()">
      <div class="fetching" id="fetchHint"></div>
      <label>Item name *</label>
      <input type="text" id="inName" placeholder="e.g. Oil filter, spark plug…" autocorrect="off">
      <button class="save-btn" onclick="saveItem()">🛒 Order it</button>
      <button class="cancel-btn" onclick="cancelAdd()">Cancel</button>
    </div>`;
  _lastFetchUrl = '';
  setTimeout(()=>document.getElementById('inUrl')?.focus(), 80);
}

async function saveItem() {
  const name = (document.getElementById('inName')?.value||'').trim();
  const url  = (document.getElementById('inUrl')?.value||'').trim();
  if(!name) { toast('⚠️ Please enter an item name'); return; }

  const id = name.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase().slice(0,60) + '_' + Date.now();
  try {
    await db.collection('shoppingCatalog').doc(id).set({
      item: name,
      notes: '',
      store: '',
      url: url || '',
      cabinet: 'Mechanics'
    });
    // Auto-mark as "To Order" so it lands in the order list immediately
    const key = fsKey(name);
    shopState[key] = {checked: true, status: 'To Buy', qty: 1, source: 'mechanics'};
    await db.collection('shopState').doc('state').set(
      {[key]: {checked: true, status: 'To Buy', qty: 1, source: 'mechanics'}},
      {merge: true}
    );
    toast('🛒 Added to order list!');
    view = 'list';
    render();
  } catch(e) {
    console.error('[mechanics] save failed:', e);
    toast('❌ Could not save — check connection');
  }
}

function cancelAdd() {
  view = 'list';
  render();
}

function goBack() {
  if(view !== 'list') { view = 'list'; render(); }
  else { try{window.close();}catch(e){} history.back(); }
}

render();
</script>
</body>
</html>
