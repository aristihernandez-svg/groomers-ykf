<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Skycare — MX Parts & Supplies</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0B1120;--bg2:#111827;--bg3:#1a2235;--glass:rgba(255,255,255,0.05);--glass2:rgba(255,255,255,0.08);--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--t1:#f0f4ff;--t2:#9aa5be;--t3:#5a6478;--accent:#4A90D9;--green:#27AE60;--red:#E74C3C;--radius:16px;--radius-sm:10px}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:100px}
.bar{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px}
.bar-title{font-size:16px;font-weight:800;color:var(--t1);flex:1}
.item-row{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
.cb{width:24px;height:24px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;cursor:pointer;transition:all 0.15s}
.cb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.item-name{font-size:15px;font-weight:600;flex:1;min-width:0;word-break:break-word;cursor:pointer}
.item-name.ordered{color:var(--accent)}
.badge{display:inline-block;background:rgba(74,144,217,0.2);color:var(--accent);border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;margin-left:6px}
.qty-row{display:flex;align-items:center;gap:0;flex-shrink:0;border:1px solid rgba(74,144,217,0.4);border-radius:20px;overflow:hidden}
.qty-btn{background:none;border:none;color:var(--accent);font-size:18px;font-weight:700;width:30px;height:30px;cursor:pointer;line-height:1}
.qty-val{min-width:20px;text-align:center;font-size:14px;font-weight:700;color:var(--t1)}
.del-btn{background:none;border:none;color:var(--t3);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;line-height:1}
.del-btn:active{color:var(--red)}
.empty{text-align:center;padding:60px 24px;color:var(--t3)}
.empty-icon{font-size:48px;margin-bottom:12px}
.fab{position:fixed;bottom:28px;right:20px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#2176AE);border:none;color:#fff;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;z-index:100}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:12px 24px;border-radius:40px;font-size:14px;font-weight:700;z-index:999;opacity:0;transition:opacity 0.3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.4);pointer-events:none}
.toast.show{opacity:1}
.form-wrap{padding:16px}
label{display:block;font-size:12px;color:var(--t2);font-weight:600;margin-bottom:5px;margin-top:14px}
label:first-of-type{margin-top:0}
input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px 13px;color:var(--t1);font-size:15px;font-family:inherit;outline:none}
input:focus{border-color:var(--accent)}
.save-btn{display:block;width:100%;margin-top:16px;padding:14px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--accent),#2176AE);color:#fff;font-size:15px;font-weight:800;cursor:pointer}
.save-btn:active{opacity:0.8}
.cancel-btn{display:block;width:100%;margin-top:10px;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer}
.section-header{padding:10px 16px 4px;font-size:10px;font-weight:700;color:var(--t3);letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--border)}
.fetching{font-size:11px;color:var(--t3);margin-top:4px;min-height:16px}
/* confirm modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:200;align-items:center;justify-content:center;padding:24px}
.modal-overlay.open{display:flex}
.modal-card{background:var(--bg2);border-radius:var(--radius);padding:22px;width:100%;max-width:320px}
.modal-card h3{font-size:16px;font-weight:800;margin-bottom:8px}
.modal-card p{font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.5}
.modal-del-btn{display:block;width:100%;padding:13px;border-radius:var(--radius-sm);border:none;background:var(--red);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px}
.modal-cancel-btn{display:block;width:100%;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border2);background:transparent;color:var(--t2);font-size:14px;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div class="bar">
  <button onclick="goBack()" style="background:none;border:none;color:#4A90D9;font-size:24px;line-height:1;cursor:pointer;padding:0 4px;flex-shrink:0">‹</button>
  <img src="cars/Skycare_logo-removebg-preview.png" style="height:22px;filter:brightness(0) invert(1)" alt="Skycare">
  <span class="bar-title">MX Parts &amp; Supplies</span>
  <span id="cartCount" style="background:var(--accent);color:#fff;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;display:none"></span>
</div>

<div id="app"></div>
<button class="fab" onclick="showAddForm()" title="Add item">+</button>
<div class="toast" id="toast"></div>

<!-- Duplicates modal -->
<div class="modal-overlay" id="dupeModal">
  <div class="modal-card" style="max-width:380px;max-height:80vh;overflow-y:auto">
    <h3>🔍 Duplicate Items</h3>
    <p id="dupeModalSubtitle" style="font-size:13px;color:var(--t2);margin-bottom:16px;line-height:1.5"></p>
    <div id="dupeModalBody"></div>
    <button class="modal-cancel-btn" style="margin-top:14px" onclick="document.getElementById('dupeModal').classList.remove('open')">Done</button>
  </div>
</div>

<!-- Delete confirm modal -->
<div class="modal-overlay" id="delModal">
  <div class="modal-card">
    <h3>Remove item?</h3>
    <p id="delModalMsg"></p>
    <button class="modal-del-btn" onclick="confirmDelete()">🗑 Yes, remove it</button>
    <button class="modal-cancel-btn" onclick="closeDelModal()">Cancel</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyA7BHDcP-PVTpsaNu9TTWCnChfI0bnOLi8",
  authDomain:"groomer-ykf.firebaseapp.com",
  projectId:"groomer-ykf",
  storageBucket:"groomer-ykf.firebasestorage.app",
  messagingSenderId:"384366195372",
  appId:"1:384366195372:web:35d38ffbc947188d4a6509"
});
const db = firebase.firestore();

let catalog   = [];
let shopState = {};
let view      = 'list';
let pendingDelId   = null;
let pendingDelName = '';

db.collection('shoppingCatalog').onSnapshot(snap => {
  catalog = snap.docs
    .map(d => ({id:d.id, ...d.data()}))
    .filter(i => i.cabinet === 'Mechanics');
  render();
});

db.collection('shopState').doc('state').onSnapshot(snap => {
  if(snap.exists) shopState = snap.data() || {};
  render();
});

function fsKey(text) { return String(text).replace(/[.\/]/g,'∙'); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

function render() {
  if(view === 'add') { renderAdd(); return; }
  renderList();
}

function renderList() {
  const toBuyCount = catalog.filter(i => shopState[fsKey(i.item)]?.checked).length;
  const cc = document.getElementById('cartCount');
  if(toBuyCount > 0) { cc.textContent = toBuyCount+' to order'; cc.style.display=''; }
  else cc.style.display='none';

  if(!catalog.length) {
    document.getElementById('app').innerHTML = `<div class="empty">
      <div class="empty-icon">🔧</div>
      <p style="font-size:15px;font-weight:600;color:var(--t2)">No MX items yet</p>
      <p style="font-size:13px;margin-top:6px">Tap + to add a part or supply</p>
    </div>`;
    return;
  }

  const toOrder = catalog.filter(i =>  shopState[fsKey(i.item)]?.checked);
  const rest    = catalog.filter(i => !shopState[fsKey(i.item)]?.checked);

  let html = '';
  if(toOrder.length) {
    html += `<div class="section-header">🛒 To Order (${toOrder.length})</div>`;
    toOrder.forEach(i => html += itemHtml(i, true));
  }
  if(rest.length) {
    html += `<div class="section-header">🔧 MX Items</div>`;
    rest.forEach(i => html += itemHtml(i, false));
  }
  const dupeCount = countDupes();
  html += `<div style="padding:12px 16px;display:flex;justify-content:center">
    <button onclick="checkDuplicates()" style="background:${dupeCount?'rgba(230,126,34,0.15)':'var(--glass2)'};border:1px solid ${dupeCount?'#E67E22':'var(--border2)'};border-radius:8px;padding:8px 16px;color:${dupeCount?'#E67E22':'var(--t3)'};font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px">
      ${dupeCount?'⚠️':'🔍'} ${dupeCount?dupeCount+' duplicate'+(dupeCount>1?'s':'')+ ' found':'Check for duplicates'}
    </button>
  </div>`;
  html += `<div style="padding:0 16px 16px;text-align:center;font-size:12px;color:var(--t3)">Tap the checkbox to add/remove from order list</div>`;

  document.getElementById('app').innerHTML = html;
}

function itemHtml(item, checked) {
  const key      = fsKey(item.item);
  const safeKey  = key.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  const safeId   = item.id.replace(/"/g,'&quot;');
  const safeName = item.item.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
  const qty      = shopState[key]?.qty || 1;
  return `<div class="item-row">
    <div class="cb ${checked?'on':''}" onclick="toggleItem('${safeKey}','${safeName}')">${checked?'✓':''}</div>
    <div class="item-name ${checked?'ordered':''}" onclick="toggleItem('${safeKey}','${safeName}')">
      ${item.item}${checked?'<span class="badge">To Order</span>':''}
    </div>
    <div class="qty-row" onclick="event.stopPropagation()">
      <button class="qty-btn" onclick="changeQty('${safeKey}',-1)">−</button>
      <span class="qty-val">${qty}</span>
      <button class="qty-btn" onclick="changeQty('${safeKey}',1)">+</button>
    </div>
    <button class="del-btn" onclick="event.stopPropagation();askDelete('${safeId}','${safeName}')" title="Remove">🗑</button>
  </div>`;
}

function toggleItem(key, name) {
  const cur        = shopState[key] || {};
  const nowChecked = !cur.checked;
  const newQty     = cur.qty || 1;
  shopState[key]   = {checked:nowChecked, status:nowChecked?'To Buy':'In Stock', qty:newQty, source:nowChecked?'mechanics':''};
  render();
  db.collection('shopState').doc('state').set(
    {[key]: shopState[key]}, {merge:true}
  ).then(()=>toast(nowChecked?'🛒 Added to order list':'✅ Removed from order list'))
   .catch(()=>toast('❌ Could not sync'));
}

function changeQty(key, delta) {
  const cur    = shopState[key] || {};
  const newQty = Math.max(1,(cur.qty||1)+delta);
  shopState[key] = {...cur, qty:newQty};
  render();
  db.collection('shopState').doc('state').set({[key]:shopState[key]},{merge:true})
    .catch(()=>{});
}

// ── Duplicates ────────────────────────────────────────────────────────────────
function countDupes() {
  const seen = {};
  catalog.forEach(i => { const k = i.item.trim().toLowerCase(); seen[k] = (seen[k]||0)+1; });
  return Object.values(seen).filter(c => c > 1).length;
}

function checkDuplicates() {
  const groups = {};
  catalog.forEach(i => {
    const k = i.item.trim().toLowerCase();
    if(!groups[k]) groups[k] = [];
    groups[k].push(i);
  });
  const dupes = Object.values(groups).filter(g => g.length > 1);

  if(!dupes.length) {
    toast('✅ No duplicates found!');
    return;
  }

  document.getElementById('dupeModalSubtitle').textContent =
    `Found ${dupes.length} duplicate group${dupes.length>1?'s':''}. Tap "Remove" to delete the extra copies — the first one in each group is kept.`;

  let html = '';
  dupes.forEach(group => {
    html += `<div style="border:1px solid var(--border2);border-radius:10px;margin-bottom:12px;overflow:hidden">`;
    html += `<div style="padding:8px 12px;background:var(--glass2);font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;text-transform:uppercase">Group: ${group[0].item}</div>`;
    group.forEach((item, idx) => {
      const safeId   = item.id.replace(/"/g,'&quot;');
      const safeName = item.item.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      const isKeep   = idx === 0;
      html += `<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-top:1px solid var(--border)">
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:600;color:${isKeep?'var(--green)':'var(--t1)'}">${item.item}</div>
          <div style="font-size:11px;color:var(--t3);margin-top:2px">${isKeep?'✅ Keep':'Extra copy'}${item.url?` · <span style="color:var(--accent)">${(()=>{try{return new URL(item.url).hostname.replace('www.','')}catch(_){return''}})()}</span>`:''}</div>
        </div>
        ${isKeep
          ? `<span style="font-size:12px;color:var(--green);font-weight:700;padding:4px 10px;border:1px solid var(--green);border-radius:20px">Keep</span>`
          : `<button onclick="dupeDelete('${safeId}','${safeName}')" style="background:var(--red);border:none;color:#fff;font-size:12px;font-weight:700;padding:6px 12px;border-radius:20px;cursor:pointer">Remove</button>`
        }
      </div>`;
    });
    html += `</div>`;
  });

  document.getElementById('dupeModalBody').innerHTML = html;
  document.getElementById('dupeModal').classList.add('open');
}

function dupeDelete(id, name) {
  catalog = catalog.filter(i => i.id !== id);
  db.collection('shoppingCatalog').doc(id).delete().catch(()=>{});
  // clear shopState if no other copy remains
  const stillExists = catalog.some(i => i.item.trim().toLowerCase() === name.trim().toLowerCase());
  if(!stillExists) {
    db.collection('shopState').doc('state').update({[fsKey(name)]: firebase.firestore.FieldValue.delete()}).catch(()=>{});
  }
  toast('🗑 Duplicate removed');
  // Refresh the modal content
  checkDuplicates();
  // If no more dupes, close modal and re-render list
  if(countDupes() === 0) {
    document.getElementById('dupeModal').classList.remove('open');
    render();
  }
}

// ── Delete ────────────────────────────────────────────────────────────────────
function askDelete(id, name) {
  pendingDelId   = id;
  pendingDelName = name;
  document.getElementById('delModalMsg').textContent = `"${name}" will be removed from the MX list.`;
  document.getElementById('delModal').classList.add('open');
}

function closeDelModal() {
  pendingDelId = null;
  document.getElementById('delModal').classList.remove('open');
}

function confirmDelete() {
  if(!pendingDelId) return;
  const id   = pendingDelId;
  const name = pendingDelName;
  closeDelModal();
  catalog = catalog.filter(i => i.id !== id);
  render();
  db.collection('shoppingCatalog').doc(id).delete()
    .then(()=>toast('🗑 Removed'))
    .catch(()=>toast('❌ Could not delete'));
  // Also clear shopState entry
  const key = fsKey(name);
  db.collection('shopState').doc('state').update({[key]: firebase.firestore.FieldValue.delete()}).catch(()=>{});
}

// ── Add form ──────────────────────────────────────────────────────────────────
function showAddForm() { view = 'add'; render(); }
function cancelAdd()   { view = 'list'; render(); }

function nameFromUrlSlug(url) {
  try {
    const path  = new URL(url).pathname;
    const parts = path.split('/').filter(Boolean);
    const slug  = parts.slice().reverse().find(p=>p.length>4&&/[a-z]/.test(p)&&!p.match(/^\d+[pP]?$/)) || parts[parts.length-1]||'';
    const clean = slug.replace(/\.[^.]+$/,'').replace(/-?\d{6,}[a-z]?$/i,'').replace(/-/g,' ').trim();
    return clean ? clean.replace(/\b\w/g,c=>c.toUpperCase()) : '';
  } catch(_){ return ''; }
}

let _lastFetchUrl = '';
async function onUrlInput() {
  const urlEl  = document.getElementById('inUrl');
  const nameEl = document.getElementById('inName');
  const hint   = document.getElementById('fetchHint');
  if(!urlEl||!nameEl||!hint) return;
  const url = urlEl.value.trim();
  if(!url.startsWith('http')) return;
  if(url === _lastFetchUrl) return;
  _lastFetchUrl = url;

  if(!nameEl.value.trim()) {
    const slug = nameFromUrlSlug(url);
    if(slug) nameEl.value = slug;
  }

  hint.textContent = '⏳ Fetching name…';
  try {
    const res  = await fetch(`https://skycare-worker.skycare.workers.dev?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    const blocked = ['access denied','403','forbidden','robot','blocked','captcha']
      .some(w=>(data.name||'').toLowerCase().includes(w));
    const slugAtFetch = nameFromUrlSlug(url);
    const curName = nameEl.value.trim();
    if(data.name && !blocked && (!curName || curName===slugAtFetch)) {
      nameEl.value = data.name;
      hint.textContent = '✓ Name filled from product page';
    } else { hint.textContent = ''; }
  } catch(_){ hint.textContent=''; }
}

function renderAdd() {
  document.getElementById('app').innerHTML = `
    <div class="form-wrap">
      <div style="font-size:16px;font-weight:800;color:var(--t1);margin-bottom:4px">Add Part / Supply</div>
      <div style="font-size:12px;color:var(--t3);margin-bottom:16px">Paste a product URL and the name fills automatically.</div>
      <label>Product URL</label>
      <input type="url" id="inUrl" placeholder="https://…" autocomplete="off" autocorrect="off" spellcheck="false"
        oninput="onUrlInput()" onpaste="setTimeout(onUrlInput,150)" onchange="onUrlInput()">
      <div class="fetching" id="fetchHint"></div>
      <label>Item name *</label>
      <input type="text" id="inName" placeholder="e.g. Oil filter, spark plug…" autocorrect="off">
      <button class="save-btn" onclick="saveItem()">🛒 Order it</button>
      <button class="cancel-btn" onclick="cancelAdd()">Cancel</button>
    </div>`;
  _lastFetchUrl = '';
  setTimeout(()=>document.getElementById('inUrl')?.focus(), 80);
}

async function saveItem() {
  const name = (document.getElementById('inName')?.value||'').trim();
  const url  = (document.getElementById('inUrl')?.value||'').trim();
  if(!name){ toast('⚠️ Please enter an item name'); return; }

  const id  = name.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase().slice(0,60)+'_'+Date.now();
  const key = fsKey(name);

  try {
    // Save to catalog (store:'MX' keeps Firestore rules happy)
    await db.collection('shoppingCatalog').doc(id).set({
      item: name, notes:'', store:'MX', url:url||'', cabinet:'Mechanics'
    });
    // Immediately mark as To Order — no second tap needed
    shopState[key] = {checked:true, status:'To Buy', qty:1, source:'mechanics'};
    await db.collection('shopState').doc('state').set(
      {[key]:{checked:true, status:'To Buy', qty:1, source:'mechanics'}}, {merge:true}
    );
    // Broadcast to all open devices (same pattern as crew car alerts)
    db.collection('notifications').add({
      title: '🔧 MX Parts Request',
      body: `${name} added to the order list`,
      tag: 'mx-parts',
      ts: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(()=>{});
    toast('🛒 Added to order list!');
    view = 'list';
    render();
  } catch(e) {
    console.error('[mechanics] save failed:', e);
    toast('❌ Could not save — check connection');
  }
}

function goBack() {
  if(view !== 'list'){ view='list'; render(); }
  else { try{window.close();}catch(_){} history.back(); }
}

render();
</script>
</body>
</html>
