<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Skycare — Crew Car Update</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0B1120;--bg2:#111827;--bg3:#1a2235;--glass:rgba(255,255,255,0.05);--glass2:rgba(255,255,255,0.08);--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);--t1:#f0f4ff;--t2:#9aa5be;--t3:#5a6478;--accent:#4A90D9;--green:#27AE60;--red:#E74C3C;--gold:#F1C40F;--radius:16px;--radius-sm:10px}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding-bottom:40px}
.bar{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px}
.bar-title{font-size:16px;font-weight:800;color:var(--t1);flex:1}
.back-btn{background:none;border:none;color:var(--accent);font-size:24px;line-height:1;cursor:pointer;padding:0 4px;flex-shrink:0}
.car-card{margin:10px 14px;background:var(--glass2);border:1px solid var(--border2);border-radius:var(--radius);overflow:hidden;cursor:pointer;display:flex;align-items:center;gap:14px;padding:14px;transition:opacity 0.15s}
.car-card:active{opacity:0.7}
.car-icon{width:56px;height:56px;border-radius:12px;overflow:hidden;flex-shrink:0}
.car-icon img{width:100%;height:100%;object-fit:contain}
.car-name{font-size:15px;font-weight:700;color:var(--t1)}
.car-sub{font-size:12px;color:var(--t3);margin-top:3px}
.fuel-bar-wrap{display:flex;align-items:center;gap:8px;margin-top:6px}
.fuel-bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.fuel-bar-fill{height:100%;border-radius:3px;transition:width 0.3s}
.arr{color:var(--border2);font-size:20px;margin-left:auto;flex-shrink:0}
.detail-hero{position:relative;height:160px;overflow:hidden}
.detail-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:10px;filter:drop-shadow(0 4px 16px rgba(0,0,0,0.4))}
.detail-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,rgba(0,0,0,0.1) 60%)}
.detail-hero-text{position:absolute;bottom:0;left:0;right:0;padding:14px 18px;z-index:2}
.detail-hero-name{font-size:20px;font-weight:800;color:#fff}
.detail-hero-sub{font-size:12px;color:rgba(255,255,255,0.7);margin-top:2px}
.section{margin:14px 14px 0;background:var(--glass2);border:1px solid var(--border2);border-radius:var(--radius);padding:16px}
.section-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px}
label{display:block;font-size:12px;color:var(--t2);font-weight:600;margin-bottom:5px;margin-top:12px}
label:first-of-type{margin-top:0}
input[type=number],textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:11px 13px;color:var(--t1);font-size:15px;font-family:inherit;outline:none}
input[type=number]:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:none;min-height:80px;font-size:14px;line-height:1.5}
.save-btn{display:block;width:100%;margin-top:14px;padding:14px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--accent),#2176AE);color:#fff;font-size:15px;font-weight:800;cursor:pointer}
.save-btn:active{opacity:0.8}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#27AE60;color:#fff;padding:12px 24px;border-radius:40px;font-size:14px;font-weight:700;z-index:999;opacity:0;transition:opacity 0.3s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,0.4);pointer-events:none}
.toast.show{opacity:1}
.frozen-row{margin-top:12px;padding:10px 13px;background:var(--bg);border-radius:var(--radius-sm);border:1px solid var(--border)}
.frozen-label{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.frozen-val{font-size:15px;font-weight:700;color:var(--t2);margin-top:3px}
.crew-note-wrap{background:#FFF59D;background-image:linear-gradient(225deg,rgba(0,0,0,0.13) 24px,transparent 24px);border-radius:4px 4px 0 4px;padding:12px 14px;box-shadow:2px 4px 12px rgba(0,0,0,0.3);margin-top:4px}
.crew-note-label{font-size:10px;font-weight:700;color:#8a6d00;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px}
.crew-note-wrap textarea{background:transparent;border:none;outline:none;color:#1c1c1c;font-size:13px;min-height:70px;padding:0;width:100%;font-family:inherit;resize:none}
/* Gauge */
.gauge-wrap{background:var(--bg3);border-radius:12px;padding:16px 8px 8px;user-select:none;touch-action:none}
#fuelReadout{text-align:center;font-size:28px;font-weight:800;color:var(--gold);margin-top:4px;letter-spacing:1px}
.gauge-hint{text-align:center;font-size:11px;color:var(--t3);margin-top:4px}
</style>
</head>
<body>
<div class="bar" id="topBar">
  <button class="back-btn" onclick="goBack()">‹</button>
  <img src="cars/Skycare_logo-removebg-preview.png" style="height:22px;filter:brightness(0) invert(1)" alt="Skycare">
  <span class="bar-title" id="barTitle">Crew Car Update</span>
</div>
<div id="app"></div>
<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyA7BHDcP-PVTpsaNu9TTWCnChfI0bnOLi8",
  authDomain:"groomer-ykf.firebaseapp.com",
  projectId:"groomer-ykf",
  storageBucket:"groomer-ykf.firebasestorage.app",
  messagingSenderId:"384366195372",
  appId:"1:384366195372:web:35d38ffbc947188d4a6509"
});
const db = firebase.firestore();

const CREW_CARS = [
  {key:'escape',  name:'Ford Escape',      color:'#3A6BC4',color2:'#5B8FE8',label:'SUV',        img:'cars/escape-removebg-preview.png'},
  {key:'elantra', name:'Hyundai Elantra',  color:'#B89A60',color2:'#D4BB82',label:'Sedan',      img:'cars/elantra-removebg-preview.png'},
  {key:'micra',   name:'Nissan Micra',     color:'#2E7D7B',color2:'#4AA8A6',label:'Hatchback',  img:'cars/micra-removebg-preview.png'},
  {key:'impala',  name:'Chevrolet Impala', color:'#9E9278',color2:'#C0B49A',label:'Sedan',      img:'cars/impala-removebg-preview.png'},
  {key:'whtruck', name:'White MX Truck',   color:'#7A8A96',color2:'#B0C0CC',label:'Pickup',     img:'cars/whtruck-removebg-preview.png'},
  {key:'brtruck', name:'Brown MX Truck',   color:'#8B7355',color2:'#B09470',label:'Pickup',     img:'cars/brtruck-removebg-preview.png'},
  {key:'kubota',  name:'Kubota',           color:'#C85F10',color2:'#F07A30',label:'UTV · Diesel',img:'cars/kubota-removebg-preview.png'},
  {key:'civic',   name:'Honda Civic',      color:'#8A8A8A',color2:'#C0C0C0',label:'Sedan',      img:'cars/civic-removebg-preview.png'},
];

const FUEL_STOPS = [
  {label:'E', value:'Empty', pct:0},
  {label:'¼', value:'1/4',  pct:0.25},
  {label:'½', value:'1/2',  pct:0.5},
  {label:'¾', value:'3/4',  pct:0.75},
  {label:'F', value:'Full', pct:1},
];

let carData = {};
let view = 'list';
let _gaugeValue = null;

// ── Firestore sync ──
db.collection('crewCarData').doc('all').onSnapshot(snap => {
  if(snap.exists) Object.assign(carData, snap.data());
  if(view === 'list') render(); // don't rebuild gauge while user is editing
});

// ── Helpers ──
function fuelPct(val) { const s=FUEL_STOPS.find(x=>x.value===val); return s?s.pct:null; }
function fuelColor(pct) {
  if(pct===null) return 'rgba(255,255,255,0.15)';
  if(pct<0.25) return '#E74C3C'; if(pct<0.5) return '#F1C40F';
  if(pct<0.75) return '#82E06A'; return '#27AE60';
}
function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function render() { view==='list' ? renderList() : renderDetail(view); }

// ── List ──
function renderList() {
  document.getElementById('barTitle').textContent='Crew Car Update';
  let html=`<div style="padding:10px 14px 4px;font-size:12px;color:rgba(255,255,255,0.35);line-height:1.5">
    Tap a vehicle to update fuel level and KM after use.</div>`;
  CREW_CARS.forEach(car=>{
    const d=carData[car.key]||{};
    const pct=fuelPct(d.fuel); const col=fuelColor(pct);
    html+=`<div class="car-card" onclick="openDetail('${car.key}')">
      <div class="car-icon" style="background:linear-gradient(135deg,${car.color},${car.color2})">
        <img src="${car.img}" alt="${car.name}" onerror="this.style.display='none'">
      </div>
      <div style="flex:1;min-width:0">
        <div class="car-name">${car.name}</div>
        <div class="car-sub">${car.label}${d.currentKm?' · '+Number(d.currentKm).toLocaleString()+' km':''}</div>
        <div class="fuel-bar-wrap">
          <div class="fuel-bar-track">
            <div class="fuel-bar-fill" style="width:${pct!==null?Math.round(pct*100):0}%;background:${col}"></div>
          </div>
          <span style="font-size:11px;font-weight:700;color:rgba(255,255,255,0.4);flex-shrink:0">⛽ ${d.fuel||'—'}</span>
        </div>
      </div>
      <div class="arr">›</div>
    </div>`;
  });
  document.getElementById('app').innerHTML=html;
}

// ── Detail ──
function openDetail(key) { view=key; const d=carData[key]||{}; _gaugeValue=d.fuel||'1/2'; renderDetail(key); }

function renderDetail(key) {
  const car=CREW_CARS.find(c=>c.key===key);
  if(!car){view='list';render();return;}
  const d=carData[key]||{};
  document.getElementById('barTitle').textContent=car.name;
  const nsKm=d.nextServiceKm?Number(d.nextServiceKm).toLocaleString()+' km':'Not set';
  document.getElementById('app').innerHTML=`
    <div class="detail-hero" style="background:linear-gradient(160deg,${car.color},${car.color2})">
      <img src="${car.img}" alt="${car.name}" onerror="this.style.display='none'">
      <div class="detail-hero-overlay"></div>
      <div class="detail-hero-text"><div class="detail-hero-name">${car.name}</div><div class="detail-hero-sub">${car.label}</div></div>
    </div>
    <div class="section">
      <div class="section-label">⛽ Fuel Level</div>
      <div class="gauge-wrap" id="gaugeWrap"></div>
    </div>
    <div class="section">
      <div class="section-label">🛣️ Odometer</div>
      <label>Current KM (enter when returning the vehicle)</label>
      <input type="number" id="inCKM" placeholder="e.g. 98500" value="${d.currentKm||''}" inputmode="numeric">
      <div class="frozen-row">
        <div class="frozen-label">Next Service At</div>
        <div class="frozen-val">${nsKm}</div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">📋 Note for the team</div>
      <div class="crew-note-wrap">
        <div class="crew-note-label">Sticky Note</div>
        <textarea id="inNote" placeholder="Any issue, observation or note to leave for the team...">${d.crewNote||''}</textarea>
      </div>
    </div>
    <div style="padding:0 14px">
      <button class="save-btn" onclick="saveDetail('${key}')">💾 Save Update</button>
    </div>
    <div style="height:40px"></div>`;
  buildGauge(d.fuel||'1/2');
}

// ── Semicircle gauge ──
function buildGauge(initVal) {
  const W=300,H=170,cx=W/2,cy=H-14,R=110;
  const initStop=FUEL_STOPS.find(s=>s.value===initVal)||FUEL_STOPS[2];
  _gaugeValue=initStop.value;

  function pctToXY(p,r){const a=Math.PI-p*Math.PI;return[cx+r*Math.cos(a),cy-r*Math.sin(a)];}
  const[tx0,ty0]=pctToXY(0,R),[tx1,ty1]=pctToXY(1,R);

  function fillArc(p){
    if(p<=0)return'';
    const[fx,fy]=pctToXY(p,R);
    return`<path id="gFill" d="M${tx0},${ty0} A${R},${R} 0 0,1 ${fx},${fy}" stroke="url(#gGrad)" stroke-width="16" fill="none" stroke-linecap="round"/>`;
  }

  const labels=FUEL_STOPS.map(s=>{const[lx,ly]=pctToXY(s.pct,R+22);return`<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-size="12" font-weight="700" fill="rgba(255,255,255,0.4)">${s.label}</text>`;}).join('');
  const ticks=FUEL_STOPS.map(s=>{const[ix,iy]=pctToXY(s.pct,R-10),[ox,oy]=pctToXY(s.pct,R+10);return`<line x1="${ix}" y1="${iy}" x2="${ox}" y2="${oy}" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>`;}).join('');

  const initRot=(initStop.pct-0.5)*180;
  const[ndx,ndy]=pctToXY(initStop.pct,R);

  document.getElementById('gaugeWrap').innerHTML=`
    <svg id="gSvg" viewBox="0 0 ${W} ${H}" width="100%" style="display:block;touch-action:none;overflow:visible">
      <defs><linearGradient id="gGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#c0392b"/>
        <stop offset="40%" stop-color="#f1c40f"/>
        <stop offset="100%" stop-color="#27ae60"/>
      </linearGradient></defs>
      <path d="M${tx0},${ty0} A${R},${R} 0 1,1 ${tx1},${ty1}" stroke="rgba(255,255,255,0.1)" stroke-width="16" fill="none" stroke-linecap="round"/>
      ${fillArc(initStop.pct)}
      ${ticks}${labels}
      <g id="gNeedle" style="transform-origin:${cx}px ${cy}px;transform:rotate(${initRot}deg);transition:transform 0.12s ease">
        <line x1="${cx}" y1="${cy}" x2="${cx}" y2="${cy-R+14}" stroke="#F1C40F" stroke-width="3.5" stroke-linecap="round"/>
      </g>
      <circle cx="${cx}" cy="${cy}" r="8" fill="#F1C40F"/>
      <circle id="gDot" cx="${ndx}" cy="${ndy}" r="9" fill="#F1C40F" stroke="var(--bg3)" stroke-width="2"/>
      <rect x="0" y="0" width="${W}" height="${H}" fill="transparent" id="gDrag"/>
    </svg>
    <div id="fuelReadout">${initStop.value}</div>
    <div class="gauge-hint">Drag the needle to set fuel level</div>`;

  // Attach drag
  const svg=document.getElementById('gSvg');
  let dragging=false;
  function pctFromEv(e){
    const rect=svg.getBoundingClientRect();
    const cx2=e.touches?e.touches[0].clientX:e.clientX;
    const cy2=e.touches?e.touches[0].clientY:e.clientY;
    const sx=(cx2-rect.left)*(W/rect.width);
    const sy=(cy2-rect.top)*(H/rect.height);
    let angle=Math.atan2(cy-sy,sx-cx);
    angle=Math.max(0,Math.min(Math.PI,angle));
    return 1-angle/Math.PI;
  }
  function applyPct(p){
    p=Math.max(0,Math.min(1,p));
    const stop=FUEL_STOPS.reduce((a,b)=>Math.abs(b.pct-p)<Math.abs(a.pct-p)?b:a);
    if(stop.value===_gaugeValue)return;
    _gaugeValue=stop.value;
    const rot=(stop.pct-0.5)*180;
    const n=document.getElementById('gNeedle'); if(n)n.style.transform=`rotate(${rot}deg)`;
    const a2=Math.PI-stop.pct*Math.PI;
    const dx2=cx+R*Math.cos(a2),dy2=cy-R*Math.sin(a2);
    const dot=document.getElementById('gDot'); if(dot){dot.setAttribute('cx',dx2);dot.setAttribute('cy',dy2);}
    const fill=document.getElementById('gFill');
    if(fill){stop.pct<=0?fill.setAttribute('d',''):fill.setAttribute('d',`M${tx0},${ty0} A${R},${R} 0 0,1 ${dx2},${dy2}`);}
    const ro=document.getElementById('fuelReadout'); if(ro)ro.textContent=stop.value;
  }
  svg.addEventListener('touchstart',e=>{dragging=true;applyPct(pctFromEv(e));e.preventDefault();},{passive:false});
  svg.addEventListener('touchmove',e=>{if(dragging){applyPct(pctFromEv(e));e.preventDefault();}},{passive:false});
  svg.addEventListener('touchend',()=>{dragging=false;},{passive:true});
  svg.addEventListener('mousedown',e=>{dragging=true;applyPct(pctFromEv(e));});
  window.addEventListener('mousemove',e=>{if(dragging)applyPct(pctFromEv(e));});
  window.addEventListener('mouseup',()=>{dragging=false;});
}

// ── Save ──
async function saveDetail(key) {
  const ckm=(document.getElementById('inCKM')?.value||'').trim();
  const note=(document.getElementById('inNote')?.value||'').trim();
  if(!carData[key])carData[key]={};
  const d=carData[key];
  if(_gaugeValue){
    d.fuel=_gaugeValue;
    const today=new Date().toISOString().split('T')[0];
    const logged=new Date().toLocaleTimeString('en-CA',{hour:'2-digit',minute:'2-digit'});
    if(!d.log)d.log=[];
    d.log.push({type:'fuel',value:_gaugeValue,date:today,logged});
  }
  if(ckm)d.currentKm=ckm;
  d.crewNote=note;
  try {
    await db.collection('crewCarData').doc('all').set({[key]: carData[key]}, {merge: true});
    toast('✅ Saved — thank you!');
  } catch(e){ toast('❌ Save failed — check connection'); }
}

// ── Navigation ──
function goBack() {
  if(view!=='list'){ view='list'; render(); }
  else { try{window.close();}catch(e){} history.back(); }
}

render();
</script>
</body>
</html>
